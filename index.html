const SB_HEADERS = { "Content-Type": "application/json", "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` };

async function sbGet(key) {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/journal_data?key=eq.${key}&select=value`, { headers: SB_HEADERS });
    if (!res.ok) return null;
    const rows = await res.json();
    return rows.length > 0 ? JSON.parse(rows[0].value) : null;
  } catch { return null; }
}

async function sbSet(key, value) {
  try {
    const body = JSON.stringify({ key, value: JSON.stringify(value) });
    // upsert
    await fetch(`${SUPABASE_URL}/rest/v1/journal_data`, {
      method: "POST",
      headers: { ...SB_HEADERS, "Prefer": "resolution=merge-duplicates" },
      body
    });
  } catch {}
  // also save locally as fallback
  try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
}

async function loadData(key, fallback) {
  // try Supabase first, fallback to localStorage
  try {
    const cloud = await sbGet(key);
    if (cloud !== null) return cloud;
  } catch {}
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}

async function saveData(key, data) {
  await sbSet(key, data);
}

];
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DAYS   = ["Min","Sen","Sel","Rab","Kam","Jum","Sab"];
const DEFAULT_BALANCE = 10000;

  greenDark: "#007D0C",

const fmt    = (n) => { const a = Math.abs(n).toLocaleString("en-US",{maximumFractionDigits:0}); return (n>=0?"+":"−")+"$"+a; };
const fmtPct = (n) => (n>=0?"+":"")+n.toFixed(1)+"%";
const clr    = (n) => n>0?G.green:n<0?G.red:G.textMuted;
const clrBg  = (n) => n>0?G.greenLight:n<0?G.redLight:"#F5F5F5";
const fmtBal = (n) => "$"+Number(n).toLocaleString("en-US",{maximumFractionDigits:2});

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function fmtNoteDate(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diffDays = Math.floor((now - d) / 86400000);
  if (diffDays === 0) return d.toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" });
  if (diffDays === 1) return "Kemarin";
  if (diffDays < 7)  return DAYS[d.getDay()];
  return `${d.getDate()} ${MONTHS[d.getMonth()]}`;
}
function getCalendarDays(year, month) {
  const first = new Date(year, month, 1).getDay();
  const total = new Date(year, month+1, 0).getDate();
  const cells = [];
  for (let i=0;i<first;i++) cells.push(null);
  for (let d=1;d<=total;d++) cells.push(d);
  return cells;
}

// ─── Data Backup Modal ────────────────────────────────────────────────────────
function DataModal({ trades, notes, accountBalance, onImport, onClearAll, onClose }) {
  const fileRef = useRef(null);
  const [status, setStatus] = useState(null);
  const [confirmClear, setConfirmClear] = useState(false);

  const handleExport = () => {
    try {
      const wb = XLSX.utils.book_new();
      const tradeRows = trades.length
        ? trades.map(t => ({ Date: t.date, PnL_USD: t.pnl, RR: t.rr, Strategy: t.strategy, Notes: t.notes||"", _id: t.id }))
        : [{ Date:"", PnL_USD:"", RR:"", Strategy:"", Notes:"", _id:"" }];
      const ws1 = XLSX.utils.json_to_sheet(tradeRows);
      ws1["!cols"] = [{ wch:12 },{ wch:10 },{ wch:6 },{ wch:16 },{ wch:40 },{ wch:16 }];
      XLSX.utils.book_append_sheet(wb, ws1, "Trades");
      const noteRows = notes.length
        ? notes.map(n => ({ Title: n.title, Body: n.body||"", UpdatedAt: n.updatedAt, _id: n.id }))
        : [{ Title:"", Body:"", UpdatedAt:"", _id:"" }];
      const ws2 = XLSX.utils.json_to_sheet(noteRows);
      XLSX.utils.book_append_sheet(wb, ws2, "Notes");
      const ws3 = XLSX.utils.json_to_sheet([{ AccountBalance: accountBalance, ExportedAt: new Date().toISOString() }]);
      XLSX.utils.book_append_sheet(wb, ws3, "Settings");
      XLSX.writeFile(wb, `trading-journal-${todayStr()}.xlsx`);
      setStatus({ ok:true, msg:`✅ Berhasil export ${trades.length} trades, ${notes.length} notes` });
    } catch(e) {
      setStatus({ ok:false, msg:"❌ Export gagal: "+e.message });
    }
  };

  const handleFileChange = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setStatus(null);
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const wb = XLSX.read(new Uint8Array(ev.target.result), { type:"array" });
        let importedTrades = null, importedNotes = null, importedBalance = null;
        if (wb.SheetNames.includes("Trades")) {
          const rows = XLSX.utils.sheet_to_json(wb.Sheets["Trades"]);
          importedTrades = rows.filter(r => r.Date).map(r => ({
            id: r._id || Date.now() + Math.random(),
            date: String(r.Date), pnl: parseFloat(r.PnL_USD)||0,
            rr: parseFloat(r.RR)||0, strategy: r.Strategy||"Other", notes: r.Notes||"",
          }));
        }
        if (wb.SheetNames.includes("Notes")) {
          const rows = XLSX.utils.sheet_to_json(wb.Sheets["Notes"]);
          importedNotes = rows.filter(r => r.Title).map(r => ({
            id: r._id || Date.now() + Math.random(),
            title: r.Title||"Untitled", body: r.Body||"", updatedAt: r.UpdatedAt||new Date().toISOString(),
          }));
        }
        if (wb.SheetNames.includes("Settings")) {
          const rows = XLSX.utils.sheet_to_json(wb.Sheets["Settings"]);
          if (rows.length > 0 && rows[0].AccountBalance != null) importedBalance = parseFloat(rows[0].AccountBalance);
        }
        if (!importedTrades && !importedNotes && importedBalance == null) {
          setStatus({ ok:false, msg:"❌ File tidak dikenali." });
          return;
        }
        onImport({ trades: importedTrades, notes: importedNotes, balance: importedBalance });
        setStatus({ ok:true, msg:`✅ Import ${importedTrades?.length||0} trades, ${importedNotes?.length||0} notes` });
      } catch(err) {
        setStatus({ ok:false, msg:"❌ Gagal baca file: "+err.message });
      }
    };
    reader.readAsArrayBuffer(file);
    e.target.value = "";
  };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.5)", display:"flex", alignItems:"flex-end", zIndex:200, backdropFilter:"blur(4px)" }} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{ width:"100%", maxWidth:480, margin:"0 auto", background:G.white, borderRadius:"24px 24px 0 0", padding:"20px 20px 48px", maxHeight:"85vh", overflowY:"auto" }}>
        <div style={{ width:40, height:4, background:G.border, borderRadius:2, margin:"0 auto 20px" }} />
        <div style={{ fontSize:18, fontWeight:800, color:G.textPrimary, marginBottom:4 }}>Backup & Sync Data</div>
        <div style={{ fontSize:13, color:G.textMuted, marginBottom:24 }}>Export ke Excel untuk backup atau pindah device.</div>

        <div style={{ fontSize:12, color:G.textSecondary, fontWeight:700, letterSpacing:0.5, textTransform:"uppercase", marginBottom:10 }}>💾 Export</div>
        <button onClick={handleExport} style={{ width:"100%", padding:"15px 16px", background:G.green, border:"none", borderRadius:14, color:"#fff", fontSize:14, fontWeight:800, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:10, marginBottom:6, boxShadow:"0 4px 16px rgba(0,170,19,0.25)" }}>
          <span style={{ fontSize:18 }}>📥</span> Download Excel (.xlsx)
        </button>
        <div style={{ fontSize:12, color:G.textMuted, marginBottom:20 }}>Menyimpan {trades.length} trades, {notes.length} notes, dan balance</div>

        <div style={{ fontSize:12, color:G.textSecondary, fontWeight:700, letterSpacing:0.5, textTransform:"uppercase", marginBottom:10 }}>📂 Import</div>
        <input ref={fileRef} type="file" accept=".xlsx,.xls" onChange={handleFileChange} style={{ display:"none" }}/>
        <button onClick={()=>fileRef.current?.click()} style={{ width:"100%", padding:"15px 16px", background:G.bg, border:`2px dashed ${G.border}`, borderRadius:14, color:G.textSecondary, fontSize:14, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:10, marginBottom:6 }}>
          <span style={{ fontSize:18 }}>📁</span> Pilih file .xlsx
        </button>
        <div style={{ fontSize:12, color:G.red, marginBottom:20, fontWeight:600 }}>⚠️ Import akan mengganti semua data yang ada</div>

        {status && (
          <div style={{ padding:"12px 14px", borderRadius:12, background:status.ok?G.greenLight:G.redLight, border:`1px solid ${status.ok?G.green:G.red}33`, fontSize:13, color:status.ok?G.green:G.red, fontWeight:700, marginBottom:16 }}>
            {status.msg}
          </div>

// ─── Calendar View ─────────────────────────────────────────────────────────────
function CalendarView({ trades }) {
  const now = new Date();
  const [year, setYear] = useState(now.getFullYear());
  const [month, setMonth] = useState(now.getMonth());
  const dayMap = {};
  trades.forEach(t => { dayMap[t.date] = (dayMap[t.date]||0) + t.pnl; });
  const cells = getCalendarDays(year, month);
  const prev = () => { if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1); };
  const next = () => { if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1); };
  const monthPnl = Object.entries(dayMap).filter(([k])=>k.startsWith(`${year}-${String(month+1).padStart(2,"0")}`)).reduce((a,[,v])=>a+v,0);
  return (
    <div style={{ background:G.white, borderRadius:20, padding:"16px", boxShadow:G.shadow }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
        <button onClick={prev} style={{ background:G.bg, border:"none", color:G.textSecondary, fontSize:18, cursor:"pointer", padding:"8px 14px", borderRadius:10, fontWeight:800 }}>‹</button>
        <div style={{ textAlign:"center" }}>
          <div style={{ fontSize:16, fontWeight:800, color:G.textPrimary }}>{MONTHS[month]} {year}</div>
          <div style={{ fontSize:13, color:clr(monthPnl), fontWeight:700 }}>{fmt(monthPnl)}</div>
        </div>
        <button onClick={next} style={{ background:G.bg, border:"none", color:G.textSecondary, fontSize:18, cursor:"pointer", padding:"8px 14px", borderRadius:10, fontWeight:800 }}>›</button>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:4, marginBottom:4 }}>
        {DAYS.map(d=><div key={d} style={{ textAlign:"center", fontSize:10, color:G.textMuted, fontWeight:700, padding:"4px 0" }}>{d}</div>)}
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:4 }}>
        {cells.map((day,i)=>{
          if(!day) return <div key={`e${i}`}/>;
          const key=`${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
          const pnl=dayMap[key];
          const isToday=key===todayStr();
          return (
            <div key={key} style={{ borderRadius:10, padding:"6px 2px", textAlign:"center", background:pnl!==undefined?clrBg(pnl):isToday?G.greenLight:"transparent", border:isToday?`2px solid ${G.green}`:"2px solid transparent", minHeight:46 }}>
              <div style={{ fontSize:11, color:G.textSecondary, fontWeight:700 }}>{day}</div>
              {pnl!==undefined&&<div style={{ fontSize:8, color:clr(pnl), fontWeight:800, marginTop:2, lineHeight:1.2 }}>{pnl>0?"+":"−"}${Math.abs(pnl).toLocaleString()}</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Note Editor ──────────────────────────────────────────────────────────────
function NoteEditor({ note, onBack, onSave, onDelete }) {
  const [title, setTitle] = useState(note.title || "");
  const [body,  setBody]  = useState(note.body  || "");
  const saveTimer = useRef(null);
  const isNew = !note.id;
  const noteRef = useRef(note);
  noteRef.current = note;
  const triggerSave = useCallback((t, b) => {
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      onSave({ ...noteRef.current, id: noteRef.current.id||Date.now(), title:t.trim()||"Untitled", body:b, updatedAt:new Date().toISOString() }, false);
    }, 800);
  }, [onSave]);
  const handleTitle = (v) => { setTitle(v); triggerSave(v, body); };
  const handleBody  = (v) => { setBody(v);  triggerSave(title, v); };
  const handleBack = () => {
    if (saveTimer.current) clearTimeout(saveTimer.current);
    if (title.trim()||body.trim()) onSave({ ...noteRef.current, id:noteRef.current.id||Date.now(), title:title.trim()||"Untitled", body, updatedAt:new Date().toISOString() }, true);
    else onBack();
  };
  return (
    <div style={{ position:"fixed", inset:0, background:G.white, zIndex:150, display:"flex", flexDirection:"column", maxWidth:480, margin:"0 auto", left:0, right:0 }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"52px 16px 14px", borderBottom:`1px solid ${G.border}`, background:G.white }}>
        <button onClick={handleBack} style={{ background:"none", border:"none", color:G.green, fontSize:15, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", gap:4 }}>
          <span style={{ fontSize:22 }}>‹</span> Notes
        </button>
        {!isNew && <button onClick={()=>onDelete(note.id)} style={{ background:G.redLight, border:"none", borderRadius:10, color:G.red, fontSize:12, fontWeight:700, padding:"7px 14px", cursor:"pointer" }}>Hapus</button>}
      </div>
      <div style={{ flex:1, overflowY:"auto", padding:"20px 20px 40px" }}>
        <textarea value={title} onChange={e=>handleTitle(e.target.value)} placeholder="Judul" rows={1} style={{ width:"100%", background:"none", border:"none", outline:"none", color:G.textPrimary, fontSize:22, fontWeight:800, fontFamily:"'Plus Jakarta Sans',sans-serif", resize:"none", lineHeight:1.3, marginBottom:10, boxSizing:"border-box", overflow:"hidden" }}/>
        <div style={{ fontSize:12, color:G.textMuted, marginBottom:18 }}>{new Date().toLocaleDateString("id-ID",{ weekday:"long",year:"numeric",month:"long",day:"numeric" })}</div>
        <textarea value={body} onChange={e=>handleBody(e.target.value)} placeholder="Mulai menulis..." style={{ width:"100%", background:"none", border:"none", outline:"none", color:G.textSecondary, fontSize:16, fontFamily:"'Plus Jakarta Sans',sans-serif", resize:"none", lineHeight:1.8, boxSizing:"border-box", minHeight:"62vh" }}/>
      </div>
    </div>
  );
}

      <div style={{ background:G.white, borderRadius:16, padding:"16px", marginBottom:12, boxShadow:G.shadow }}>

        ) : (
          <div style={{ fontSize:13, color:G.textMuted }}>Menggunakan: <span style={{ color:G.green, fontWeight:800 }}>{fmtBal(currentBalance)}</span></div>
        )}
      </div>

      {/* Risk % selector */}
      <div style={{ background:G.white, borderRadius:16, padding:"16px", marginBottom:16, boxShadow:G.shadow }}>
        <div style={{ fontSize:12, color:G.textSecondary, fontWeight:700, letterSpacing:0.5, textTransform:"uppercase", marginBottom:12 }}>Risk Per Trade (%)</div>

          {["0.5","1","2"].map(p=>(
            <button key={p} onClick={()=>{ setRiskPct(p); setResult(null); }} style={{ flex:1, padding:"11px", borderRadius:12, fontSize:14, fontWeight:800, border:"none", background:riskPct===p?G.yellow:G.bg, color:riskPct===p?"#fff":G.textSecondary, cursor:"pointer" }}>{p}%</button>

      <button onClick={handleCalc} style={{ width:"100%", padding:"17px", background:G.green, border:"none", borderRadius:16, color:"#fff", fontSize:16, fontWeight:800, cursor:"pointer", marginBottom:16, boxShadow:"0 4px 16px rgba(0,170,19,0.35)" }}>

      {result && (
        <div style={{ background:`linear-gradient(135deg, ${G.yellowLight}, #FFF8E8)`, border:`1.5px solid ${G.yellow}55`, borderRadius:20, padding:"22px 20px", textAlign:"center", marginBottom:16 }}>

        </div>
      )}

      <div style={{ padding:"14px 16px", background:G.greenLight, borderRadius:14, border:`1px solid ${G.green}33` }}>

      </div>
    </div>
  );
}

            {/* Stats */}
            <div style={{ display:"flex", gap:10, marginBottom:10 }}>
              <StatCard label="Win Rate" value={`${winRate}%`} sub={`${wins.length}W / ${losses.length}L`} valueColor={winRate>=50?G.green:G.red}/>
              <StatCard label="Avg RR" value={`${avgRR}R`} sub={`${trades.length} trades`}/>
            </div>
            <div style={{ display:"flex", gap:10, marginBottom:16 }}>
              <StatCard label="Avg Win" value={avgWin?`+$${Math.round(avgWin)}`:"—"} valueColor={G.green}/>
              <StatCard label="Avg Loss" value={avgLoss?`−$${Math.abs(Math.round(avgLoss))}`:"—"} valueColor={G.red}/>
            </div>

            {/* Equity curve */}
            {equityData.length>1 && (
              <div style={{ background:G.white, borderRadius:20, padding:"16px", marginBottom:16, boxShadow:G.shadow }}>
                <div style={{ fontSize:12, color:G.textMuted, fontWeight:700, letterSpacing:0.5, textTransform:"uppercase", marginBottom:12 }}>Kurva Ekuitas</div>
                <div style={{ display:"flex", alignItems:"flex-end", gap:3, height:60 }}>
                  {equityData.slice(-20).map((p,i)=>{
                    const min=Math.min(...equityData.map(e=>e.v)), max=Math.max(...equityData.map(e=>e.v)), range=max-min||1;
                    const h=Math.max(4,((p.v-min)/range)*52);
                    const isUp=i===0||p.v>=equityData[Math.max(0,equityData.length-20+i-1)].v;
                    return <div key={i} style={{ flex:1, height:h, borderRadius:4, background:isUp?G.green:G.red, opacity:0.85 }}/>;
                  })}
                </div>
                <div style={{ display:"flex", justifyContent:"space-between", marginTop:6 }}>
                  <span style={{ fontSize:10, color:G.textMuted, fontWeight:600 }}>Lama</span><span style={{ fontSize:10, color:G.textMuted, fontWeight:600 }}>Terbaru</span>
                </div>
              </div>
            )}

            {/* Recent trades */}
            <div style={{ fontSize:13, color:G.textSecondary, fontWeight:700, letterSpacing:0.3, textTransform:"uppercase", marginBottom:12 }}>Trade Terkini</div>
            {sorted.slice(0,5).map(t=><TradeRow key={t.id} trade={t} onPress={()=>setTradeModal(t)}/>)}
            {sorted.length>5 && <div onClick={()=>setTab("log")} style={{ textAlign:"center", color:G.green, fontSize:13, fontWeight:800, padding:"14px", cursor:"pointer", background:G.white, borderRadius:14, boxShadow:G.shadow, marginTop:4 }}>Lihat semua {sorted.length} trades →</div>}
            {trades.length===0 && (
              <div style={{ textAlign:"center", padding:"40px 20px", background:G.white, borderRadius:20, boxShadow:G.shadow }}>
                <div style={{ fontSize:48, marginBottom:12 }}>📈</div>
                <div style={{ fontSize:16, fontWeight:800, color:G.textSecondary, marginBottom:6 }}>Belum ada trades</div>
                <div style={{ fontSize:13, color:G.textMuted, marginBottom:16 }}>Tap tombol Log Trade untuk mulai</div>
                <button onClick={()=>setTradeModal({})} style={{ padding:"12px 24px", background:G.green, border:"none", borderRadius:12, color:"#fff", fontSize:14, fontWeight:800, cursor:"pointer" }}>+ Log Trade Pertama</button>
              </div>
            )}
          </>
        )}

        {tab==="log" && (
          <>
            <div style={{ fontSize:13, color:G.textSecondary, fontWeight:700, letterSpacing:0.3, textTransform:"uppercase", marginBottom:14 }}>Semua Trades · {sorted.length} total</div>
            {sorted.map(t=><TradeRow key={t.id} trade={t} onPress={()=>setTradeModal(t)}/>)}
            {trades.length===0 && (
              <div style={{ textAlign:"center", padding:"60px 20px", background:G.white, borderRadius:20, boxShadow:G.shadow }}>
                <div style={{ fontSize:48, marginBottom:12 }}>📋</div>
                <div style={{ fontSize:15, fontWeight:700, color:G.textSecondary }}>Belum ada trades yang dicatat.</div>
              </div>
            )}
          </>
        )}

        {tab==="calendar" && <CalendarView trades={trades}/>}

        {tab==="notes" && (
          <>
            <div style={{ fontSize:13, color:G.textMuted, fontWeight:700, marginBottom:14 }}>{notes.length} {notes.length===1?"catatan":"catatan"}</div>
            <NotesList notes={notes} onOpen={n=>setOpenNote(n)}/>
          </>
        )}

        {tab==="risk" && <RiskManagement accountBalance={accountBalance} totalPnl={totalPnl}/>}

      </div>

      {/* Bottom Nav — Gojek style */}
      <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:480, background:G.white, borderTop:`1px solid ${G.border}`, display:"flex", padding:"10px 0 24px", boxShadow:"0 -4px 20px rgba(0,0,0,0.08)" }}>
        {[
          { id:"dashboard", icon:"🏠", label:"Beranda" },
          { id:"log",       icon:"📋", label:"Log"      },
          { id:"calendar",  icon:"📅", label:"Kalender" },
          { id:"risk",      icon:"🛡️",  label:"Risk"     },
          { id:"notes",     icon:"🗒️",  label:"Notes"    },
        ].map(({ id, icon, label }) => {
          const active = tab === id;
          return (
            <button key={id} onClick={()=>setTab(id)} className="ripple" style={{ flex:1, background:"none", border:"none", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:3, padding:"4px 0" }}>
              <div style={{ width:36, height:36, borderRadius:10, background:active?G.greenLight:"transparent", display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, transition:"background 0.15s" }}>
                {icon}
              </div>
              <span style={{ fontSize:10, fontWeight:700, color:active?G.green:G.textMuted, transition:"color 0.15s" }}>{label}</span>
            </button>
          );
        })}
      </div>

      {/* Modals */}
      {tradeModal !== null && <TradeModal trade={tradeModal} onSave={handleSaveTrade} onDelete={handleDeleteTrade} onClose={()=>setTradeModal(null)}/>}
      {balanceModal && <BalanceModal currentBalance={accountBalance} onSave={handleSaveBalance} onClose={()=>setBalanceModal(false)}/>}
      {dataModal && <DataModal trades={trades} notes={notes} accountBalance={accountBalance} onImport={handleImport} onClearAll={handleClearAll} onClose={()=>setDataModal(false)}/>}

    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<TradingJournal />);
</script>
</body>
</html>
