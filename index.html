<script type="text/babel">
const { useState, useEffect, useCallback, useRef, createContext, useContext } = React;

const BreakpointCtx = createContext({ isDesktop: false, isTablet: false });
function useBreakpoint() { return useContext(BreakpointCtx); }
function useWindowWidth() {
  const [w, setW] = useState(typeof window !== "undefined" ? window.innerWidth : 375);
  useEffect(() => {
    const h = () => setW(window.innerWidth);
    window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);
  return w;
}

// ─── Supabase Config ──────────────────────────────────────────────────────────
const SUPABASE_URL = "https://ravlncpwpxdzwagojblh.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJhdmxuY3B3cHhkendhZ29qYmxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MTU3MDIsImV4cCI6MjA5MzM5MTcwMn0.n68uMBfS8iSC3ViYzkMKvZFKJrGfafyGtiIL8v82h2w";
const SB_HEADERS = { "Content-Type": "application/json", "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` };

async function sbGet(key) {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/journal_data?key=eq.${encodeURIComponent(key)}&select=value`, { headers: SB_HEADERS });
    if (!res.ok) return null;
    const rows = await res.json();
    return rows.length > 0 ? JSON.parse(rows[0].value) : null;
  } catch { return null; }
}
async function sbSet(key, value) {
  try {
    const body = JSON.stringify({ key, value: JSON.stringify(value) });
    await fetch(`${SUPABASE_URL}/rest/v1/journal_data`, {
      method: "POST",
      headers: { ...SB_HEADERS, "Prefer": "resolution=merge-duplicates" },
      body
    });
  } catch {}
  try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
}
async function loadData(key, fallback) {
  try { const cloud = await sbGet(key); if (cloud !== null) return cloud; } catch {}
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
async function saveData(key, data) { await sbSet(key, data); }

const STRATEGIES = [
  "ICT / SMC","VWAP Fade","Opening Range","Trend Follow",
  "Mean Revert","News Play","Scalp","Breakout","Other",
];
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DAYS   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const DEFAULT_BALANCE = 10000;

// Account colors palette
const ACC_COLORS = ["#00AA13","#2563EB","#9333EA","#EA580C","#0891B2","#DB2777","#65A30D","#D97706"];

const G = {
  green:        "#00AA13",
  greenDark:    "#007D0C",
  greenLight:   "#E8F8EA",
  greenMid:     "#00C116",
  yellow:       "#F9A215",
  yellowLight:  "#FFF3DC",
  red:          "#E02020",
  redLight:     "#FDEAEA",
  white:        "#FFFFFF",
  bg:           "#F5F5F5",
  card:         "#FFFFFF",
  textPrimary:  "#1A1A1A",
  textSecondary:"#6B6B6B",
  textMuted:    "#9E9E9E",
  border:       "#EBEBEB",
  shadow:       "0 2px 12px rgba(0,0,0,0.08)",
  shadowMd:     "0 4px 24px rgba(0,0,0,0.12)",
};

const fmt    = (n) => { const a = Math.abs(n).toLocaleString("en-US",{maximumFractionDigits:0}); return (n>=0?"+":"−")+"$"+a; };
const fmtPct = (n) => (n>=0?"+":"")+n.toFixed(1)+"%";
const clr    = (n) => n>0?G.green:n<0?G.red:G.textMuted;
const clrBg  = (n) => n>0?G.greenLight:n<0?G.redLight:"#F5F5F5";
const fmtBal = (n) => "$"+Number(n).toLocaleString("en-US",{maximumFractionDigits:2});

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function fmtNoteDate(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diffDays = Math.floor((now - d) / 86400000);
  if (diffDays === 0) return d.toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" });
  if (diffDays === 1) return "Yesterday";
  if (diffDays < 7)  return DAYS[d.getDay()];
  return `${d.getDate()} ${MONTHS[d.getMonth()]}`;
}
function getCalendarDays(year, month) {
  const first = new Date(year, month, 1).getDay();
  const total = new Date(year, month+1, 0).getDate();
  const cells = [];
  for (let i=0;i<first;i++) cells.push(null);
  for (let d=1;d<=total;d++) cells.push(d);
  return cells;
}
function newAccountId() { return "acc_" + Date.now() + "_" + Math.random().toString(36).slice(2,7); }

        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <AppIcon size={36}/>
          <div>
            <div style={{ fontSize:11, color:"rgba(255,255,255,0.7)", fontWeight:600, letterSpacing:0.5, marginBottom:2 }}>Hello, Rocco 👋</div>

          {account && <AccountBadge account={account} onClick={onSwitchAccount}/>}
          <div style={{ display:"flex", gap:6 }}>
            <button onClick={onBackup} className="ripple" style={{ background:"rgba(255,255,255,0.2)", border:"none", borderRadius:12, width:38, height:38, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", backdropFilter:"blur(4px)" }}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>

// ─── StatCard ─────────────────────────────────────────────────────────────────
function StatCard({ label, value, sub, valueColor }) {

    <div style={{ background:G.white, borderRadius:16, padding:"16px", flex:1, minWidth:0, boxShadow:G.shadow, border:`1px solid ${G.border}` }}>

function TradeRow({ trade, onPress }) {

        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={isWin?G.green:isLoss?G.red:G.textMuted} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
          {isWin ? <><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></> :
           isLoss ? <><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></> :

// ─── Trade Modal ──────────────────────────────────────────────────────────────
function TradeModal({ trade, onSave, onDelete, onClose }) {
  const { isDesktop } = useBreakpoint();
  const isNew = !trade.id;
  const [form, setForm] = useState({
    date: trade.date || todayStr(),
    pnl:  trade.pnl !== undefined ? String(trade.pnl) : "",
    rr:   trade.rr  !== undefined ? String(trade.rr)  : "",
    strategy: trade.strategy || STRATEGIES[0],
    notes: trade.notes || "",
  });
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const handleSave = () => {
    if (!form.date || form.pnl==="") return;
    onSave({ id:trade.id||Date.now(), date:form.date, pnl:parseFloat(form.pnl)||0, rr:parseFloat(form.rr)||0, strategy:form.strategy, notes:form.notes });
  };
  const inp = { width:"100%", background:G.bg, border:`1.5px solid ${G.border}`, borderRadius:12, color:G.textPrimary, fontSize:15, padding:"13px 14px", outline:"none", boxSizing:"border-box", fontFamily:"'Plus Jakarta Sans',sans-serif", fontWeight:600 };
  const lbl = { fontSize:12, color:G.textSecondary, fontWeight:700, letterSpacing:0.3, marginBottom:6, display:"block" };
  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.5)", display:"flex", alignItems: isDesktop ? "center" : "flex-end", justifyContent:"center", zIndex:200, backdropFilter:"blur(4px)", padding: isDesktop ? "0 20px" : 0 }} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{ width:"100%", maxWidth: isDesktop ? 520 : 480, margin:"0 auto", background:G.white, borderRadius: isDesktop ? 24 : "24px 24px 0 0", padding: isDesktop ? "28px 24px" : "20px 20px 40px", maxHeight:"92vh", overflowY:"auto" }}>
        <div style={{ width:40, height:4, background:G.border, borderRadius:2, margin:"0 auto 20px" }} />
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:24 }}>
          <span style={{ fontSize:18, fontWeight:800, color:G.textPrimary }}>{isNew?"Log Trade":"Edit Trade"}</span>
          {!isNew && <button onClick={()=>onDelete(trade.id)} style={{ background:G.redLight, border:"none", borderRadius:10, color:G.red, fontSize:12, fontWeight:700, padding:"8px 14px", cursor:"pointer" }}>Delete</button>}
        </div>
        <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
          <div><label style={lbl}>Date</label><input type="date" value={form.date} onChange={e=>set("date",e.target.value)} style={inp}/></div>
          <div style={{ display:"flex", gap:12 }}>
            <div style={{ flex:1 }}>
              <label style={lbl}>P&L ($)</label>
              <input type="number" placeholder="e.g. 250 or -100" value={form.pnl} onChange={e=>set("pnl",e.target.value)} style={{...inp, color:form.pnl?clr(parseFloat(form.pnl)):G.textPrimary, borderColor:form.pnl?(parseFloat(form.pnl)>0?G.green:parseFloat(form.pnl)<0?G.red:G.border):G.border}}/>
            </div>
            <div style={{ flex:1 }}>
              <label style={lbl}>Risk:Reward</label>
              <input type="number" step="0.1" placeholder="e.g. 2.5" value={form.rr} onChange={e=>set("rr",e.target.value)} style={inp}/>
            </div>
          </div>
          <div>
            <label style={lbl}>Strategy</label>
            <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
              {STRATEGIES.map(s=>(
                <button key={s} onClick={()=>set("strategy",s)} style={{ padding:"8px 14px", borderRadius:20, fontSize:12, fontWeight:700, border:"none", background:form.strategy===s?G.green:G.bg, color:form.strategy===s?"#fff":G.textSecondary, cursor:"pointer" }}>{s}</button>
              ))}
            </div>
          </div>
          <div><label style={lbl}>Trade Notes</label><textarea placeholder="Setup, execution, lessons..." value={form.notes} onChange={e=>set("notes",e.target.value)} rows={3} style={{...inp,resize:"none",lineHeight:1.6}}/></div>
        </div>
        <button onClick={handleSave} style={{ width:"100%", marginTop:24, padding:"17px", background:G.green, border:"none", borderRadius:16, color:"#fff", fontSize:16, fontWeight:800, cursor:"pointer", boxShadow:"0 4px 16px rgba(0,170,19,0.35)" }}>
          {isNew?"Save Trade":"Update Trade"}
        </button>
      </div>
    </div>
  );
}

// ─── Balance Modal ─────────────────────────────────────────────────────────────

        <div style={{ textAlign:"center", marginBottom:24 }}>
          <div style={{ width:56, height:56, background:G.greenLight, borderRadius:16, display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 12px" }}>

              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
            </svg>
          </div>
          <div style={{ fontSize:18, fontWeight:800, color:G.textPrimary }}>Set Account Balance</div>
          <div style={{ fontSize:13, color:G.textMuted, marginTop:4 }}>Starting / current balance — not added to P&L</div>
        </div>
        <input type="number" value={val} onChange={e=>setVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSave()} autoFocus placeholder="e.g. 50000" style={{ width:"100%", background:G.bg, border:`1.5px solid ${G.border}`, borderRadius:14, color:G.textPrimary, fontSize:24, fontWeight:800, padding:"14px 16px", outline:"none", textAlign:"center", fontFamily:"'Plus Jakarta Sans',sans-serif" }}/>

          <button onClick={handleSave} style={{ flex:2, padding:"14px", background:G.green, border:"none", borderRadius:14, color:"#fff", fontSize:15, fontWeight:800, cursor:"pointer", boxShadow:"0 4px 16px rgba(0,170,19,0.3)" }}>Confirm</button>
        </div>
      </div>
    </div>
  );
}

// ─── Account Manager Modal ─────────────────────────────────────────────────────
function AccountManagerModal({ accounts, activeId, onSwitch, onAdd, onEdit, onDelete, onClose }) {
  const [mode, setMode] = useState("list"); // list | add | edit
  const [editTarget, setEditTarget] = useState(null);
  const [form, setForm] = useState({ name:"", color: ACC_COLORS[0], balance: "" });
  const [confirmDelete, setConfirmDelete] = useState(null);

  const openAdd = () => { setForm({ name:"", color: ACC_COLORS[accounts.length % ACC_COLORS.length], balance:"" }); setMode("add"); };
  const openEdit = (acc) => { setEditTarget(acc); setForm({ name:acc.name, color:acc.color, balance:String(acc.balance||DEFAULT_BALANCE) }); setMode("edit"); };
  const handleSave = () => {
    if (!form.name.trim()) return;
    const bal = parseFloat(form.balance) || DEFAULT_BALANCE;
    if (mode==="add") onAdd({ name:form.name.trim(), color:form.color, balance:bal });
    else onEdit({ ...editTarget, name:form.name.trim(), color:form.color, balance:bal });
    setMode("list");
  };

  const inp = { width:"100%", background:G.bg, border:`1.5px solid ${G.border}`, borderRadius:12, color:G.textPrimary, fontSize:15, padding:"13px 14px", outline:"none", boxSizing:"border-box", fontFamily:"'Plus Jakarta Sans',sans-serif", fontWeight:600 };
  const lbl = { fontSize:12, color:G.textSecondary, fontWeight:700, letterSpacing:0.3, marginBottom:6, display:"block" };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.5)", display:"flex", alignItems:"flex-end", justifyContent:"center", zIndex:300, backdropFilter:"blur(4px)" }} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{ width:"100%", maxWidth:480, margin:"0 auto", background:G.white, borderRadius:"24px 24px 0 0", padding:"20px 20px 48px", maxHeight:"85vh", overflowY:"auto" }}>
        <div style={{ width:40, height:4, background:G.border, borderRadius:2, margin:"0 auto 20px" }}/>

        {/* List mode */}
        {mode==="list" && <>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
            <div style={{ fontSize:18, fontWeight:800, color:G.textPrimary }}>Trading Accounts</div>
            <button onClick={openAdd} style={{ background:G.green, border:"none", borderRadius:10, color:"#fff", fontSize:13, fontWeight:700, padding:"8px 14px", cursor:"pointer", display:"flex", alignItems:"center", gap:6 }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Add Account
            </button>
          </div>
          {accounts.map(acc => (
            <div key={acc.id} style={{ display:"flex", alignItems:"center", gap:12, background: acc.id===activeId ? G.greenLight : G.bg, border:`1.5px solid ${acc.id===activeId?G.green:G.border}`, borderRadius:16, padding:"14px 16px", marginBottom:10, cursor:"pointer" }} onClick={()=>{ onSwitch(acc.id); onClose(); }}>
              <div style={{ width:40, height:40, borderRadius:"50%", background:acc.color, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, boxShadow:"0 2px 8px rgba(0,0,0,0.15)" }}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
              </div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                  <span style={{ fontSize:15, fontWeight:800, color:G.textPrimary }}>{acc.name}</span>
                  {acc.id===activeId && <span style={{ fontSize:10, background:G.green, color:"#fff", borderRadius:20, padding:"2px 8px", fontWeight:700 }}>ACTIVE</span>}
                </div>
                <div style={{ fontSize:12, color:G.textMuted, marginTop:2 }}>Balance: {fmtBal(acc.balance||DEFAULT_BALANCE)}</div>
              </div>
              <button onClick={e=>{ e.stopPropagation(); openEdit(acc); }} style={{ background:"none", border:`1px solid ${G.border}`, borderRadius:8, padding:"6px 10px", cursor:"pointer", color:G.textMuted, fontSize:12, fontWeight:600 }}>Edit</button>
              {accounts.length > 1 && (
                confirmDelete===acc.id ? (
                  <div style={{ display:"flex", gap:4 }} onClick={e=>e.stopPropagation()}>
                    <button onClick={e=>{ e.stopPropagation(); setConfirmDelete(null); }} style={{ background:G.bg, border:"none", borderRadius:8, padding:"6px 8px", cursor:"pointer", fontSize:11, color:G.textMuted, fontWeight:600 }}>No</button>
                    <button onClick={e=>{ e.stopPropagation(); onDelete(acc.id); setConfirmDelete(null); }} style={{ background:G.red, border:"none", borderRadius:8, padding:"6px 8px", cursor:"pointer", fontSize:11, color:"#fff", fontWeight:700 }}>Delete</button>
                  </div>
                ) : (
                  <button onClick={e=>{ e.stopPropagation(); setConfirmDelete(acc.id); }} style={{ background:G.redLight, border:"none", borderRadius:8, padding:"6px 8px", cursor:"pointer" }}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={G.red} strokeWidth="2" strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                  </button>
                )
              )}
            </div>
          ))}
        </>}

        {/* Add/Edit mode */}
        {(mode==="add"||mode==="edit") && <>
          <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:20 }}>
            <button onClick={()=>setMode("list")} style={{ background:"none", border:"none", cursor:"pointer", color:G.green, fontSize:22, fontWeight:700, padding:0, lineHeight:1 }}>‹</button>
            <div style={{ fontSize:18, fontWeight:800, color:G.textPrimary }}>{mode==="add"?"New Account":"Edit Account"}</div>
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
            <div>
              <label style={lbl}>Account Nickname</label>
              <input type="text" placeholder="e.g. FTMO Main, Apex Eval, PA Live" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} style={inp} autoFocus/>
            </div>
            <div>
              <label style={lbl}>Starting Balance ($)</label>
              <input type="number" placeholder={`e.g. ${DEFAULT_BALANCE}`} value={form.balance} onChange={e=>setForm(f=>({...f,balance:e.target.value}))} style={inp}/>
            </div>
            <div>
              <label style={lbl}>Account Color</label>
              <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
                {ACC_COLORS.map(c=>(
                  <button key={c} onClick={()=>setForm(f=>({...f,color:c}))} style={{ width:36, height:36, borderRadius:"50%", background:c, border: form.color===c ? "3px solid #1A1A1A" : "3px solid transparent", cursor:"pointer", flexShrink:0, outline:"none", boxShadow: form.color===c?"0 0 0 2px #fff, 0 0 0 4px "+c:"none" }}/>
                ))}
              </div>
            </div>
          </div>
          <div style={{ display:"flex", gap:10, marginTop:24 }}>
            <button onClick={()=>setMode("list")} style={{ flex:1, padding:"14px", background:G.bg, border:"none", borderRadius:14, color:G.textSecondary, fontSize:15, fontWeight:700, cursor:"pointer" }}>Cancel</button>
            <button onClick={handleSave} style={{ flex:2, padding:"14px", background:form.color||G.green, border:"none", borderRadius:14, color:"#fff", fontSize:15, fontWeight:800, cursor:"pointer" }}>
              {mode==="add"?"Create Account":"Save Changes"}
            </button>
          </div>
        </>}
      </div>
    </div>
  );
}

// ─── Data Backup Modal ────────────────────────────────────────────────────────
function DataModal({ trades, notes, account, onImport, onClearAll, onClose }) {
  const fileRef = useRef(null);
  const [status, setStatus] = useState(null);
  const [confirmClear, setConfirmClear] = useState(false);

  const handleExport = () => {
    try {
      const wb = XLSX.utils.book_new();
      const tradeRows = trades.length
        ? trades.map(t => ({ Date: t.date, PnL_USD: t.pnl, RR: t.rr, Strategy: t.strategy, Notes: t.notes||"", _id: t.id }))
        : [{ Date:"", PnL_USD:"", RR:"", Strategy:"", Notes:"", _id:"" }];
      const ws1 = XLSX.utils.json_to_sheet(tradeRows);
      ws1["!cols"] = [{ wch:12 },{ wch:10 },{ wch:6 },{ wch:16 },{ wch:40 },{ wch:16 }];
      XLSX.utils.book_append_sheet(wb, ws1, "Trades");
      const noteRows = notes.length
        ? notes.map(n => ({ Title: n.title, Body: n.body||"", UpdatedAt: n.updatedAt, _id: n.id }))
        : [{ Title:"", Body:"", UpdatedAt:"", _id:"" }];
      const ws2 = XLSX.utils.json_to_sheet(noteRows);
      XLSX.utils.book_append_sheet(wb, ws2, "Notes");
      const ws3 = XLSX.utils.json_to_sheet([{ AccountName: account?.name||"", AccountBalance: account?.balance||DEFAULT_BALANCE, ExportedAt: new Date().toISOString() }]);
      XLSX.utils.book_append_sheet(wb, ws3, "Settings");
      XLSX.writeFile(wb, `trading-journal-${account?.name?.replace(/\s+/g,"-")||"account"}-${todayStr()}.xlsx`);
      setStatus({ ok:true, msg:`✓ Exported ${trades.length} trades, ${notes.length} notes` });
    } catch(e) { setStatus({ ok:false, msg:"Export failed: "+e.message }); }
  };

  const handleFileChange = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setStatus(null);
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const wb = XLSX.read(new Uint8Array(ev.target.result), { type:"array" });
        let importedTrades = null, importedNotes = null, importedBalance = null;
        if (wb.SheetNames.includes("Trades")) {
          const rows = XLSX.utils.sheet_to_json(wb.Sheets["Trades"]);
          importedTrades = rows.filter(r => r.Date).map(r => ({
            id: r._id || Date.now() + Math.random(),
            date: String(r.Date), pnl: parseFloat(r.PnL_USD)||0,
            rr: parseFloat(r.RR)||0, strategy: r.Strategy||"Other", notes: r.Notes||"",
          }));
        }
        if (wb.SheetNames.includes("Notes")) {
          const rows = XLSX.utils.sheet_to_json(wb.Sheets["Notes"]);
          importedNotes = rows.filter(r => r.Title).map(r => ({
            id: r._id || Date.now() + Math.random(),
            title: r.Title||"Untitled", body: r.Body||"", updatedAt: r.UpdatedAt||new Date().toISOString(),
          }));
        }
        if (wb.SheetNames.includes("Settings")) {
          const rows = XLSX.utils.sheet_to_json(wb.Sheets["Settings"]);
          if (rows.length > 0 && rows[0].AccountBalance != null) importedBalance = parseFloat(rows[0].AccountBalance);
        }
        if (!importedTrades && !importedNotes && importedBalance == null) { setStatus({ ok:false, msg:"File not recognized." }); return; }
        onImport({ trades: importedTrades, notes: importedNotes, balance: importedBalance });
        setStatus({ ok:true, msg:`✓ Imported ${importedTrades?.length||0} trades, ${importedNotes?.length||0} notes` });
      } catch(err) { setStatus({ ok:false, msg:"Failed to read file: "+err.message }); }
    };
    reader.readAsArrayBuffer(file);
    e.target.value = "";
  };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.5)", display:"flex", alignItems:"flex-end", zIndex:200, backdropFilter:"blur(4px)" }} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{ width:"100%", maxWidth:480, margin:"0 auto", background:G.white, borderRadius:"24px 24px 0 0", padding:"20px 20px 48px", maxHeight:"85vh", overflowY:"auto" }}>
        <div style={{ width:40, height:4, background:G.border, borderRadius:2, margin:"0 auto 20px" }} />
        <div style={{ fontSize:18, fontWeight:800, color:G.textPrimary, marginBottom:4 }}>Backup & Sync</div>
        <div style={{ fontSize:13, color:G.textMuted, marginBottom:6 }}>Exporting trades from: <span style={{ fontWeight:700, color:G.textPrimary }}>{account?.name}</span></div>
        <div style={{ fontSize:13, color:G.textMuted, marginBottom:24 }}>Export to Excel to back up or transfer to another device.</div>
        <div style={{ fontSize:12, color:G.textSecondary, fontWeight:700, letterSpacing:0.5, textTransform:"uppercase", marginBottom:10 }}>Export</div>
        <button onClick={handleExport} style={{ width:"100%", padding:"15px 16px", background:G.green, border:"none", borderRadius:14, color:"#fff", fontSize:14, fontWeight:800, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:10, marginBottom:6, boxShadow:"0 4px 16px rgba(0,170,19,0.25)" }}>
          Download Excel (.xlsx)
        </button>
        <div style={{ fontSize:12, color:G.textMuted, marginBottom:20 }}>Saves {trades.length} trades, {notes.length} notes, and balance</div>
        <div style={{ fontSize:12, color:G.textSecondary, fontWeight:700, letterSpacing:0.5, textTransform:"uppercase", marginBottom:10 }}>Import</div>
        <input ref={fileRef} type="file" accept=".xlsx,.xls" onChange={handleFileChange} style={{ display:"none" }}/>
        <button onClick={()=>fileRef.current?.click()} style={{ width:"100%", padding:"15px 16px", background:G.bg, border:`2px dashed ${G.border}`, borderRadius:14, color:G.textSecondary, fontSize:14, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:10, marginBottom:6 }}>
          Select .xlsx file
        </button>
        <div style={{ fontSize:12, color:G.red, marginBottom:20, fontWeight:600 }}>⚠ Import will replace trades for this account</div>
        {status && (
          <div style={{ padding:"12px 14px", borderRadius:12, background:status.ok?G.greenLight:G.redLight, border:`1px solid ${status.ok?G.green:G.red}33`, fontSize:13, color:status.ok?G.green:G.red, fontWeight:700, marginBottom:16 }}>
            {status.msg}
          </div>
        )}
        <div style={{ borderTop:`1px solid ${G.border}`, paddingTop:16 }}>
          <div style={{ fontSize:12, color:G.textMuted, fontWeight:700, letterSpacing:0.5, textTransform:"uppercase", marginBottom:10 }}>⚠ Danger Zone</div>
          {!confirmClear ? (
            <button onClick={()=>setConfirmClear(true)} style={{ width:"100%", padding:"14px", background:G.redLight, border:"none", borderRadius:14, color:G.red, fontSize:14, fontWeight:700, cursor:"pointer" }}>Clear This Account's Data</button>
          ) : (
            <div>
              <div style={{ fontSize:13, color:G.red, fontWeight:700, marginBottom:10, textAlign:"center" }}>Delete all trades for "{account?.name}"?</div>
              <div style={{ display:"flex", gap:8 }}>
                <button onClick={()=>setConfirmClear(false)} style={{ flex:1, padding:"12px", background:G.bg, border:"none", borderRadius:12, color:G.textSecondary, fontSize:13, fontWeight:700, cursor:"pointer" }}>Cancel</button>
                <button onClick={()=>{ onClearAll(); setConfirmClear(false); onClose(); }} style={{ flex:1, padding:"12px", background:G.red, border:"none", borderRadius:12, color:"#fff", fontSize:13, fontWeight:800, cursor:"pointer" }}>Yes, Delete</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── Calendar View ─────────────────────────────────────────────────────────────
function CalendarView({ trades }) {
  const now = new Date();
  const [year, setYear] = useState(now.getFullYear());
  const [month, setMonth] = useState(now.getMonth());
  const [chartMode, setChartMode] = useState("month"); // "day" | "month" | "year"

  const dayMap = {};
  trades.forEach(t => { dayMap[t.date] = (dayMap[t.date]||0) + t.pnl; });
  const cells = getCalendarDays(year, month);
  const prev = () => { if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1); };
  const next = () => { if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1); };
  const monthPnl = Object.entries(dayMap).filter(([k])=>k.startsWith(`${year}-${String(month+1).padStart(2,"0")}`)).reduce((a,[,v])=>a+v,0);

  // ── Chart data builders ──────────────────────────────────────────────────────
  const chartData = React.useMemo(() => {
    if (chartMode === "day") {
      // All trading days in current month
      const prefix = `${year}-${String(month+1).padStart(2,"0")}`;
      const entries = Object.entries(dayMap)
        .filter(([k]) => k.startsWith(prefix))
        .sort(([a],[b]) => a.localeCompare(b));
      return entries.map(([k, v]) => ({ label: k.slice(8), value: v }));
    }
    if (chartMode === "month") {
      // All 12 months of current year
      return Array.from({length:12}, (_,i) => {
        const pfx = `${year}-${String(i+1).padStart(2,"0")}`;
        const val = Object.entries(dayMap).filter(([k])=>k.startsWith(pfx)).reduce((a,[,v])=>a+v,0);
        return { label: MONTHS[i].slice(0,3), value: val };
      });
    }
    // year mode — group by year
    const yearMap = {};
    Object.entries(dayMap).forEach(([k,v]) => {
      const y = k.slice(0,4);
      yearMap[y] = (yearMap[y]||0) + v;
    });
    return Object.entries(yearMap).sort(([a],[b])=>a.localeCompare(b)).map(([k,v])=>({ label:k, value:v }));
  }, [chartMode, year, month, trades]);

  // ── SVG line chart (full-width, Bibit-style) ─────────────────────────────────
  function PerformanceChart({ data }) {
    if (!data.length) return (
      <div style={{ textAlign:"center", padding:"48px 0", color:G.textMuted, fontSize:14, fontWeight:600 }}>No trade data for this period</div>
    );
    // Use a wide fixed viewBox — SVG scales to 100% width automatically
    const W = 600, H = 220, PAD_L = 58, PAD_B = 36, PAD_T = 18, PAD_R = 12;
    const innerW = W - PAD_L - PAD_R;
    const innerH = H - PAD_B - PAD_T;
    const vals = data.map(d=>d.value);
    const totalPnl = vals.reduce((a,b)=>a+b,0);
    const minV = Math.min(...vals);
    const maxV = Math.max(...vals);
    const pad  = Math.max((maxV - minV) * 0.15, 1);
    const lo   = minV - pad, hi = maxV + pad;
    const rangeV = hi - lo || 1;
    const toY = v => PAD_T + innerH * (1 - (v - lo) / rangeV);
    const toX = i => PAD_L + (data.length === 1 ? innerW/2 : (innerW / (data.length-1)) * i);
    const zeroY = toY(0);
    const showZero = lo < 0 && hi > 0;
    const axisVals = [lo, lo + rangeV*0.25, lo + rangeV*0.5, lo + rangeV*0.75, hi];
    const fmtAxis = v => {
      const a = Math.abs(v);
      const s = v >= 0 ? "+" : "−";
      if (a >= 1000) return s + "$" + (a >= 10000 ? Math.round(a/1000)+"k" : (a/1000).toFixed(1)+"k");
      return s + "$" + Math.round(a);
    };
    const points = data.map((_,i) => `${toX(i)},${toY(vals[i])}`).join(" ");
    const areaPath = data.length > 1
      ? `M${toX(0)},${toY(vals[0])} ` + data.slice(1).map((_,i)=>`L${toX(i+1)},${toY(vals[i+1])}`).join(" ")
        + ` L${toX(data.length-1)},${H-PAD_B} L${toX(0)},${H-PAD_B} Z`
      : "";
    const lineColor = totalPnl >= 0 ? G.green : G.red;
    const dotR = data.length > 24 ? 2 : data.length > 12 ? 3.5 : 5;

    return (
      <div>
        <svg viewBox={`0 0 ${W} ${H}`} style={{ width:"100%", display:"block" }}>
          <defs>
            <linearGradient id="lineAreaGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={lineColor} stopOpacity="0.22"/>
              <stop offset="100%" stopColor={lineColor} stopOpacity="0.02"/>
            </linearGradient>
          </defs>
          {/* Y gridlines + labels */}
          {axisVals.map((v,i) => {
            const y = toY(v);
            return (
              <g key={i}>
                <line x1={PAD_L} y1={y} x2={W-PAD_R} y2={y} stroke={G.border} strokeWidth={0.8} strokeDasharray="4,4"/>
                <text x={PAD_L-6} y={y+4} textAnchor="end" fontSize={9} fill={G.textMuted} fontFamily="'Plus Jakarta Sans',sans-serif" fontWeight="700">
                  {fmtAxis(v)}
                </text>
              </g>
            );
          })}
          {/* Zero line */}
          {showZero && (
            <line x1={PAD_L} y1={zeroY} x2={W-PAD_R} y2={zeroY} stroke={G.textMuted} strokeWidth={1.5}/>
          )}
          {/* Area fill */}
          {areaPath && <path d={areaPath} fill="url(#lineAreaGrad)"/>}
          {/* Line */}
          <polyline points={points} fill="none" stroke={lineColor} strokeWidth={2.5} strokeLinejoin="round" strokeLinecap="round"/>
          {/* Dots */}
          {data.map((_,i) => (
            <circle key={i} cx={toX(i)} cy={toY(vals[i])} r={dotR} fill={lineColor} stroke="#fff" strokeWidth={2}/>
          ))}
          {/* X labels */}
          {data.map((d,i) => {
            if (data.length > 18 && i % Math.ceil(data.length/10) !== 0) return null;
            return (
              <text key={i} x={toX(i)} y={H-PAD_B+16} textAnchor="middle" fontSize={data.length>10?8:10} fill={G.textMuted} fontFamily="'Plus Jakarta Sans',sans-serif" fontWeight="700">
                {d.label}
              </text>
            );
          })}
        </svg>
        {/* Summary row */}
        <div style={{ display:"flex", justifyContent:"space-between", marginTop:16, padding:"16px 4px 0", borderTop:`1px solid ${G.border}` }}>
          <div>
            <div style={{ fontSize:11, color:G.textMuted, fontWeight:600, marginBottom:4 }}>Total P&L</div>
            <div style={{ fontSize:18, fontWeight:800, color:clr(totalPnl) }}>{fmt(totalPnl)}</div>
          </div>
          <div style={{ textAlign:"center" }}>
            <div style={{ fontSize:11, color:G.textMuted, fontWeight:600, marginBottom:4 }}>Best</div>
            <div style={{ fontSize:18, fontWeight:800, color:G.green }}>{fmt(Math.max(...vals))}</div>
          </div>
          <div style={{ textAlign:"right" }}>
            <div style={{ fontSize:11, color:G.textMuted, fontWeight:600, marginBottom:4 }}>Worst</div>
            <div style={{ fontSize:18, fontWeight:800, color:G.red }}>{fmt(Math.min(...vals))}</div>
          </div>
        </div>
      </div>
    );
  }

  return (
    <>
      {/* Calendar card */}
      <div style={{ background:G.white, borderRadius:20, padding:"16px", boxShadow:G.shadow, marginBottom:12 }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
          <button onClick={prev} style={{ background:G.bg, border:"none", color:G.textSecondary, fontSize:18, cursor:"pointer", padding:"8px 14px", borderRadius:10, fontWeight:800 }}>‹</button>
          <div style={{ textAlign:"center" }}>
            <div style={{ fontSize:16, fontWeight:800, color:G.textPrimary }}>{MONTHS[month]} {year}</div>
            <div style={{ fontSize:13, color:clr(monthPnl), fontWeight:700 }}>{fmt(monthPnl)}</div>
          </div>
          <button onClick={next} style={{ background:G.bg, border:"none", color:G.textSecondary, fontSize:18, cursor:"pointer", padding:"8px 14px", borderRadius:10, fontWeight:800 }}>›</button>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:4, marginBottom:4 }}>
          {DAYS.map(d=><div key={d} style={{ textAlign:"center", fontSize:10, color:G.textMuted, fontWeight:700, padding:"4px 0" }}>{d}</div>)}
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:4 }}>
          {cells.map((day,i)=>{
            if(!day) return <div key={`e${i}`}/>;
            const key=`${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
            const pnl=dayMap[key];
            const isToday=key===todayStr();
            return (
              <div key={key} style={{ borderRadius:10, padding:"6px 2px", textAlign:"center", background:pnl!==undefined?clrBg(pnl):isToday?G.greenLight:"transparent", border:isToday?`2px solid ${G.green}`:"2px solid transparent", minHeight:46 }}>
                <div style={{ fontSize:11, color:G.textSecondary, fontWeight:700 }}>{day}</div>
                {pnl!==undefined&&<div style={{ fontSize:8, color:clr(pnl), fontWeight:800, marginTop:2, lineHeight:1.2 }}>{pnl>0?"+":"−"}${Math.abs(pnl).toLocaleString()}</div>}
              </div>
            );
          })}
        </div>
      </div>

      {/* Performance Chart card */}
      <div style={{ background:G.white, borderRadius:20, padding:"20px 20px 20px", boxShadow:G.shadow, marginBottom:12 }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>
          <div style={{ fontSize:15, fontWeight:800, color:G.textPrimary, letterSpacing:0.2 }}>Performance</div>

// ─── Note Editor ──────────────────────────────────────────────────────────────
function NoteEditor({ note, onBack, onSave, onDelete }) {
  const { isDesktop } = useBreakpoint();
  const [title, setTitle] = useState(note.title || "");
  const [body,  setBody]  = useState(note.body  || "");
  const saveTimer = useRef(null);
  const isNew = !note.id;
  const noteRef = useRef(note);
  noteRef.current = note;
  const triggerSave = useCallback((t, b) => {
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      onSave({ ...noteRef.current, id: noteRef.current.id||Date.now(), title:t.trim()||"Untitled", body:b, updatedAt:new Date().toISOString() }, false);
    }, 800);
  }, [onSave]);
  const handleTitle = (v) => { setTitle(v); triggerSave(v, body); };
  const handleBody  = (v) => { setBody(v);  triggerSave(title, v); };
  const handleBack = () => {
    if (saveTimer.current) clearTimeout(saveTimer.current);
    if (title.trim()||body.trim()) onSave({ ...noteRef.current, id:noteRef.current.id||Date.now(), title:title.trim()||"Untitled", body, updatedAt:new Date().toISOString() }, true);
    else onBack();
  };
  return (
    <div style={{ position:"fixed", inset:0, background:G.white, zIndex:150, display:"flex", flexDirection:"column", maxWidth: isDesktop ? "none" : 480, marginLeft: isDesktop ? 240 : "auto", marginRight: isDesktop ? 0 : "auto", left: isDesktop ? 240 : 0, right:0 }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding: isDesktop ? "20px 36px 14px" : "52px 16px 14px", borderBottom:`1px solid ${G.border}`, background:G.white }}>
        <button onClick={handleBack} style={{ background:"none", border:"none", color:G.green, fontSize:15, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", gap:4 }}>
          <span style={{ fontSize:22 }}>‹</span> Notes
        </button>
        {!isNew && <button onClick={()=>onDelete(note.id)} style={{ background:G.redLight, border:"none", borderRadius:10, color:G.red, fontSize:12, fontWeight:700, padding:"7px 14px", cursor:"pointer" }}>Delete</button>}
      </div>
      <div style={{ flex:1, overflowY:"auto", padding: isDesktop ? "28px 36px 40px" : "20px 20px 40px" }}>
        <div style={{ maxWidth: isDesktop ? 860 : "none", margin: isDesktop ? "0 auto" : undefined }}>
        <textarea value={title} onChange={e=>handleTitle(e.target.value)} placeholder="Title" rows={1} style={{ width:"100%", background:"none", border:"none", outline:"none", color:G.textPrimary, fontSize:22, fontWeight:800, fontFamily:"'Plus Jakarta Sans',sans-serif", resize:"none", lineHeight:1.3, marginBottom:10, boxSizing:"border-box", overflow:"hidden" }}/>

        <textarea value={body} onChange={e=>handleBody(e.target.value)} placeholder="Start writing..." style={{ width:"100%", background:"none", border:"none", outline:"none", color:G.textSecondary, fontSize:16, fontFamily:"'Plus Jakarta Sans',sans-serif", resize:"none", lineHeight:1.8, boxSizing:"border-box", minHeight:"62vh" }}/>
        </div>

  );

// ─── Drawdown Line Chart ──────────────────────────────────────────────────────
function DrawdownChart({ trades, accountBalance, drawdownLimit, totalPnl, consistencyLimit }) {
  const sorted = [...trades].sort((a,b)=>a.date.localeCompare(b.date));
  let peak = accountBalance;
  let bal  = accountBalance;
  const points = [{ bal, dd:0, ddPct:0 }];
  sorted.forEach(t => {
    bal += t.pnl;
    if (bal > peak) peak = bal;
    const dd    = peak - bal;
    const ddPct = peak > 0 ? (dd / peak) * 100 : 0;
    points.push({ bal, dd, ddPct });
  });

  const currentBal    = accountBalance + trades.reduce((a,t)=>a+t.pnl,0);
  const currentPeak   = Math.max(accountBalance, ...points.map(p=>p.bal));
  const currentDD     = currentPeak - currentBal;
  const currentDDPct  = currentPeak > 0 ? (currentDD / currentPeak) * 100 : 0;
  const ddLimit       = drawdownLimit || 0;
  const ddUsedPct     = ddLimit > 0 ? Math.min((currentDD / ddLimit) * 100, 100) : 0;
  const safe = ddUsedPct < 70, warn = ddUsedPct >= 70 && ddUsedPct < 90;

  const today   = todayStr();
  const todayPnl = trades.filter(t=>t.date===today).reduce((a,t)=>a+t.pnl,0);
  const autoLimit = totalPnl > 0 ? totalPnl * 0.5 : 0;
  const activeLimit = consistencyLimit > 0 ? consistencyLimit : autoLimit;
  const consistencyExceeded = activeLimit > 0 && todayPnl > activeLimit;
  const consistencyUsedPct  = activeLimit > 0 ? Math.min((todayPnl / activeLimit) * 100, 120) : 0;

  const chartPts = points.slice(-20);
  const W = 320, H = 80;
  const maxDDPct = Math.max(...chartPts.map(p=>p.ddPct), ddLimit>0?(ddLimit/currentPeak)*100:1, 0.5);
  const toX = i => (i / (chartPts.length - 1 || 1)) * W;
  const toY = v => H - (v / maxDDPct) * H;
  const pathD = chartPts.map((p,i)=>`${i===0?"M":"L"}${toX(i).toFixed(1)},${toY(p.ddPct).toFixed(1)}`).join(" ");
  const areaD = pathD + ` L${W},${H} L0,${H} Z`;
  const limitY = ddLimit > 0 && currentPeak > 0 ? toY((ddLimit / currentPeak) * 100) : null;

  return (
    <div style={{ background:G.white, borderRadius:20, padding:"16px", marginBottom:16, boxShadow:G.shadow }}>
      <div style={{ fontSize:12, color:G.textMuted, fontWeight:700, letterSpacing:0.5, textTransform:"uppercase", marginBottom:14 }}>Drawdown Tracker</div>
      <div style={{ display:"flex", gap:10, marginBottom:14 }}>
        <div style={{ flex:1, background:G.bg, borderRadius:14, padding:"12px" }}>
          <div style={{ fontSize:10, color:G.textMuted, fontWeight:700, textTransform:"uppercase", letterSpacing:0.3, marginBottom:4 }}>Current Drawdown</div>
          <div style={{ fontSize:20, fontWeight:900, color:currentDD>0?G.red:G.green, letterSpacing:-0.5 }}>{currentDDPct.toFixed(1)}%</div>
          <div style={{ fontSize:11, color:G.textMuted }}>${currentDD.toLocaleString("en-US",{maximumFractionDigits:0})}</div>
        </div>
        <div style={{ flex:1, background:G.bg, borderRadius:14, padding:"12px" }}>
          <div style={{ fontSize:10, color:G.textMuted, fontWeight:700, textTransform:"uppercase", letterSpacing:0.3, marginBottom:4 }}>DD Limit</div>
          <div style={{ fontSize:20, fontWeight:900, color:G.textPrimary, letterSpacing:-0.5 }}>{ddLimit>0?`$${ddLimit.toLocaleString()}`:"—"}</div>
          <div style={{ fontSize:11, color:G.textMuted }}>{ddLimit>0?`Remaining $${Math.max(0,ddLimit-currentDD).toLocaleString()}`:"Not set"}</div>
        </div>
      </div>
      {ddLimit > 0 && (
        <div style={{ marginBottom:14 }}>
          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5 }}>
            <span style={{ fontSize:11, color:G.textMuted, fontWeight:600 }}>DD Used</span>
            <span style={{ fontSize:11, fontWeight:800, color:safe?G.green:warn?G.yellow:G.red }}>{ddUsedPct.toFixed(1)}%</span>
          </div>
          <div style={{ height:6, background:G.bg, borderRadius:3, overflow:"hidden" }}>
            <div style={{ height:"100%", width:`${ddUsedPct}%`, background:safe?G.green:warn?G.yellow:G.red, borderRadius:3, transition:"width 0.5s" }}/>
          </div>
          <div style={{ display:"flex", justifyContent:"space-between", marginTop:3 }}>
            <span style={{ fontSize:10, color:G.textMuted }}>$0</span>
            <span style={{ fontSize:10, color:G.textMuted }}>${ddLimit.toLocaleString()}</span>
          </div>
        </div>
      )}
      {points.length > 1 && (
        <div style={{ marginBottom:14 }}>
          <div style={{ fontSize:11, color:G.textMuted, fontWeight:600, marginBottom:8 }}>Drawdown History</div>
          <svg viewBox={`0 0 ${W} ${H + 4}`} width="100%" style={{ overflow:"visible", display:"block" }}>
            <defs>
              <linearGradient id="ddAreaGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={G.red} stopOpacity="0.12"/>
                <stop offset="100%" stopColor={G.red} stopOpacity="0.01"/>
              </linearGradient>
            </defs>
            <path d={areaD} fill="url(#ddAreaGrad)"/>
            {limitY !== null && (
              <line x1="0" y1={limitY} x2={W} y2={limitY} stroke={G.red} strokeWidth="1.5" strokeDasharray="4,3" opacity="0.55"/>
            )}
            <path d={pathD} fill="none" stroke={G.red} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            {chartPts.length > 0 && (
              <circle cx={toX(chartPts.length-1)} cy={toY(chartPts[chartPts.length-1].ddPct)} r="3.5" fill={G.red} stroke={G.white} strokeWidth="2"/>
            )}
          </svg>
          <div style={{ display:"flex", justifyContent:"space-between", marginTop:2 }}>
            <span style={{ fontSize:9, color:G.textMuted, fontWeight:600 }}>Earlier</span>
            <span style={{ fontSize:9, color:G.textMuted, fontWeight:600 }}>Latest</span>
          </div>
        </div>
      )}
      <div style={{ marginTop:14, paddingTop:14, borderTop:`1px solid ${G.border}` }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
          <div style={{ fontSize:11, fontWeight:700, color:G.textSecondary, textTransform:"uppercase", letterSpacing:0.3 }}>Consistency Rule</div>
          {consistencyExceeded && (
            <div style={{ display:"flex", alignItems:"center", gap:4, background:G.redLight, borderRadius:6, padding:"2px 8px" }}>
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke={G.red} strokeWidth="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
              <span style={{ fontSize:10, color:G.red, fontWeight:800 }}>LIMIT EXCEEDED</span>
            </div>
          )}
        </div>
        <div style={{ fontSize:12, color:G.textMuted, marginBottom:6 }}>
          Max daily profit:{" "}
          <span style={{ color:G.textPrimary, fontWeight:700 }}>
            {activeLimit > 0 ? `$${activeLimit.toFixed(0)}` : "—"}
          </span>
          {consistencyLimit <= 0 && autoLimit > 0 && (
            <span style={{ color:G.textMuted, fontSize:11 }}> (auto: 50% of total P&L)</span>
          )}
        </div>
        {activeLimit > 0 && (
          <>
            <div style={{ height:6, background:G.bg, borderRadius:3, overflow:"hidden", marginBottom:5 }}>
              <div style={{ height:"100%", width:`${Math.min(consistencyUsedPct,100)}%`, background:consistencyExceeded?G.red:consistencyUsedPct>=70?G.yellow:G.green, borderRadius:3, transition:"width 0.4s" }}/>
            </div>
            <div style={{ fontSize:11, color:G.textMuted }}>
              Today's P&L:{" "}
              <span style={{ fontWeight:700, color:clr(todayPnl) }}>{fmt(todayPnl)}</span>
              {consistencyExceeded && <span style={{ color:G.red, fontWeight:700, marginLeft:8 }}>— Stop trading for today</span>}
            </div>
          </>
        )}
        {activeLimit === 0 && (
          <div style={{ fontSize:12, color:G.textMuted }}>Set a limit or log profitable trades to activate.</div>
        )}
      </div>
    </div>
  );
}

            <button key={p} onClick={()=>{ setRiskPct(p); setResult(null); }} style={{ flex:1, padding:"11px", borderRadius:12, fontSize:14, fontWeight:800, border:"none", background:riskPct===p?G.yellow:G.bg, color:riskPct===p?"#fff":G.textSecondary, cursor:"pointer" }}>{p}%</button>
          ))}
          <input type="number" step="0.1" value={["0.5","1","2"].includes(riskPct)?"":riskPct} onChange={e=>{ setRiskPct(e.target.value); setResult(null); }} placeholder="%" style={{ ...inp, flex:1, padding:"11px", textAlign:"center", fontSize:13 }}/>
        </div>
      </div>
      <button onClick={handleCalc} style={{ width:"100%", padding:"17px", background:G.green, border:"none", borderRadius:16, color:"#fff", fontSize:16, fontWeight:800, cursor:"pointer", marginBottom:16, boxShadow:"0 4px 16px rgba(0,170,19,0.35)" }}>
        Calculate Max Risk →
      </button>
      {result && (
        <div style={{ background:`linear-gradient(135deg, ${G.yellowLight}, #FFF8E8)`, border:`1.5px solid ${G.yellow}55`, borderRadius:20, padding:"22px 20px", textAlign:"center", marginBottom:16 }}>
          <div style={{ fontSize:11, color:G.textMuted, fontWeight:700, letterSpacing:0.5, textTransform:"uppercase", marginBottom:8 }}>Max Risk — Next Trade</div>
          <div style={{ fontSize:42, fontWeight:900, color:G.yellow, letterSpacing:-1.5, marginBottom:8 }}>${result.maxLoss.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
          <div style={{ fontSize:13, color:G.textSecondary }}>{fmtBal(result.balance)} × {result.pct}%</div>
          <div style={{ marginTop:14, padding:"10px 14px", background:"rgba(255,255,255,0.7)", borderRadius:12, fontSize:12, color:G.textSecondary }}>
            If max loss hit → remaining <span style={{ color:G.red, fontWeight:800 }}>{fmtBal(result.balance - result.maxLoss)}</span>
          </div>
        </div>
      )}
      <div style={{ padding:"14px 16px", background:G.greenLight, borderRadius:14, border:`1px solid ${G.green}33` }}>
        <div style={{ fontSize:12, color:G.greenDark, lineHeight:1.7, fontWeight:600 }}>📌 <strong>Prop firm standard:</strong> 0.5% – 1% per trade. Keep risk consistent to protect your drawdown limit.</div>
      </div>
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
const DEFAULT_ACCOUNT = {
  id: "acc_default",
  name: "Main Account",
  color: ACC_COLORS[0],
  balance: DEFAULT_BALANCE,
  drawdownLimit: 0,
  consistencyLimit: 0,
};

function TradingJournal() {
  const windowWidth = useWindowWidth();
  const isDesktop = windowWidth >= 1024;
  const isTablet  = windowWidth >= 768 && windowWidth < 1024;

  // Multi-account state
  const [accounts,   setAccounts]   = useState([DEFAULT_ACCOUNT]);
  const [activeId,   setActiveId]   = useState(DEFAULT_ACCOUNT.id);

  // Per-account data (trades keyed by accountId)
  const [allTrades,  setAllTrades]  = useState({}); // { [accountId]: [trade,...] }

  // Global data
  const [notes,      setNotes]      = useState([]);

  // UI
  const [tab,              setTab]              = useState("dashboard");
  const [noteSubTab,       setNoteSubTab]       = useState("personal");
  const [tradeModal,       setTradeModal]       = useState(null);
  const [openNote,         setOpenNote]         = useState(null);
  const [balanceModal,     setBalanceModal]     = useState(false);
  const [dataModal,        setDataModal]        = useState(false);
  const [ddModal,          setDdModal]          = useState(false);
  const [accModal,         setAccModal]         = useState(false);
  const [loading,          setLoading]          = useState(true);
  const [syncStatus,       setSyncStatus]       = useState("syncing");

  // Derived active account
  const activeAccount = accounts.find(a=>a.id===activeId) || accounts[0];
  const trades = allTrades[activeId] || [];
  const accountBalance     = activeAccount?.balance || DEFAULT_BALANCE;
  const drawdownLimit      = activeAccount?.drawdownLimit || 0;
  const consistencyLimit   = activeAccount?.consistencyLimit || 0;

  // ── Load on mount ──────────────────────────────────────────────────────────
  useEffect(() => {
    fetch(`${SUPABASE_URL}/rest/v1/journal_data?limit=1`, { headers: SB_HEADERS })
      .then(r => { if(r.ok) setSyncStatus("ok"); else setSyncStatus("offline"); })
      .catch(() => setSyncStatus("offline"));

    // Migrate old single-account data if needed
    Promise.all([
      loadData(ACCOUNTS_KEY, null),
      loadData(ACTIVE_ACC_KEY, null),
      loadData(NOTES_KEY, []),
      // Legacy keys for migration
      loadData("nq-journal-trades", null),
      loadData("nq-journal-balance", null),
      loadData("nq-journal-drawdown", null),
      loadData("nq-journal-consistency-limit", null),
    ]).then(async ([savedAccounts, savedActiveId, savedNotes, legacyTrades, legacyBalance, legacyDD, legacyCL]) => {

      let finalAccounts = savedAccounts;
      let finalActiveId = savedActiveId;

      if (!finalAccounts) {
        // First run or migration from old data
        const migratedAccount = {
          ...DEFAULT_ACCOUNT,
          balance: typeof legacyBalance === "number" ? legacyBalance : DEFAULT_BALANCE,
          drawdownLimit: legacyDD || 0,
          consistencyLimit: legacyCL || 0,
        };
        finalAccounts = [migratedAccount];
        finalActiveId = migratedAccount.id;
      }

      // Load trades for each account
      const tradesObj = {};
      for (const acc of finalAccounts) {
        const key = TRADES_KEY_PFX + acc.id;
        let accTrades = await loadData(key, null);
        // Migration: if this is the default account and no trades saved yet, use legacy trades
        if (accTrades === null && acc.id === "acc_default" && legacyTrades) {
          accTrades = legacyTrades;
        }
        tradesObj[acc.id] = accTrades || [];
      }

      setAccounts(finalAccounts);
      setActiveId(finalActiveId || finalAccounts[0].id);
      setAllTrades(tradesObj);
      setNotes(savedNotes || []);
      setLoading(false);
    });
  }, []);

  // ── Save helpers ───────────────────────────────────────────────────────────
  const saveAccounts = useCallback((accs, aid) => {
    saveData(ACCOUNTS_KEY, accs);
    if (aid !== undefined) saveData(ACTIVE_ACC_KEY, aid);
  }, []);

  const saveTradesForAccount = useCallback((accId, trades) => {
    saveData(TRADES_KEY_PFX + accId, trades);
  }, []);

  // ── Account handlers ───────────────────────────────────────────────────────
  const handleAddAccount = useCallback((newAcc) => {
    const acc = { ...newAcc, id: newAccountId(), drawdownLimit:0, consistencyLimit:0 };
    setAccounts(prev => {
      const next = [...prev, acc];
      saveAccounts(next, undefined);
      return next;
    });
    setAllTrades(prev => ({ ...prev, [acc.id]: [] }));
    saveTradesForAccount(acc.id, []);
  }, [saveAccounts, saveTradesForAccount]);

  const handleEditAccount = useCallback((updatedAcc) => {
    setAccounts(prev => {
      const next = prev.map(a => a.id === updatedAcc.id ? updatedAcc : a);
      saveAccounts(next, undefined);
      return next;
    });
  }, [saveAccounts]);

  const handleDeleteAccount = useCallback((accId) => {
    setAccounts(prev => {
      const next = prev.filter(a => a.id !== accId);
      const newActiveId = activeId === accId ? next[0]?.id : activeId;
      saveAccounts(next, newActiveId);
      if (activeId === accId) setActiveId(newActiveId);
      return next;
    });
    setAllTrades(prev => {
      const next = { ...prev };
      delete next[accId];
      return next;
    });
  }, [activeId, saveAccounts]);

  const handleSwitchAccount = useCallback((accId) => {
    setActiveId(accId);
    saveData(ACTIVE_ACC_KEY, accId);
  }, []);

  // ── Balance handler ────────────────────────────────────────────────────────
  const handleSaveBalance = useCallback((val) => {
    setAccounts(prev => {
      const next = prev.map(a => a.id === activeId ? { ...a, balance: val } : a);
      saveAccounts(next, undefined);
      return next;
    });
    setBalanceModal(false);
  }, [activeId, saveAccounts]);

  // ── Trade handlers ─────────────────────────────────────────────────────────
  const handleSaveTrade = useCallback((trade) => {
    setAllTrades(prev => {
      const current = prev[activeId] || [];
      const idx = current.findIndex(t => t.id === trade.id);
      const next = idx >= 0 ? current.map(t => t.id === trade.id ? trade : t) : [trade, ...current];
      saveTradesForAccount(activeId, next);
      return { ...prev, [activeId]: next };
    });
    setTradeModal(null);
  }, [activeId, saveTradesForAccount]);

  const handleDeleteTrade = useCallback((id) => {
    setAllTrades(prev => {
      const next = (prev[activeId] || []).filter(t => t.id !== id);
      saveTradesForAccount(activeId, next);
      return { ...prev, [activeId]: next };
    });
    setTradeModal(null);
  }, [activeId, saveTradesForAccount]);

  // ── Note handlers ──────────────────────────────────────────────────────────
  const handleSaveNote = useCallback((note, doBack) => {
    setNotes(prev => { const idx=prev.findIndex(n=>n.id===note.id); const next=idx>=0?prev.map(n=>n.id===note.id?note:n):[note,...prev]; saveData(NOTES_KEY,next); return next; });
    if (doBack) setOpenNote(null);
    else setOpenNote(prev=>(prev&&prev.id===note.id)?note:{...note});
  }, []);

  const handleDeleteNote = useCallback((id) => {
    setNotes(prev=>{ const next=prev.filter(n=>n.id!==id); saveData(NOTES_KEY,next); return next; });
    setOpenNote(null);
  }, []);

  // ── Import / Clear handlers ────────────────────────────────────────────────
  const handleImport = useCallback(({ trades:t, notes:n, balance:b }) => {
    if (t != null) {
      setAllTrades(prev => {
        const next = { ...prev, [activeId]: t };
        saveTradesForAccount(activeId, t);
        return next;
      });
    }
    if (n != null) { setNotes(n); saveData(NOTES_KEY, n); }
    if (b != null) {
      setAccounts(prev => {
        const next = prev.map(a => a.id === activeId ? { ...a, balance: b } : a);
        saveAccounts(next, undefined);
        return next;
      });
    }
  }, [activeId, saveAccounts, saveTradesForAccount]);

  const handleClearAll = useCallback(() => {
    setAllTrades(prev => {
      const next = { ...prev, [activeId]: [] };
      saveTradesForAccount(activeId, []);
      return next;
    });
  }, [activeId, saveTradesForAccount]);

  const handleSaveDrawdown = useCallback((dd, cl) => {
    setAccounts(prev => {
      const next = prev.map(a => a.id === activeId ? { ...a, drawdownLimit: dd, consistencyLimit: cl } : a);
      saveAccounts(next, undefined);
      return next;
    });
    setDdModal(false);
  }, [activeId, saveAccounts]);

  // ── Derived stats ──────────────────────────────────────────────────────────
  const wins     = trades.filter(t=>t.pnl>0);
  const losses   = trades.filter(t=>t.pnl<0);
  const totalPnl = trades.reduce((a,t)=>a+t.pnl,0);
  const winRate  = trades.length?Math.round((wins.length/trades.length)*100):0;
  const avgRR    = trades.length?(trades.reduce((a,t)=>a+t.rr,0)/trades.length).toFixed(1):"—";
  const gainsPct = accountBalance>0?((totalPnl/accountBalance)*100).toFixed(1):"0.0";
  const avgWin   = wins.length?wins.reduce((a,t)=>a+t.pnl,0)/wins.length:0;
  const avgLoss  = losses.length?losses.reduce((a,t)=>a+t.pnl,0)/losses.length:0;
  const sorted   = [...trades].sort((a,b)=>b.date.localeCompare(a.date));
  const currentBal = accountBalance + totalPnl;

  const plusAction = tab==="notes" ? ()=>setOpenNote({title:"",body:"",updatedAt:new Date().toISOString()})
    : tab==="risk" ? null : ()=>setTradeModal({});

  if (loading) return (
    <BreakpointCtx.Provider value={{ isDesktop, isTablet }}>
      <div style={{ background:G.bg, minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:12 }}>
        <AppIcon size={48}/>
        <div style={{ color:G.textMuted, fontSize:14, fontWeight:600 }}>Loading journal...</div>
        <div style={{ color:G.green, fontSize:12, fontWeight:600 }}>☁ Syncing with cloud...</div>
      </div>
    </BreakpointCtx.Provider>
  );

  return (
    <BreakpointCtx.Provider value={{ isDesktop, isTablet }}>
    <DesktopSidebar
      tab={tab} setTab={setTab}
      onBackup={()=>setDataModal(true)}
      syncStatus={syncStatus}
      plusAction={plusAction}
      accounts={accounts}
      activeId={activeId}
      onSwitchAccount={handleSwitchAccount}
      onManageAccounts={()=>setAccModal(true)}
    />

    <div className="mobile-app-shell" style={{ background:G.bg, minHeight:"100vh", maxWidth: isTablet ? 680 : 480, margin:"0 auto", fontFamily:"'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif", color:G.textPrimary, paddingBottom: isDesktop ? 40 : 100 }}>

      {openNote !== null && (
        <NoteEditor note={openNote} onBack={()=>setOpenNote(null)} onSave={handleSaveNote} onDelete={handleDeleteNote}/>
      )}

      <AppHeader
        tab={tab}
        onBackup={()=>setDataModal(true)}
        syncStatus={syncStatus}
        account={activeAccount}
        onSwitchAccount={()=>setAccModal(true)}
      />

      {/* FAB */}
      {plusAction && (
        <div className="fab-btn" style={{ position:"fixed", bottom:86, right:"max(16px, calc(50% - 224px))", zIndex:100 }}>
          <button onClick={plusAction} className="ripple" style={{ width:56, height:56, borderRadius:16, background:activeAccount?.color||G.green, border:"none", color:"#fff", fontSize:26, cursor:"pointer", boxShadow:`0 6px 24px ${(activeAccount?.color||G.green)}66`, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:700 }}>+</button>
        </div>
      )}

      <div style={{ padding: isDesktop ? "20px 36px 0" : "16px 16px 0" }}>
      <div className="desktop-content-inner">

        {/* ── Dashboard ── */}
        {tab==="dashboard" && (
          <>
            {/* PnL Hero Card */}
            <div style={{ background:G.white, borderRadius:20, padding:"20px", marginBottom:14, boxShadow:G.shadow }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:16 }}>
                <div>
                  <div style={{ fontSize:12, color:G.textMuted, fontWeight:600, letterSpacing:0.5, textTransform:"uppercase", marginBottom:6 }}>Account Balance</div>
                  <div style={{ fontSize:36, fontWeight:900, color:clr(totalPnl), letterSpacing:-1.5 }}>{fmtBal(currentBal)}</div>
                  <div style={{ display:"flex", gap:10, marginTop:6, alignItems:"center" }}>
                    <span style={{ fontSize:12, color:G.textMuted, fontWeight:600 }}>P&amp;L <span style={{ color:clr(totalPnl), fontWeight:700 }}>{fmtPct(parseFloat(gainsPct))}</span></span>
                    <span style={{ fontSize:12, color:clr(totalPnl), fontWeight:700 }}>{fmt(totalPnl)}</span>
                    <span style={{ fontSize:11, color:G.textMuted }}>·</span>
                    <span style={{ fontSize:12, color:G.textMuted, fontWeight:600 }}>Trades <span style={{ color:G.textSecondary, fontWeight:700 }}>{trades.length}</span></span>
                  </div>
                </div>
                <div style={{ width:46, height:46, background:clrBg(totalPnl), borderRadius:13, display:"flex", alignItems:"center", justifyContent:"center" }}>
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={totalPnl>=0?G.green:G.red} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                    {totalPnl>=0 ? <><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></> : <><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></>}
                  </svg>
                </div>
              </div>

              {/* Account indicator strip */}
              {accounts.length > 1 && (
                <div style={{ display:"flex", gap:6, marginBottom:14, overflowX:"auto", paddingBottom:2 }}>
                  {accounts.map(acc => {
                    const accTrades = allTrades[acc.id] || [];
                    const accPnl = accTrades.reduce((a,t)=>a+t.pnl,0);
                    const isActive = acc.id === activeId;
                    return (
                      <button key={acc.id} onClick={()=>handleSwitchAccount(acc.id)} style={{ display:"flex", alignItems:"center", gap:6, padding:"6px 10px 6px 6px", borderRadius:20, border: isActive?`2px solid ${acc.color}`:`1px solid ${G.border}`, background: isActive?acc.color+"15":"transparent", cursor:"pointer", flexShrink:0, whiteSpace:"nowrap" }}>
                        <div style={{ width:16, height:16, borderRadius:"50%", background:acc.color, flexShrink:0 }}/>
                        <span style={{ fontSize:11, fontWeight:700, color: isActive?acc.color:G.textMuted }}>{acc.name}</span>
                        <span style={{ fontSize:11, fontWeight:800, color:clr(accPnl) }}>{fmt(accPnl)}</span>
                      </button>
                    );
                  })}
                </div>
              )}

              {/* Quick actions */}
              <div style={{ display:"flex", gap:8 }}>
                <button onClick={()=>setBalanceModal(true)} style={{ flex:1, padding:"11px 8px", background:G.greenLight, border:"none", borderRadius:12, cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={G.green} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                  <span style={{ fontSize:11, color:G.green, fontWeight:700 }}>Balance</span>
                </button>
                {isDesktop && (
                  <button onClick={()=>setTradeModal({})} style={{ flex:1, padding:"11px 8px", background:G.greenLight, border:"none", borderRadius:12, cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={G.green} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    <span style={{ fontSize:11, color:G.green, fontWeight:700 }}>Log Trade</span>
                  </button>
                )}
                <button onClick={()=>setDdModal(true)} style={{ flex:1, padding:"11px 8px", background:G.redLight, border:"none", borderRadius:12, cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={G.red} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                  <span style={{ fontSize:11, color:G.red, fontWeight:700 }}>Drawdown</span>
                </button>
                {isDesktop && (
                  <button onClick={()=>setTab("risk")} style={{ flex:1, padding:"11px 8px", background:G.yellowLight, border:"none", borderRadius:12, cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={G.yellow} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    <span style={{ fontSize:11, color:G.yellow, fontWeight:700 }}>Risk</span>
                  </button>
                )}
              </div>
            </div>

            {/* Stats */}
            <div style={{ display:"flex", gap:10, marginBottom:10 }}>
              <StatCard label="Win Rate" value={`${winRate}%`} sub={`${wins.length}W / ${losses.length}L`} valueColor={winRate>=50?G.green:G.red}/>
              <StatCard label="Avg RR" value={`${avgRR}R`} sub={`${trades.length} trades`}/>
            </div>
            <div style={{ display:"flex", gap:10, marginBottom:16 }}>
              <StatCard label="Avg Win" value={avgWin?`+$${Math.round(avgWin)}`:"—"} valueColor={G.green}/>
              <StatCard label="Avg Loss" value={avgLoss?`−$${Math.abs(Math.round(avgLoss))}`:"—"} valueColor={G.red}/>
            </div>

            <DrawdownChart trades={trades} accountBalance={accountBalance} drawdownLimit={drawdownLimit} totalPnl={totalPnl} consistencyLimit={consistencyLimit}/>

            <div style={{ fontSize:13, color:G.textSecondary, fontWeight:700, letterSpacing:0.3, textTransform:"uppercase", marginBottom:12 }}>Recent Trades</div>
            {sorted.slice(0,5).map(t=><TradeRow key={t.id} trade={t} onPress={()=>setTradeModal(t)}/>)}
            {sorted.length>5 && <div onClick={()=>setTab("log")} style={{ textAlign:"center", color:G.green, fontSize:13, fontWeight:800, padding:"14px", cursor:"pointer", background:G.white, borderRadius:14, boxShadow:G.shadow, marginTop:4 }}>View all {sorted.length} trades →</div>}
            {trades.length===0 && (
              <div style={{ textAlign:"center", padding:"40px 20px", background:G.white, borderRadius:20, boxShadow:G.shadow }}>
                <div style={{ marginBottom:12, display:"flex", justifyContent:"center" }}>
                  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke={G.textMuted} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
                </div>
                <div style={{ fontSize:16, fontWeight:800, color:G.textSecondary, marginBottom:6 }}>No trades yet</div>
                <div style={{ fontSize:13, color:G.textMuted, marginBottom:16 }}>Tap Log Trade to get started</div>
                <button onClick={()=>setTradeModal({})} style={{ padding:"12px 24px", background:G.green, border:"none", borderRadius:12, color:"#fff", fontSize:14, fontWeight:800, cursor:"pointer" }}>+ Log First Trade</button>
              </div>
            )}
          </>
        )}

        {/* ── Trade Log ── */}
        {tab==="log" && (
          <>
            <div style={{ fontSize:13, color:G.textSecondary, fontWeight:700, letterSpacing:0.3, textTransform:"uppercase", marginBottom:14 }}>
              {activeAccount?.name} · {sorted.length} trades
            </div>
            {sorted.map(t=><TradeRow key={t.id} trade={t} onPress={()=>setTradeModal(t)}/>)}
            {trades.length===0 && (
              <div style={{ textAlign:"center", padding:"60px 20px", background:G.white, borderRadius:20, boxShadow:G.shadow }}>
                <div style={{ fontSize:15, fontWeight:700, color:G.textSecondary }}>No trades logged yet.</div>
              </div>
            )}
          </>
        )}

        {tab==="calendar" && <CalendarView trades={trades}/>}

        {/* ── Notes ── */}
        {tab==="notes" && (
          <>
            <div style={{ display:"flex", gap:6, marginBottom:16, background:G.white, borderRadius:16, padding:"6px", boxShadow:G.shadow }}>
              {[
                { id:"personal", label:"My Notes" },
                { id:"tradelog", label:"From Trade Log" },
              ].map(s=>(
                <button key={s.id} onClick={()=>setNoteSubTab(s.id)} style={{ flex:1, padding:"9px 6px", borderRadius:10, border:"none", background:noteSubTab===s.id?G.green:"transparent", color:noteSubTab===s.id?"#fff":G.textMuted, fontSize:12, fontWeight:700, cursor:"pointer", transition:"background 0.15s" }}>
                  {s.label}
                </button>
              ))}
            </div>
            {noteSubTab==="personal" && (
              <>
                <div style={{ fontSize:13, color:G.textMuted, fontWeight:700, marginBottom:14 }}>{notes.length} notes · shared across all accounts</div>
                <NotesList notes={notes} onOpen={n=>setOpenNote(n)}/>
              </>
            )}
            {noteSubTab==="tradelog" && (
              <>
                <div style={{ fontSize:13, color:G.textMuted, fontWeight:700, marginBottom:14 }}>Notes from {trades.filter(t=>t.notes&&t.notes.trim()).length} trade logs · {activeAccount?.name}</div>
                <TradeNotesList trades={trades}/>
              </>
            )}
          </>
        )}

        {tab==="risk" && <RiskManagement accountBalance={accountBalance} totalPnl={totalPnl}/>}

      </div>
      </div>

      {/* ── Bottom Nav ── */}
      <div className="bottom-nav-bar" style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:480, background:G.white, borderTop:`1px solid ${G.border}`, display:"flex", padding:"10px 0 24px", boxShadow:"0 -4px 20px rgba(0,0,0,0.08)" }}>
        {[
          { id:"dashboard", label:"Home",
            icon: (a) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={a?"#1A1A1A":G.textMuted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          },
          { id:"log", label:"Log",
            icon: (a) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={a?"#1A1A1A":G.textMuted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          },
          { id:"calendar", label:"Calendar",
            icon: (a) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={a?"#1A1A1A":G.textMuted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          },
          { id:"risk", label:"Risk",
            icon: (a) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={a?"#1A1A1A":G.textMuted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          },
          { id:"notes", label:"Notes",
            icon: (a) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={a?"#1A1A1A":G.textMuted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          },
        ].map(({ id, label, icon }) => {
          const active = tab === id;
          const isAccBtn = id === "__accounts";
          return (
            <button key={id} onClick={()=>{ if(isAccBtn){ setAccModal(true); } else setTab(id); }} className="ripple" style={{ flex:1, background:"none", border:"none", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:3, padding:"4px 0" }}>
              <div style={{ width:36, height:36, borderRadius:10, background:active&&!isAccBtn?"#F0F0F0":"transparent", display:"flex", alignItems:"center", justifyContent:"center", transition:"background 0.15s" }}>
                {icon(active)}
              </div>
              <span style={{ fontSize:10, fontWeight:700, color:active&&!isAccBtn?"#1A1A1A":G.textMuted, transition:"color 0.15s" }}>{label}</span>
            </button>
          );
        })}
      </div>

      {/* Modals */}
      {tradeModal !== null && <TradeModal trade={tradeModal} onSave={handleSaveTrade} onDelete={handleDeleteTrade} onClose={()=>setTradeModal(null)}/>}
      {balanceModal && <BalanceModal currentBalance={accountBalance} onSave={handleSaveBalance} onClose={()=>setBalanceModal(false)}/>}
      {dataModal && <DataModal trades={trades} notes={notes} account={activeAccount} onImport={handleImport} onClearAll={handleClearAll} onClose={()=>setDataModal(false)}/>}
      {ddModal && <DrawdownModal drawdownLimit={drawdownLimit} consistencyLimit={consistencyLimit} totalPnl={totalPnl} onSave={handleSaveDrawdown} onClose={()=>setDdModal(false)}/>}
      {accModal && <AccountManagerModal accounts={accounts} activeId={activeId} onSwitch={handleSwitchAccount} onAdd={handleAddAccount} onEdit={handleEditAccount} onDelete={handleDeleteAccount} onClose={()=>setAccModal(false)}/>}

    </div>
    </BreakpointCtx.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<TradingJournal />);
</script>
</body>
</html>
