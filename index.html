/* ── MAIN APP ── */
function App(){
  const w=useWidth(),isDesktop=w>=1024,isTablet=w>=768&&w<1024;
  const[accounts,setAccounts]=useState([DEF_ACC]),[activeId,setActiveId]=useState(DEF_ACC.id),[allTrades,setAllTrades]=useState({}),[notes,setNotes]=useState([]);
  const[tab,setTab]=useState("dashboard"),[noteTab,setNoteTab]=useState("personal");
  const[tradeModal,setTradeModal]=useState(null),[openNote,setOpenNote]=useState(null);
  const[balModal,setBalModal]=useState(false),[dataModal,setDataModal]=useState(false),[ddModal,setDdModal]=useState(false),[accModal,setAccModal]=useState(false);
  const[pnlHidden,setPnlHidden]=useState(()=>{try{return localStorage.getItem("nq-pnl-hidden")==="1"}catch{return false}});
  const togglePnl=()=>setPnlHidden(h=>{const n=!h;try{localStorage.setItem("nq-pnl-hidden",n?"1":"0")}catch{}return n;});
  const[loading,setLoading]=useState(true),[sync,setSync]=useState("syncing");
  const[dark,setDark]=useState(()=>{try{return localStorage.getItem("nq-theme")!=="light"}catch{return true}});

  useEffect(()=>{document.documentElement.setAttribute("data-theme",dark?"dark":"light");try{localStorage.setItem("nq-theme",dark?"dark":"light")}catch{}},[dark]);

  const activeAcc=accounts.find(a=>a.id===activeId)||accounts[0];
  const trades=allTrades[activeId]||[];
  const accBal=activeAcc?.balance||DEF_BAL,ddLim=activeAcc?.drawdownLimit||0,clLim=activeAcc?.consistencyLimit||0;

  useEffect(()=>{
    fetch(`${SB_URL}/rest/v1/journal_data?limit=1`,{headers:SBH}).then(r=>setSync(r.ok?"ok":"offline")).catch(()=>setSync("offline"));
    Promise.all([loadData(AK,null),loadData(AAK,null),loadData(NK,[]),loadData("nq-journal-trades",null),loadData("nq-journal-balance",null),loadData("nq-journal-drawdown",null),loadData("nq-journal-consistency-limit",null)])
      .then(async([sa,sai,sn,lt,lb,ldd,lcl])=>{
        let fa=sa,fai=sai;
        if(!fa){const m={...DEF_ACC,balance:typeof lb==="number"?lb:DEF_BAL,drawdownLimit:ldd||0,consistencyLimit:lcl||0};fa=[m];fai=m.id}
        const trs=await Promise.all(fa.map(a=>loadData(TPK+a.id,null)));
        const to={};fa.forEach((a,i)=>{let t=trs[i];if(t===null&&a.id==="acc_default"&&lt)t=lt;to[a.id]=t||[]});
        setAccounts(fa);setActiveId(fai||fa[0].id);setAllTrades(to);setNotes(sn||[]);setLoading(false);
      });
  },[]);

  const saveAccs=useCallback((a,aid)=>{saveData(AK,a);if(aid!==undefined)saveData(AAK,aid)},[]);
  const saveTrades=useCallback((id,t)=>saveData(TPK+id,t),[]);
  const handleAddAcc=useCallback(a=>{const acc={...a,id:newId(),drawdownLimit:0,consistencyLimit:0};setAccounts(p=>{const n=[...p,acc];saveAccs(n);return n});setAllTrades(p=>({...p,[acc.id]:[]}));saveTrades(acc.id,[])},[saveAccs,saveTrades]);
  const handleEditAcc=useCallback(a=>{setAccounts(p=>{const n=p.map(x=>x.id===a.id?a:x);saveAccs(n);return n})},[saveAccs]);
  const handleDelAcc=useCallback(id=>{setAccounts(p=>{const n=p.filter(a=>a.id!==id),nai=activeId===id?n[0]?.id:activeId;saveAccs(n,nai);if(activeId===id)setActiveId(nai);return n});setAllTrades(p=>{const n={...p};delete n[id];return n})},[activeId,saveAccs]);
  const handleSwitch=useCallback(id=>{setActiveId(id);saveData(AAK,id)},[]);
  const handleSaveBal=useCallback(v=>{setAccounts(p=>{const n=p.map(a=>a.id===activeId?{...a,balance:v}:a);saveAccs(n);return n});setBalModal(false)},[activeId,saveAccs]);
  const handleSaveTrade=useCallback(t=>{setAllTrades(p=>{const c=p[activeId]||[],i=c.findIndex(x=>x.id===t.id),n=i>=0?c.map(x=>x.id===t.id?t:x):[t,...c];saveTrades(activeId,n);return{...p,[activeId]:n}});setTradeModal(null)},[activeId,saveTrades]);
  const handleDelTrade=useCallback(id=>{setAllTrades(p=>{const n=(p[activeId]||[]).filter(t=>t.id!==id);saveTrades(activeId,n);return{...p,[activeId]:n}});setTradeModal(null)},[activeId,saveTrades]);
  const handleSaveNote=useCallback((n,back)=>{setNotes(p=>{const i=p.findIndex(x=>x.id===n.id),nx=i>=0?p.map(x=>x.id===n.id?n:x):[n,...p];saveData(NK,nx);return nx});if(back)setOpenNote(null);else setOpenNote(p=>(p&&p.id===n.id)?n:{...n})},[]);
  const handleDelNote=useCallback(id=>{setNotes(p=>{const n=p.filter(x=>x.id!==id);saveData(NK,n);return n});setOpenNote(null)},[]);
  const handleImport=useCallback(({trades:t,notes:n,balance:b})=>{if(t!=null){setAllTrades(p=>{const nx={...p,[activeId]:t};saveTrades(activeId,t);return nx})}if(n!=null){setNotes(n);saveData(NK,n)}if(b!=null){setAccounts(p=>{const nx=p.map(a=>a.id===activeId?{...a,balance:b}:a);saveAccs(nx);return nx})}},[activeId,saveAccs,saveTrades]);
  const handleClear=useCallback(()=>{setAllTrades(p=>{const n={...p,[activeId]:[]};saveTrades(activeId,[]);return n})},[activeId,saveTrades]);
  const handleSaveDD=useCallback((dd,cl)=>{setAccounts(p=>{const n=p.map(a=>a.id===activeId?{...a,drawdownLimit:dd,consistencyLimit:cl}:a);saveAccs(n);return n});setDdModal(false)},[activeId,saveAccs]);
  const toggleDark=useCallback(()=>setDark(d=>!d),[]);
  const handleSetTab=useCallback(t=>{setTab(t);window.scrollTo({top:0,behavior:"smooth"})},[]);

  // Keyboard shortcuts
  const searchRef=useRef(null);
  useEffect(()=>{
    const h=e=>{
      const tag=document.activeElement?.tagName;
      const isTyping=["INPUT","TEXTAREA","SELECT"].includes(tag);
      if(isTyping&&e.key!=="Escape")return;
      if(e.key==="Escape"){
        if(tradeModal!==null){setTradeModal(null);return;}
        if(balModal){setBalModal(false);return;}
        if(dataModal){setDataModal(false);return;}
        if(ddModal){setDdModal(false);return;}
        if(accModal){setAccModal(false);return;}
      }
      if(isTyping)return;
      if(e.key==="n"||e.key==="N"){e.preventDefault();setTradeModal({});return;}
      if(e.key==="/"){e.preventDefault();handleSetTab("log");setTimeout(()=>searchRef.current?.focus(),100);return;}
      if(e.key==="1")handleSetTab("dashboard");
      if(e.key==="2")handleSetTab("log");
      if(e.key==="3")handleSetTab("analytics");
      if(e.key==="4")handleSetTab("risk");
      if(e.key==="5")handleSetTab("notes");
    };
    window.addEventListener("keydown",h);
    return()=>window.removeEventListener("keydown",h);
  },[tradeModal,balModal,dataModal,ddModal,accModal,handleSetTab]);

  const{wins,losses,totalPnl,winRate,avgRR,gainsPct,avgWin,avgLoss,sorted,curBal,profitFactor,streak}=useMemo(()=>{
    const wins=trades.filter(t=>t.pnl>0),losses=trades.filter(t=>t.pnl<0);
    const total=trades.reduce((a,t)=>a+t.pnl,0);
    const wr=trades.length?Math.round((wins.length/trades.length)*100):0;
    const rr=trades.length?(trades.reduce((a,t)=>a+t.rr,0)/trades.length).toFixed(1):"—";
    const gp=accBal>0?((total/accBal)*100).toFixed(1):"0.0";
    const aw=wins.length?wins.reduce((a,t)=>a+t.pnl,0)/wins.length:0;
    const al=losses.length?losses.reduce((a,t)=>a+t.pnl,0)/losses.length:0;
    const s=[...trades].sort((a,b)=>b.date.localeCompare(a.date)||(b.time||"").localeCompare(a.time||""));
    const tw=wins.reduce((a,t)=>a+t.pnl,0),tl=Math.abs(losses.reduce((a,t)=>a+t.pnl,0));
    const pf=tl>0?(tw/tl).toFixed(2):"∞";
    // streak
    let stk={count:0,type:null};
    if(s.length){const ft=s[0].pnl>0?"win":s[0].pnl<0?"loss":null;if(ft){let c=0;for(const t of s){const ty=t.pnl>0?"win":t.pnl<0?"loss":null;if(ty===ft)c++;else break;}stk={count:c,type:ft};}}
    return{wins,losses,totalPnl:total,winRate:wr,avgRR:rr,gainsPct:gp,avgWin:aw,avgLoss:al,sorted:s,curBal:accBal+total,profitFactor:pf,streak:stk};
  },[trades,accBal]);

  const plusAction=tab==="notes"?()=>setOpenNote({title:"",body:"",updatedAt:new Date().toISOString()}):tab==="risk"?null:()=>setTradeModal({});

  if(loading)return(
    <BPCtx.Provider value={{isDesktop}}>
      <div style={{background:"var(--page)",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:14}}>
        <div style={{width:42,height:42,borderRadius:"var(--r-md)",background:"linear-gradient(135deg,var(--accent),#8B5CF6)",display:"flex",alignItems:"center",justifyContent:"center"}}><IcoTrendUp size={20} col="#fff"/></div>
        <div style={{color:"var(--t3)",fontSize:13,fontWeight:500}}>Loading journal…</div>
      </div>
    </BPCtx.Provider>
  );

  return(
    <BPCtx.Provider value={{isDesktop}}>
    <PnlCtx.Provider value={pnlHidden}>
    <ToastProvider>
    <div style={{minHeight:"100vh"}}>
      <Sidebar tab={tab} setTab={handleSetTab} onBackup={()=>setDataModal(true)} syncStatus={sync} plusAction={plusAction} accounts={accounts} activeId={activeId} onSwitch={handleSwitch} onManage={()=>setAccModal(true)} darkMode={dark} onToggleDark={toggleDark}/>
      <div className="shell" style={{background:"var(--page)",minHeight:"100vh",paddingBottom:isDesktop?40:96,maxWidth:isDesktop?"none":isTablet?"640px":"480px",margin:isDesktop?0:"0 auto"}}>

        {openNote!==null&&<NoteEditor note={openNote} onBack={()=>setOpenNote(null)} onSave={handleSaveNote} onDelete={handleDelNote}/>}
        <AppHeader tab={tab} syncStatus={sync} account={activeAcc} onSwitchAccount={()=>setAccModal(true)} darkMode={dark} onToggleDark={toggleDark} onBackup={()=>setDataModal(true)}/>

        {/* FAB */}
        {plusAction&&!isDesktop&&(
          <div className="fab-w" style={{position:"fixed",bottom:82,right:"max(16px,calc(50% - 224px))",zIndex:100}}>
            <button onClick={plusAction} className="tap" style={{width:50,height:50,borderRadius:"var(--r-md)",background:"var(--accent)",border:"none",color:"#fff",fontSize:22,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,boxShadow:`0 6px 24px var(--accent)55`}}>+</button>
          </div>
        )}

        <div className="desk-pad" style={{padding:"16px 16px 0"}}>
        <div>

          {/* ── DASHBOARD ── */}
          {tab==="dashboard"&&(
            <div className="tab-content">
              {isDesktop?(
                /* ── Desktop: 2-col grid ── */
                <div className="desk-grid">
                  {/* LEFT COLUMN */}
                  <div className="desk-col-left">
                    {/* Hero */}
                    <div className="card" style={{padding:"20px",marginBottom:14,minWidth:0,overflow:"hidden"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                            <div style={{fontSize:10,color:"var(--t3)",fontWeight:600,letterSpacing:".07em",textTransform:"uppercase"}}>Balance</div>
                            <button onClick={togglePnl} className="tap" title={pnlHidden?"Show":"Hide"} style={{background:"none",border:"none",padding:"2px 4px",borderRadius:4,color:"var(--t3)",fontSize:13,lineHeight:1,display:"flex",alignItems:"center"}}>{pnlHidden?"👁":"👁"}<span style={{fontSize:9,marginLeft:3,fontWeight:600,letterSpacing:".04em"}}>{pnlHidden?"SHOW":"HIDE"}</span></button>
                            <span style={{fontSize:10,color:"var(--t3)"}}>{trades.length} trades</span>
                          </div>
                          <div className="mono" style={{fontSize:"clamp(24px,3.5vw,42px)",fontWeight:700,color:"var(--t1)",letterSpacing:"-1.5px",lineHeight:1}}>{pnlHidden?PNL_MASK:fmtBal(curBal)}</div>
                          <div style={{display:"flex",gap:10,marginTop:8,alignItems:"center"}}>
                            <span className="mono" style={{fontSize:12,color:pnlHidden?"var(--t3)":clr(totalPnl),fontWeight:600}}>{pnlHidden?PNL_MASK:fmt(totalPnl)}</span>

                      </div>

                              <span className="mono" style={{fontSize:11,color:pnlHidden?"var(--t3)":clr(apnl)}}>{pnlHidden?PNL_MASK:fmt(apnl)}</span>

                        {[{l:"Set Balance",a:()=>setBalModal(true),col:"var(--green)"},{l:"Drawdown",a:()=>setDdModal(true),col:"var(--red)"},{l:"+ Log Trade",a:()=>setTradeModal({}),primary:true}].map((x,i)=>(

                      <StatCard label="Avg Win" value={avgWin?`$${Math.round(avgWin)}`:"—"} col="var(--green)"/>
                      <StatCard label="Avg Loss" value={avgLoss?`$${Math.abs(Math.round(avgLoss))}`:"—"} col="var(--red)"/>
                      <StatCard label="Prof. Factor" value={profitFactor} col={profitFactor==="∞"||parseFloat(profitFactor)>=1.5?"var(--green)":parseFloat(profitFactor)<1?"var(--red)":"var(--amber)"}/>
                      <StatCard label="Streak" value={streak.count?`${streak.count}×`:"—"} sub={streak.type||""} col={streak.type==="win"?"var(--green)":streak.type==="loss"?"var(--red)":"var(--t2)"}/>
                    </div>

                    <AlertBanner sorted={sorted}/>

                    {/* Equity Curve full card */}
                    <EquityCurveDashCard trades={trades} accountBalance={accBal}/>

                    {/* Tradezella-style dashboard calendar */}
                    <DashboardCalendar trades={trades} onLogTrade={()=>setTradeModal({})}/>

                    {/* Recent trades below calendar */}
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                      <div className="sec" style={{marginBottom:0}}>Recent Trades</div>

                        <div style={{fontSize:13,color:"var(--t3)"}}>Use + Log Trade above to get started</div>

                        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
                          <div style={{fontSize:10,color:"var(--t3)",fontWeight:600,letterSpacing:".07em",textTransform:"uppercase"}}>Balance</div>
                          <button onClick={togglePnl} className="tap" style={{background:"none",border:"none",padding:"2px 4px",borderRadius:4,color:"var(--t3)",fontSize:11,lineHeight:1,display:"flex",alignItems:"center",gap:3}}>{pnlHidden?"👁":"👁"}<span style={{fontSize:8,fontWeight:700,letterSpacing:".04em"}}>{pnlHidden?"SHOW":"HIDE"}</span></button>
                        </div>
                        <div className="mono" style={{fontSize:40,fontWeight:500,color:"var(--t1)",letterSpacing:"-2px",lineHeight:1}}>{fmtBal(curBal)}</div>
                        <div style={{display:"flex",gap:10,marginTop:8,alignItems:"center",flexWrap:"wrap"}}>
                          <span className="mono" style={{fontSize:12,color:pnlHidden?"var(--t3)":"var(--t2)",fontWeight:500}}>{pnlHidden?PNL_MASK:fmt(totalPnl)}</span>
                          <span className="mono" style={{fontSize:12,color:pnlHidden?"var(--t3)":"var(--t2)",fontWeight:500}}>{pnlHidden?PNL_MASK:fmtPct(parseFloat(gainsPct))}</span>
                          <span style={{fontSize:10,color:"var(--t3)"}}>·</span>
                          <span style={{fontSize:12,color:"var(--t3)"}}>{trades.length} trades</span>
                        </div>
                      </div>
                      <div style={{width:88,flexShrink:0,marginLeft:12}}><EquityCurve trades={trades} accountBalance={accBal}/></div>
                    </div>
                    {accounts.length>1&&(
                      <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:2,marginBottom:14}}>
                        {accounts.map(acc=>{const ap=allTrades[acc.id]||[],apnl=ap.reduce((a,t)=>a+t.pnl,0),ia=acc.id===activeId;return(
                          <button key={acc.id} onClick={()=>handleSwitch(acc.id)} className="tap" style={{display:"flex",alignItems:"center",gap:5,padding:"4px 9px 4px 5px",borderRadius:99,border:`1px solid ${ia?acc.color+"55":"var(--line)"}`,background:ia?acc.color+"15":"transparent",flexShrink:0,whiteSpace:"nowrap"}}>
                            <div style={{width:12,height:12,borderRadius:"50%",background:acc.color,flexShrink:0}}/>
                            <span style={{fontSize:10,fontWeight:600,color:ia?acc.color:"var(--t3)"}}>{acc.name}</span>
                            <span className="mono" style={{fontSize:10,color:pnlHidden?"var(--t3)":clr(apnl)}}>{pnlHidden?PNL_MASK:fmt(apnl)}</span>
                          </button>
                        );})}
                      </div>
                    )}
                    <div style={{display:"flex",gap:6}}>
                      {[{l:"Balance",a:()=>setBalModal(true),col:"var(--green)",bg:"var(--green-dim)"},{l:"Drawdown",a:()=>setDdModal(true),col:"var(--red)",bg:"var(--red-dim)"}].map((x,i)=>(
                        <button key={i} onClick={x.a} className="tap" style={{flex:1,padding:"9px 6px",background:x.bg,border:`1px solid ${x.col}22`,borderRadius:"var(--r-sm)",cursor:"pointer",fontSize:10,color:x.col,fontWeight:700}}>{x.l}</button>
                      ))}
                    </div>
                  </div>
                  {/* Stats */}
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                    <StatCard label="Win Rate" value={`${winRate}%`} sub={`${wins.length}W · ${losses.length}L`} col={winRate>=50?"var(--green)":"var(--red)"}/>
                    <StatCard label="Avg R:R" value={`${avgRR}R`} sub={`${trades.length} trades`}/>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,marginBottom:14}}>
                    <StatCard label="Avg Win" value={avgWin?`$${Math.round(avgWin)}`:"—"} col="var(--green)"/>
                    <StatCard label="Avg Loss" value={avgLoss?`$${Math.abs(Math.round(avgLoss))}`:"—"} col="var(--red)"/>
                    <StatCard label="Prof. Factor" value={profitFactor} col={profitFactor==="∞"||parseFloat(profitFactor)>=1.5?"var(--green)":parseFloat(profitFactor)<1?"var(--red)":"var(--amber)"}/>
                    <StatCard label="Streak" value={streak.count?`${streak.count}×`:"—"} sub={streak.type||""} col={streak.type==="win"?"var(--green)":streak.type==="loss"?"var(--red)":"var(--t2)"}/>
                  </div>
                  <AlertBanner sorted={sorted}/>
                  <EquityCurveDashCard trades={trades} accountBalance={accBal}/>
                  <DrawdownCard trades={trades} accountBalance={accBal} drawdownLimit={ddLim} totalPnl={totalPnl} consistencyLimit={clLim}/>
                  <BreakdownCard trades={trades}/>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <div className="sec" style={{marginBottom:0}}>Recent</div>
                    {sorted.length>6&&<button onClick={()=>handleSetTab("log")} className="tap" style={{fontSize:12,color:"var(--accent)",fontWeight:600,background:"none",border:"none"}}>View all →</button>}
                  </div>
                  {sorted.length===0?(
                    <div className="card" style={{padding:"44px 20px",textAlign:"center"}}>
                      <IcoTrendUp size={32} col="var(--t3)"/>
                      <div style={{fontSize:14,fontWeight:700,color:"var(--t2)",margin:"12px 0 6px"}}>No trades yet</div>
                      <div style={{fontSize:12,color:"var(--t3)"}}>Tap + to log your first trade</div>
                    </div>
                  ):(
                    <div className="card" style={{padding:"0 16px"}}>
                      {sorted.slice(0,6).map((t,i)=><TradeRow key={t.id} trade={t} onPress={()=>setTradeModal(t)} isLast={i===Math.min(sorted.length,6)-1}/>)}
                    </div>
                  )}
                </>
              )}
            </div>
          )}

          {tab==="log"&&<div className="tab-content" style={{maxWidth:isDesktop?900:"none"}}><TradeLogView trades={sorted} onPress={t=>setTradeModal(t)} accountName={activeAcc?.name} searchRef={searchRef}/></div>}
          {tab==="analytics"&&<div className="tab-content" style={{maxWidth:isDesktop?900:"none",margin:isDesktop?"0 auto":"unset"}}><AnalyticsView trades={trades} accountBalance={accBal}/></div>}

          {tab==="notes"&&(
            <div className="tab-content">
              <div style={{display:"flex",gap:4,marginBottom:12,background:"var(--surface)",borderRadius:"var(--r-md)",padding:4,border:"1px solid var(--line)"}}>
                {[{id:"personal",l:"My Notes"},{id:"trade",l:"Trade Notes"}].map(s=>(
                  <button key={s.id} onClick={()=>setNoteTab(s.id)} className="tap" style={{flex:1,padding:"7px 6px",borderRadius:"var(--r-sm)",border:"none",background:noteTab===s.id?"var(--elevated)":"transparent",color:noteTab===s.id?"var(--t1)":"var(--t3)",fontSize:12,fontWeight:600}}>{s.l}</button>
                ))}
              </div>
              {noteTab==="personal"&&<NotesList notes={notes} onOpen={n=>setOpenNote(n)}/>}
              {noteTab==="trade"&&(
                <div className="card" style={{padding:"0 16px"}}>
                  {[...trades].filter(t=>t.notes?.trim()).sort((a,b)=>b.date.localeCompare(a.date)).map((t,i,arr)=>(
                    <div key={t.id} style={{padding:"13px 0",borderBottom:i<arr.length-1?"1px solid var(--line)":"none"}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                        <div style={{display:"flex",alignItems:"center",gap:7}}>
                          <div style={{width:5,height:5,borderRadius:"50%",background:clr(t.pnl),flexShrink:0}}/>
                          <span className="mono" style={{fontSize:11,color:"var(--t2)"}}>{t.date}</span>
                          <span style={{fontSize:11,color:"var(--t3)"}}>{t.strategy}</span>
                        </div>
                        <span className="mono" style={{fontSize:12,fontWeight:500,color:clr(t.pnl)}}>{fmt(t.pnl)}</span>
                      </div>
                      <div style={{fontSize:12,color:"var(--t2)",lineHeight:1.7}}>{t.notes}</div>
                    </div>
                  ))}
                  {trades.filter(t=>t.notes?.trim()).length===0&&<div style={{padding:"40px 0",textAlign:"center",fontSize:12,color:"var(--t3)"}}>Add notes when logging trades</div>}
                </div>
              )}
            </div>
          )}

          {tab==="risk"&&<div className="tab-content"><RiskManagement accountBalance={accBal} totalPnl={totalPnl}/></div>}

        </div>
        </div>

        {/* ── Bottom Nav ── */}
        <div className="bot-nav" style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"var(--surface)",borderTop:"1px solid var(--line)",display:"flex",padding:"8px 6px 22px",gap:2}}>
          {[{id:"dashboard",l:"Home",I:IcoHome},{id:"log",l:"Log",I:IcoLog},{id:"analytics",l:"Stats",I:IcoChart},{id:"risk",l:"Risk",I:IcoShield},{id:"notes",l:"Notes",I:IcoNote}].map(({id,l,I})=>{
            const a=tab===id;
            return(
              <button key={id} onClick={()=>handleSetTab(id)} className="tap" style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"5px 0",borderRadius:"var(--r-md)"}}>
                <div style={{width:36,height:30,borderRadius:"var(--r-md)",background:a?"var(--accent-dim)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"background .12s"}}>
                  <I size={17} col={a?"var(--accent)":"var(--t3)"}/>
                </div>
                <span style={{fontSize:9,fontWeight:700,color:a?"var(--accent)":"var(--t3)",letterSpacing:".02em"}}>{l}</span>
              </button>
            );
          })}
          <button onClick={toggleDark} className="tap" style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"5px 0",borderRadius:"var(--r-md)"}}>
            <div style={{width:36,height:30,borderRadius:"var(--r-md)",background:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
              {dark?<IcoSun size={17} col="var(--t3)"/>:<IcoMoon size={17} col="var(--t3)"/>}
            </div>
            <span style={{fontSize:9,fontWeight:700,color:"var(--t3)",letterSpacing:".02em"}}>{dark?"Light":"Dark"}</span>
          </button>
        </div>

        {/* ── Modals ── */}
        {tradeModal!==null&&<TradeModal trade={tradeModal} onSave={handleSaveTrade} onDelete={handleDelTrade} onClose={()=>setTradeModal(null)}/>}
        {balModal&&<BalanceModal current={accBal} onSave={handleSaveBal} onClose={()=>setBalModal(false)}/>}
        {dataModal&&<DataModal trades={trades} notes={notes} account={activeAcc} onImport={handleImport} onClearAll={handleClear} onClose={()=>setDataModal(false)}/>}
        {ddModal&&<DDModal drawdownLimit={ddLim} consistencyLimit={clLim} totalPnl={totalPnl} onSave={handleSaveDD} onClose={()=>setDdModal(false)}/>}
        {accModal&&<AccModal accounts={accounts} activeId={activeId} onSwitch={handleSwitch} onAdd={handleAddAcc} onEdit={handleEditAcc} onDelete={handleDelAcc} onClose={()=>setAccModal(false)}/>}
        {/* Daily Kill Switch */}
        <DailyKillSwitch trades={trades} accountBalance={accBal} drawdownLimit={ddLim}/>
        {/* Keyboard shortcuts hint — desktop only */}
        {isDesktop&&<KbdShortcutsHint/>}
      </div>
    </div>
    </ToastProvider>
    </PnlCtx.Provider>
    </BPCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
