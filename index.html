  <style>
    /* ── Design System: Dark-first, 3-layer surface ── */
    :root {
      --page:     #0D0D0D;
      --surface:  #161616;
      --elevated: #202020;
      --overlay:  #2A2A2A;
      --line:     rgba(255,255,255,0.07);
      --line-md:  rgba(255,255,255,0.13);
      --t1: #F2F2F2;
      --t2: #888;
      --t3: #444;
      --green:      #00E676;
      --green-dim:  rgba(0,230,118,0.12);
      --red:        #FF4D4D;
      --red-dim:    rgba(255,77,77,0.11);
      --amber:      #FFB830;

      --page:     #EFEFED;
      --surface:  #FFFFFF;
      --elevated: #F4F4F2;
      --overlay:  #EAEAE8;
      --line:     rgba(0,0,0,0.07);
      --line-md:  rgba(0,0,0,0.13);
      --t1: #111;
      --t2: #777;
      --t3: #BDBDBD;
      --green:      #00A854;
      --green-dim:  rgba(0,168,84,0.09);
      --red:        #E02020;
      --red-dim:    rgba(224,32,32,0.08);
      --amber:      #C97900;
      --amber-dim:  rgba(201,121,0,0.09);
      --blue:       #2563EB;
      --blue-dim:   rgba(37,99,235,0.09);
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{background:var(--page);min-height:100%;-webkit-font-smoothing:antialiased;font-family:var(--sans);color:var(--t1)}
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
    input[type=date]::-webkit-calendar-picker-indicator{opacity:.4;filter:invert(1)}
    [data-theme="light"] input[type=date]::-webkit-calendar-picker-indicator{filter:none;opacity:.5}
    ::-webkit-scrollbar{width:0}
    button{touch-action:manipulation;-webkit-tap-highlight-color:transparent;font-family:var(--sans);cursor:pointer}
    input,textarea{font-family:var(--sans)}

    @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    @keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
    @keyframes toastIn{from{opacity:0;transform:translateY(8px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    .tab-content{animation:fadeUp .15s ease forwards}
    .skeleton{background:linear-gradient(90deg,var(--elevated) 25%,var(--overlay) 50%,var(--elevated) 75%);background-size:600px 100%;animation:shimmer 1.3s infinite;border-radius:var(--r-md)}
    .toast-in{animation:toastIn .18s ease forwards}
    .tap{transition:opacity .1s,transform .1s;cursor:pointer}
    .tap:active{opacity:.65;transform:scale(.97)}
    .mono{font-family:var(--mono)}
    .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg)}
    .elev{background:var(--elevated);border:1px solid var(--line);border-radius:var(--r-md)}
    .pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
    .inp{width:100%;background:var(--elevated);border:1px solid var(--line-md);border-radius:var(--r-md);color:var(--t1);font-size:15px;padding:13px 14px;outline:none;transition:border-color .15s;font-family:var(--sans);font-weight:500}
    .inp:focus{border-color:var(--green)}
    .inp::placeholder{color:var(--t3)}
    .sec{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
    .divider{height:1px;background:var(--line)}

    /* tablet only */
    @media(min-width:768px) and (max-width:1023px){
      .shell{max-width:640px!important;margin:0 auto!important}
      .bot-nav{max-width:640px!important;left:50%!important;transform:translateX(-50%)!important}
    }
    /* desktop */
    @media(min-width:1024px){
      .bot-nav{display:none!important}
      .sidebar{display:flex!important;width:220px}
      .shell{margin-left:220px!important;margin-right:0!important;max-width:none!important;width:calc(100vw - 220px)!important}
      .desk-pad{padding:24px 32px 0!important}
      .desk-grid{display:grid!important;grid-template-columns:1fr 360px;gap:20px;align-items:start;width:100%}
      .desk-col-left{min-width:0;overflow:hidden}
      .desk-col-right{position:sticky;top:20px;min-width:0}
      .fab-w{right:32px!important;bottom:32px!important}
    }
    @media(min-width:1280px){
      .sidebar{width:240px!important}
      .shell{margin-left:240px!important;width:calc(100vw - 240px)!important}
      .desk-grid{grid-template-columns:1fr 380px!important}
    }
    @media(min-width:1600px){
      .desk-grid{grid-template-columns:1fr 420px!important}
    }
    @media print{
      .bot-nav,.sidebar,.fab-w,.np{display:none!important}
      body{background:#fff!important}
      .shell{margin:0!important;max-width:100%!important;width:100%!important}
    }
  </style>
</head>

function useWidth(){
  const[w,setW]=useState(window.innerWidth);
  useEffect(()=>{
    let t;
    const h=()=>{clearTimeout(t);t=setTimeout(()=>setW(window.innerWidth),150)};
    window.addEventListener("resize",h,{passive:true});
    return()=>{window.removeEventListener("resize",h);clearTimeout(t)};

}

/* ── Helpers ── */
const fmt=n=>{const a=Math.abs(n).toLocaleString("en-US",{maximumFractionDigits:0});return(n>=0?"+":"−")+"$"+a};
const fmtPct=n=>(n>=0?"+":"")+n.toFixed(1)+"%";

const clr=n=>n>0?"var(--green)":n<0?"var(--red)":"var(--t2)";
const clrDim=n=>n>0?"var(--green-dim)":n<0?"var(--red-dim)":"var(--elevated)";
function today(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
function fmtNoteDate(iso){
  const d=new Date(iso),now=new Date(),diff=Math.floor((now-d)/86400000);
  if(diff===0)return d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
  if(diff===1)return"Yesterday";
  if(diff<7)return DAYS[d.getDay()];
  return`${d.getDate()} ${MONTHS[d.getMonth()]}`;
}
function calDays(y,m){const f=new Date(y,m,1).getDay(),t=new Date(y,m+1,0).getDate(),c=[];for(let i=0;i<f;i++)c.push(null);for(let d=1;d<=t;d++)c.push(d);return c}
function newId(){return"acc_"+Date.now()+"_"+Math.random().toString(36).slice(2,7)}

/* ── Toast ── */
function ToastProvider({children}){
  const[ts,setTs]=useState([]);
  const show=useCallback((msg,type="success")=>{
    const id=Date.now();
    setTs(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setTs(p=>p.filter(t=>t.id!==id)),2500);
  },[]);
  const col={success:"var(--green)",error:"var(--red)",warn:"var(--amber)"};
  return(
    <ToastCtx.Provider value={show}>
      {children}
      <div style={{position:"fixed",bottom:96,left:"50%",transform:"translateX(-50%)",zIndex:600,display:"flex",flexDirection:"column",gap:6,alignItems:"center",pointerEvents:"none"}}>
        {ts.map(t=><div key={t.id} className="toast-in" style={{background:col[t.type]||col.success,color:"#000",padding:"9px 18px",borderRadius:99,fontSize:13,fontWeight:600,whiteSpace:"nowrap"}}>{t.msg}</div>)}
      </div>
    </ToastCtx.Provider>
  );
}

/* ── Image compress ── */
function compressImage(url,maxPx=1280,q=.8){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      let{width:w,height:h}=img;
      if(w>maxPx||h>maxPx){if(w>h){h=Math.round(h*maxPx/w);w=maxPx}else{w=Math.round(w*maxPx/h);h=maxPx}}
      const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);
      res(c.toDataURL("image/jpeg",q));
    };img.src=url;
  });
}

/* ── Trade Row — flat list ── */
const TradeRow=React.memo(function TradeRow({trade,onPress,isLast}){
  const win=trade.pnl>0,loss=trade.pnl<0;
  const cts=trade.contracts||1;
  return(

/* ── Equity Curve sparkline ── */
const EquityCurve=React.memo(function EquityCurve({trades,accountBalance}){
  const pts=useMemo(()=>{
    const s=[...trades].sort((a,b)=>a.date.localeCompare(b.date));
    let bal=accountBalance;const arr=[bal];
    s.forEach(t=>{bal+=t.pnl;arr.push(bal)});return arr;
  },[trades,accountBalance]);
  if(pts.length<2)return null;
  const W=300,H=48,mn=Math.min(...pts),mx=Math.max(...pts),rng=mx-mn||1;
  const tx=i=>(i/(pts.length-1))*W;
  const ty=v=>H-(((v-mn)/rng)*H*.82+H*.09);
  const line=pts.map((v,i)=>`${i===0?"M":"L"}${tx(i).toFixed(1)},${ty(v).toFixed(1)}`).join(" ");
  const area=line+` L${W},${H} L0,${H} Z`;
  const up=pts[pts.length-1]>=pts[0];
  const sc=up?"var(--green)":"var(--red)",hex=up?"#00E676":"#FF4D4D";
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",display:"block",overflow:"visible"}}>
      <defs><linearGradient id="eqg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={hex} stopOpacity=".2"/><stop offset="100%" stopColor={hex} stopOpacity="0"/></linearGradient></defs>
      <path d={area} fill="url(#eqg)"/>
      <path d={line} fill="none" stroke={sc} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={tx(pts.length-1)} cy={ty(pts[pts.length-1])} r="3" fill={sc} stroke="var(--surface)" strokeWidth="1.5"/>
    </svg>
  );
});

/* ── Drawdown Card ── */
const DrawdownCard=React.memo(function DrawdownCard({trades,accountBalance,drawdownLimit,totalPnl,consistencyLimit}){
  const sorted=useMemo(()=>[...trades].sort((a,b)=>a.date.localeCompare(b.date)),[trades]);
  // Trailing DD — Funded Next / FTMO style
  // - DD floor = peak balance - ddLimit (trailing up with balance)
  // - Floor LOCKS at startingBalance once profit >= ddLimit (floor never goes above start)
  // - Breach = current balance <= floor
  const{points,curBal,curFloor,curDD,curDDPct,isBreached,floorLocked}=useMemo(()=>{
    const ddLim=drawdownLimit||0;
    const startBal=accountBalance;
    let bal=startBal;
    let peak=startBal;
    // floor starts at startBal - ddLimit
    let floor=ddLim>0?startBal-ddLim:0;
    const pts=[{bal,floor,dd:ddLim>0?ddLim:0,pct:0}];
    sorted.forEach(t=>{
      bal+=t.pnl;
      if(bal>peak){
        peak=bal;
        if(ddLim>0){
          const newFloor=peak-ddLim;
          // floor trails up BUT locks at startBal (never go above start balance)
          floor=Math.min(newFloor,startBal);
        }
      }
      const dd=Math.max(bal-floor,0);
      const pct=ddLim>0?Math.max(((floor+ddLim-bal)/ddLim)*100,0):0;
      pts.push({bal,floor,dd:floor>0?bal-floor:0,pct});
    });
    const curDD=ddLim>0?bal-floor:0; // positive = how much room left above floor
    const ddUsed=ddLim>0?Math.max(0,floor+ddLim-bal):0; // how much DD consumed
    const ddUsedPct=ddLim>0?(ddUsedPct_=>(ddUsedPct_))((ddUsed/ddLim)*100):0;
    const isBreached=ddLim>0&&bal<=floor;
    const floorLocked=ddLim>0&&floor>=startBal;
    return{
      points:pts,
      curBal:bal,
      curFloor:floor,
      curDD:ddUsed,          // how much DD has been consumed
      curDDPct:ddLim>0?(ddUsed/ddLim)*100:0,
      bufferLeft:ddLim>0?bal-floor:0,  // how much left before breach
      isBreached,
      floorLocked,
    };
  },[sorted,accountBalance,drawdownLimit]);
  const ddLim=drawdownLimit||0;
  const used=ddLim>0?Math.min(curDDPct,100):0;
  const safe=used<70,warn=used>=70&&used<90;
  const bufferLeft=ddLim>0?curBal-curFloor:0;
  const todayPnl=useMemo(()=>trades.filter(t=>t.date===today()).reduce((a,t)=>a+t.pnl,0),[trades]);

  const chartMin=Math.min(...allBals,...allFloors)*0.999;
  const chartMax=Math.max(...allBals,...allFloors)*1.001;
  const chartRng=chartMax-chartMin||1;
  const tx=i=>(i/(cPts.length-1||1))*W;
  const ty=v=>H-((v-chartMin)/chartRng)*H;
  const balPath=cPts.map((p,i)=>`${i===0?"M":"L"}${tx(i).toFixed(1)},${ty(p.bal).toFixed(1)}`).join(" ");
  const floorPath=ddLim>0?cPts.map((p,i)=>`${i===0?"M":"L"}${tx(i).toFixed(1)},${ty(p.floor||0).toFixed(1)}`).join(" "):null;
  return(

/* ── Breakdown ── */
const BreakdownCard=React.memo(function BreakdownCard({trades}){
  const{sRows,iRows}=useMemo(()=>{
    const sm={},im={};
    trades.forEach(t=>{
      if(!sm[t.strategy])sm[t.strategy]={pnl:0,wins:0,n:0};
      sm[t.strategy].pnl+=t.pnl;sm[t.strategy].n++;if(t.pnl>0)sm[t.strategy].wins++;
      const ik=t.instrument||"Other";
      if(!im[ik])im[ik]={pnl:0,wins:0,n:0,cts:0};
      im[ik].pnl+=t.pnl;im[ik].n++;im[ik].cts+=(t.contracts||1);if(t.pnl>0)im[ik].wins++;
    });
    return{
      sRows:Object.entries(sm).map(([k,v])=>({name:k,...v,wr:Math.round((v.wins/v.n)*100)})).sort((a,b)=>b.pnl-a.pnl).slice(0,5),
      iRows:Object.entries(im).map(([k,v])=>({name:k,...v,wr:Math.round((v.wins/v.n)*100),ppc:v.pnl/v.cts})).sort((a,b)=>b.pnl-a.pnl),
    };
  },[trades]);
  if(trades.length<3)return null;
  const maxS=Math.max(...sRows.map(r=>Math.abs(r.pnl)),1),maxI=Math.max(...iRows.map(r=>Math.abs(r.pnl)),1);
  return(
    <div className="card" style={{padding:"18px",marginBottom:12}}>
      {sRows.length>=2&&<>
        <div className="sec">Strategy</div>
        {sRows.map((r,i)=>(
          <div key={i} style={{marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
              <span style={{fontSize:12,color:"var(--t1)",fontWeight:500}}>{r.name}</span>
              <div style={{display:"flex",gap:10}}><span style={{fontSize:11,color:"var(--t2)"}}>{r.wr}% · {r.n}T</span><span className="mono" style={{fontSize:12,fontWeight:500,color:clr(r.pnl),minWidth:60,textAlign:"right"}}>{fmt(r.pnl)}</span></div>
            </div>
            <div style={{height:3,background:"var(--elevated)",borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.round((Math.abs(r.pnl)/maxS)*100)}%`,background:r.pnl>=0?"var(--green)":"var(--red)",borderRadius:99}}/></div>
          </div>
        ))}
      </>}
      {iRows.length>=1&&<>
        <div className="sec" style={{marginTop:sRows.length>=2?14:0}}>Instrument</div>
        {iRows.map((r,i)=>{const col=ICOL[r.name]||"var(--t2)";return(
          <div key={i} style={{marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
              <div style={{display:"flex",alignItems:"center",gap:7}}><span className="pill" style={{background:col+"22",color:col}}>{r.name}</span><span style={{fontSize:11,color:"var(--t2)"}}>{r.wr}% · {r.n}T</span></div>
              <div style={{textAlign:"right"}}><div className="mono" style={{fontSize:12,fontWeight:500,color:clr(r.pnl)}}>{fmt(r.pnl)}</div><div className="mono" style={{fontSize:10,color:"var(--t3)"}}>{fmt(r.ppc)}/ct</div></div>
            </div>
            <div style={{height:3,background:"var(--elevated)",borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.round((Math.abs(r.pnl)/maxI)*100)}%`,background:r.pnl>=0?col:"var(--red)",borderRadius:99,opacity:.8}}/></div>
          </div>

    let s=1,iw=sorted[0]?.pnl>0;
    if(sorted.length>0){for(let i=1;i<sorted.length;i++){if((sorted[i].pnl>0)===iw)s++;else break};if(iw)ws=s;}
    return{lossStreak:ls,winStreak:ws};
  },[sorted]);
  if(lossStreak>=3){
    const[col,bg,msg]=lossStreak>=5?["var(--red)","var(--red-dim)","5 consecutive losses — Stop and review before next trade."]:["var(--amber)","var(--amber-dim)","3 losses in a row — Step back and review your setups."];

  const[search,setSearch]=useState(""),showF=useState(false);
  const[showFilters,setShowFilters]=showF;

/* ── Data Modal ── */
function DataModal({trades,notes,account,onImport,onClearAll,onClose}){
  const fRef=useRef(null),[status,setStatus]=useState(null),[conf,setConf]=useState(false);
  const toast=useToast();
  const doExport=()=>{
    try{
      const wb=XLSX.utils.book_new();
      const rows=trades.length?trades.map(t=>({Date:t.date,PnL:t.pnl,RR:t.rr,Instrument:t.instrument||"",Contracts:t.contracts||1,Strategy:t.strategy,Session:t.session||"",Tags:(t.tags||[]).join(";"),Notes:t.notes||"",_id:t.id})):[{Date:"",PnL:"",RR:"",Instrument:"",Contracts:"",Strategy:"",Session:"",Tags:"",Notes:"",_id:""}];
      const ws=XLSX.utils.json_to_sheet(rows);ws["!cols"]=[{wch:12},{wch:8},{wch:6},{wch:10},{wch:10},{wch:16},{wch:10},{wch:28},{wch:40},{wch:16}];
      XLSX.utils.book_append_sheet(wb,ws,"Trades");
      if(notes.length)XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(notes.map(n=>({Title:n.title,Body:n.body||"",UpdatedAt:n.updatedAt,_id:n.id}))),"Notes");
      XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet([{AccountName:account?.name||"",Balance:account?.balance||DEF_BAL,ExportedAt:new Date().toISOString()}]),"Settings");
      XLSX.writeFile(wb,`nq-journal-${account?.name?.replace(/\s+/g,"-")||"account"}-${today()}.xlsx`);
      toast(`Exported ${trades.length} trades`);setStatus({ok:true,msg:`✓ ${trades.length} trades exported`});
    }catch(e){setStatus({ok:false,msg:"Export failed: "+e.message})}
  };
  const onFile=e=>{
    const f=e.target.files?.[0];if(!f)return;setStatus(null);
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const wb=XLSX.read(new Uint8Array(ev.target.result),{type:"array"});
        let t=null,n=null,b=null;
        if(wb.SheetNames.includes("Trades")){const rows=XLSX.utils.sheet_to_json(wb.Sheets["Trades"]);t=rows.filter(r=>r.Date).map(r=>({id:r._id||Date.now()+Math.random(),date:String(r.Date),pnl:parseFloat(r.PnL)||0,rr:parseFloat(r.RR)||0,strategy:r.Strategy||"Other",session:r.Session||"",instrument:r.Instrument||"MNQ",contracts:parseInt(r.Contracts)||1,tags:r.Tags?r.Tags.split(";").filter(Boolean):[],notes:r.Notes||""}))}
        if(wb.SheetNames.includes("Notes")){const rows=XLSX.utils.sheet_to_json(wb.Sheets["Notes"]);n=rows.filter(r=>r.Title).map(r=>({id:r._id||Date.now()+Math.random(),title:r.Title||"Untitled",body:r.Body||"",updatedAt:r.UpdatedAt||new Date().toISOString()}))}
        if(wb.SheetNames.includes("Settings")){const rows=XLSX.utils.sheet_to_json(wb.Sheets["Settings"]);if(rows.length&&rows[0].Balance!=null)b=parseFloat(rows[0].Balance)}
        if(!t&&!n&&b==null){setStatus({ok:false,msg:"File not recognized"});return}
        onImport({trades:t,notes:n,balance:b});const msg=`✓ Imported ${t?.length||0} trades`;setStatus({ok:true,msg});toast(msg);
      }catch(err){setStatus({ok:false,msg:"Failed: "+err.message})}
    };r.readAsArrayBuffer(f);e.target.value="";
  };
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.65)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:200,backdropFilter:"blur(8px)"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{width:"100%",maxWidth:480,margin:"0 auto",background:"var(--surface)",borderRadius:"var(--r-xl) var(--r-xl) 0 0",padding:"20px 20px 44px",maxHeight:"80vh",overflowY:"auto",border:"1px solid var(--line-md)"}}>
        <div style={{width:36,height:4,background:"var(--overlay)",borderRadius:99,margin:"0 auto 20px"}}/>
        <div style={{fontSize:16,fontWeight:700,color:"var(--t1)",marginBottom:4}}>Backup & Sync</div>
        <div style={{fontSize:12,color:"var(--t2)",marginBottom:18}}>{account?.name} · {trades.length} trades</div>
        <div className="sec">Export</div>
        <button onClick={doExport} className="tap" style={{width:"100%",padding:"13px",background:"var(--green)",border:"none",borderRadius:"var(--r-md)",color:"#000",fontSize:14,fontWeight:700,marginBottom:8}}>Download .xlsx</button>
        <button onClick={()=>{onClose();setTimeout(()=>window.print(),200)}} className="tap" style={{width:"100%",padding:"13px",background:"var(--elevated)",border:"1px solid var(--line)",borderRadius:"var(--r-md)",color:"var(--t2)",fontSize:14,fontWeight:600,marginBottom:18}}>Print / Save PDF</button>
        <div className="sec">Import</div>
        <input ref={fRef} type="file" accept=".xlsx,.xls" onChange={onFile} style={{display:"none"}}/>
        <button onClick={()=>fRef.current?.click()} className="tap" style={{width:"100%",padding:"13px",background:"var(--elevated)",border:"1.5px dashed var(--line-md)",borderRadius:"var(--r-md)",color:"var(--t2)",fontSize:14,fontWeight:600,marginBottom:6}}>Select .xlsx file</button>
        <div style={{fontSize:11,color:"var(--red)",marginBottom:14}}>⚠ Replaces all trades for this account</div>
        {status&&<div style={{padding:"10px 12px",borderRadius:"var(--r-sm)",background:status.ok?"var(--green-dim)":"var(--red-dim)",color:status.ok?"var(--green)":"var(--red)",fontSize:12,fontWeight:600,marginBottom:14}}>{status.msg}</div>}
        <div style={{borderTop:"1px solid var(--line)",paddingTop:14}}>
          <div className="sec" style={{color:"var(--red)"}}>Danger Zone</div>
          {!conf?<button onClick={()=>setConf(true)} className="tap" style={{width:"100%",padding:"12px",background:"var(--red-dim)",border:"none",borderRadius:"var(--r-md)",color:"var(--red)",fontSize:13,fontWeight:600}}>Clear All Trades</button>
          :<div><div style={{fontSize:12,color:"var(--red)",marginBottom:10,textAlign:"center"}}>Delete all trades for "{account?.name}"?</div><div style={{display:"flex",gap:8}}><button onClick={()=>setConf(false)} className="tap" style={{flex:1,padding:"11px",background:"var(--elevated)",border:"none",borderRadius:"var(--r-md)",color:"var(--t2)",fontSize:13,fontWeight:600}}>Cancel</button><button onClick={()=>{onClearAll();setConf(false);onClose();toast("Cleared","error")}} className="tap" style={{flex:1,padding:"11px",background:"var(--red)",border:"none",borderRadius:"var(--r-md)",color:"#fff",fontSize:13,fontWeight:700}}>Delete All</button></div></div>}
        </div>
      </div>
    </div>
  );
}

/* ── Note Editor ── */
function NoteEditor({note,onBack,onSave,onDelete}){
  const{isDesktop}=useBP(),[title,setTitle]=useState(note.title||""),[body,setBody]=useState(note.body||"");
  const timer=useRef(null),nRef=useRef(note);nRef.current=note;
  const isNew=!note.id;
  const trigger=useCallback((t,b)=>{clearTimeout(timer.current);timer.current=setTimeout(()=>{onSave({...nRef.current,id:nRef.current.id||Date.now(),title:t.trim()||"Untitled",body:b,updatedAt:new Date().toISOString()},false)},800)},[onSave]);
  const back=()=>{clearTimeout(timer.current);if(title.trim()||body.trim())onSave({...nRef.current,id:nRef.current.id||Date.now(),title:title.trim()||"Untitled",body,updatedAt:new Date().toISOString()},true);else onBack()};
  return(
    <div style={{position:"fixed",inset:0,background:"var(--page)",zIndex:150,display:"flex",flexDirection:"column",marginLeft:isDesktop?220:0}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:isDesktop?"20px 32px 14px":"52px 18px 14px",borderBottom:"1px solid var(--line)"}}>
        <button onClick={back} className="tap" style={{background:"none",border:"none",color:"var(--green)",fontSize:14,fontWeight:600,display:"flex",alignItems:"center",gap:4}}>
          <IcoChL size={15} col="var(--green)"/> Notes
        </button>
        {!isNew&&<button onClick={()=>onDelete(note.id)} className="tap" style={{background:"var(--red-dim)",border:"none",borderRadius:"var(--r-sm)",color:"var(--red)",fontSize:12,fontWeight:600,padding:"6px 12px"}}>Delete</button>}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:isDesktop?"28px 32px 40px":"20px 18px 40px"}}>
        <div style={{maxWidth:isDesktop?700:"none",margin:isDesktop?"0 auto":"unset"}}>
          <textarea value={title} onChange={e=>{setTitle(e.target.value);trigger(e.target.value,body)}} placeholder="Title" rows={1} style={{width:"100%",background:"none",border:"none",outline:"none",color:"var(--t1)",fontSize:22,fontWeight:800,fontFamily:"var(--sans)",resize:"none",lineHeight:1.3,marginBottom:8,boxSizing:"border-box",overflow:"hidden"}}/>
          <div style={{fontSize:11,color:"var(--t3)",marginBottom:18}}>{new Date().toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</div>
          <textarea value={body} onChange={e=>{setBody(e.target.value);trigger(title,e.target.value)}} placeholder="Start writing…" style={{width:"100%",background:"none",border:"none",outline:"none",color:"var(--t2)",fontSize:15,fontFamily:"var(--sans)",resize:"none",lineHeight:1.9,boxSizing:"border-box",minHeight:"60vh"}}/>
        </div>
      </div>
    </div>
  );
}

/* ── Risk Management ── */
function RiskManagement({accountBalance,totalPnl}){
  const bal=accountBalance+totalPnl;
  const[useMan,setUseMan]=useState(false),[manBal,setManBal]=useState(""),[pct,setPct]=useState("1"),[result,setResult]=useState(null);
  const activeBal=useMan?(parseFloat(manBal)||0):bal;
  const calc=()=>{const b=activeBal,p=parseFloat(pct)/100;if(b>0&&p>0)setResult({b,pct:parseFloat(pct),loss:b*p})};
  return(
    <div>
      <div className="card" style={{padding:"20px",marginBottom:12}}>
        <div style={{fontSize:10,color:"var(--t3)",fontWeight:600,letterSpacing:".07em",textTransform:"uppercase",marginBottom:6}}>Account Value</div>
        <div className="mono" style={{fontSize:40,fontWeight:500,color:"var(--t1)",letterSpacing:"-1.5px",marginBottom:8}}>{fmtBal(bal)}</div>
        <div style={{display:"flex",gap:16}}>
          <span style={{fontSize:12,color:"var(--t3)"}}>Base <span className="mono" style={{color:"var(--t2)"}}>{fmtBal(accountBalance)}</span></span>
          <span style={{fontSize:12,color:"var(--t3)"}}>P&L <span className="mono" style={{color:clr(totalPnl)}}>{fmt(totalPnl)}</span></span>
        </div>
      </div>
      <div className="card" style={{padding:"16px",marginBottom:10}}>
        <div className="sec">Balance source</div>
        <div style={{display:"flex",gap:6,marginBottom:useMan?12:0}}>
          {[["Dashboard",false],["Manual",true]].map(([l,v])=><button key={l} onClick={()=>{setUseMan(v);setResult(null)}} className="tap" style={{flex:1,padding:"10px",borderRadius:"var(--r-sm)",fontSize:12,fontWeight:600,border:"none",background:useMan===v?"var(--green-dim)":"var(--elevated)",color:useMan===v?"var(--green)":"var(--t2)"}}>{l}</button>)}
        </div>
        {useMan&&<input type="number" placeholder="Enter balance" value={manBal} onChange={e=>{setManBal(e.target.value);setResult(null)}} className="inp mono" style={{marginTop:10}}/>}
      </div>
      <div className="card" style={{padding:"16px",marginBottom:12}}>
        <div className="sec">Risk per trade</div>
        <div style={{display:"flex",gap:6}}>
          {["0.5","1","2"].map(p=><button key={p} onClick={()=>{setPct(p);setResult(null)}} className="tap" style={{flex:1,padding:"10px",borderRadius:"var(--r-sm)",fontSize:13,fontWeight:700,border:"none",background:pct===p?"var(--amber-dim)":"var(--elevated)",color:pct===p?"var(--amber)":"var(--t2)"}}>{p}%</button>)}
          <input type="number" step="0.1" value={["0.5","1","2"].includes(pct)?"":(pct||"")} onChange={e=>{setPct(e.target.value);setResult(null)}} placeholder="%" className="inp mono" style={{flex:1,padding:"10px",fontSize:13,textAlign:"center"}}/>
        </div>
      </div>
      <button onClick={calc} className="tap" style={{width:"100%",padding:"15px",background:"var(--green)",border:"none",borderRadius:"var(--r-md)",color:"#000",fontSize:15,fontWeight:700,marginBottom:14}}>Calculate →</button>
      {result&&(
        <div className="card" style={{padding:"22px",textAlign:"center",border:"1px solid var(--amber)33"}}>
          <div style={{fontSize:10,color:"var(--t3)",fontWeight:600,letterSpacing:".07em",textTransform:"uppercase",marginBottom:8}}>Max Risk</div>
          <div className="mono" style={{fontSize:42,fontWeight:500,color:"var(--amber)",letterSpacing:"-1.5px",marginBottom:6}}>${result.loss.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
          <div style={{fontSize:12,color:"var(--t2)",marginBottom:12}}>{fmtBal(result.b)} × {result.pct}%</div>
          <div style={{padding:"10px 12px",background:"var(--elevated)",borderRadius:"var(--r-sm)",fontSize:11,color:"var(--t3)"}}>If max loss → balance <span className="mono" style={{color:"var(--red)"}}>{fmtBal(result.b-result.loss)}</span></div>
        </div>
      )}
      <div style={{padding:"12px 14px",background:"var(--elevated)",borderRadius:"var(--r-md)",marginTop:12,border:"1px solid var(--line)"}}>
        <div style={{fontSize:11,color:"var(--t3)",lineHeight:1.7}}>📌 Prop firm standard: 0.5–1% per trade. Keep risk consistent to protect trailing drawdown.</div>
      </div>
    </div>
  );
}

      .then(async([sa,sai,sn,lt,lb,ldd,lcl])=>{

        const trs=await Promise.all(fa.map(a=>loadData(TPK+a.id,null)));

        setAccounts(fa);setActiveId(fai||fa[0].id);setAllTrades(to);setNotes(sn||[]);setLoading(false);

  const saveAccs=useCallback((a,aid)=>{saveData(AK,a);if(aid!==undefined)saveData(AAK,aid)},[]);
  const saveTrades=useCallback((id,t)=>saveData(TPK+id,t),[]);

  const handleEditAcc=useCallback(a=>{setAccounts(p=>{const n=p.map(x=>x.id===a.id?a:x);saveAccs(n);return n})},[saveAccs]);

  const handleDelNote=useCallback(id=>{setNotes(p=>{const n=p.filter(x=>x.id!==id);saveData(NK,n);return n});setOpenNote(null)},[]);

                  {sorted.length===0?(
                    <div className="card" style={{padding:"44px 20px",textAlign:"center"}}>
                      <IcoTrendUp size={32} col="var(--t3)"/>
                      <div style={{fontSize:14,fontWeight:700,color:"var(--t2)",margin:"12px 0 6px"}}>No trades yet</div>
                      <div style={{fontSize:12,color:"var(--t3)"}}>Tap + to log your first trade</div>
                    </div>
                  ):(
                    <div className="card" style={{padding:"0 16px"}}>
                      {sorted.slice(0,6).map((t,i)=><TradeRow key={t.id} trade={t} onPress={()=>setTradeModal(t)} isLast={i===Math.min(sorted.length,6)-1}/>)}
                    </div>
                  )}
                </>
              )}
            </div>
          )}

          {tab==="log"&&<div className="tab-content" style={{maxWidth:isDesktop?900:"none"}}><TradeLogView trades={sorted} onPress={t=>setTradeModal(t)} accountName={activeAcc?.name}/></div>}
          {tab==="calendar"&&<div className="tab-content" style={{maxWidth:isDesktop?820:"none",margin:isDesktop?"0 auto":"unset"}}><CalendarView trades={trades}/></div>}

          {tab==="notes"&&(
            <div className="tab-content">
              <div style={{display:"flex",gap:4,marginBottom:12,background:"var(--surface)",borderRadius:"var(--r-md)",padding:4,border:"1px solid var(--line)"}}>
                {[{id:"personal",l:"My Notes"},{id:"trade",l:"Trade Notes"}].map(s=>(
                  <button key={s.id} onClick={()=>setNoteTab(s.id)} className="tap" style={{flex:1,padding:"7px 6px",borderRadius:"var(--r-sm)",border:"none",background:noteTab===s.id?"var(--elevated)":"transparent",color:noteTab===s.id?"var(--t1)":"var(--t3)",fontSize:12,fontWeight:600}}>{s.l}</button>
                ))}
              </div>
              {noteTab==="personal"&&<NotesList notes={notes} onOpen={n=>setOpenNote(n)}/>}
              {noteTab==="trade"&&(
                <div className="card" style={{padding:"0 16px"}}>
                  {[...trades].filter(t=>t.notes?.trim()).sort((a,b)=>b.date.localeCompare(a.date)).map((t,i,arr)=>(
                    <div key={t.id} style={{padding:"13px 0",borderBottom:i<arr.length-1?"1px solid var(--line)":"none"}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                        <div style={{display:"flex",alignItems:"center",gap:7}}>
                          <div style={{width:5,height:5,borderRadius:"50%",background:clr(t.pnl),flexShrink:0}}/>
                          <span className="mono" style={{fontSize:11,color:"var(--t2)"}}>{t.date}</span>
                          <span style={{fontSize:11,color:"var(--t3)"}}>{t.strategy}</span>
                        </div>
                        <span className="mono" style={{fontSize:12,fontWeight:500,color:clr(t.pnl)}}>{fmt(t.pnl)}</span>
                      </div>
                      <div style={{fontSize:12,color:"var(--t2)",lineHeight:1.7}}>{t.notes}</div>
                    </div>
                  ))}
                  {trades.filter(t=>t.notes?.trim()).length===0&&<div style={{padding:"40px 0",textAlign:"center",fontSize:12,color:"var(--t3)"}}>Add notes when logging trades</div>}
                </div>
              )}
            </div>
          )}

          {tab==="risk"&&<div className="tab-content"><RiskManagement accountBalance={accBal} totalPnl={totalPnl}/></div>}

        </div>
        </div>

        {/* ── Bottom Nav — icon only when inactive ── */}
        <div className="bot-nav" style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"var(--surface)",borderTop:"1px solid var(--line)",display:"flex",padding:"8px 0 20px"}}>
          {[{id:"dashboard",l:"Home",I:IcoHome},{id:"log",l:"Log",I:IcoLog},{id:"calendar",l:"Cal",I:IcoCal},{id:"risk",l:"Risk",I:IcoShield},{id:"notes",l:"Notes",I:IcoNote}].map(({id,l,I})=>{
            const a=tab===id;
            return(
              <button key={id} onClick={()=>handleSetTab(id)} className="tap" style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"4px 0"}}>
                <div style={{width:34,height:28,borderRadius:"var(--r-sm)",background:a?"var(--elevated)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"background .12s"}}>
                  <I size={18} col={a?"var(--t1)":"var(--t3)"}/>
                </div>
                {a&&<span style={{fontSize:10,fontWeight:600,color:"var(--t1)",letterSpacing:".02em"}}>{l}</span>}
              </button>
            );
          })}
        </div>

        {/* ── Modals ── */}
        {tradeModal!==null&&<TradeModal trade={tradeModal} onSave={handleSaveTrade} onDelete={handleDelTrade} onClose={()=>setTradeModal(null)}/>}
        {balModal&&<BalanceModal current={accBal} onSave={handleSaveBal} onClose={()=>setBalModal(false)}/>}
        {dataModal&&<DataModal trades={trades} notes={notes} account={activeAcc} onImport={handleImport} onClearAll={handleClear} onClose={()=>setDataModal(false)}/>}
        {ddModal&&<DDModal drawdownLimit={ddLim} consistencyLimit={clLim} totalPnl={totalPnl} onSave={handleSaveDD} onClose={()=>setDdModal(false)}/>}
        {accModal&&<AccModal accounts={accounts} activeId={activeId} onSwitch={handleSwitch} onAdd={handleAddAcc} onEdit={handleEditAcc} onDelete={handleDelAcc} onClose={()=>setAccModal(false)}/>}
      </div>
    </div>
    </ToastProvider>
    </BPCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
