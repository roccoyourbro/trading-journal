const SB_HEADERS = { "Content-Type": "application/json", "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` };

async function sbGet(key) {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/journal_data?key=eq.${key}&select=value`, { headers: SB_HEADERS });
    if (!res.ok) return null;
    const rows = await res.json();
    return rows.length > 0 ? JSON.parse(rows[0].value) : null;
  } catch { return null; }
}
async function sbSet(key, value) {
  try {
    const body = JSON.stringify({ key, value: JSON.stringify(value) });
    await fetch(`${SUPABASE_URL}/rest/v1/journal_data`, {
      method: "POST",
      headers: { ...SB_HEADERS, "Prefer": "resolution=merge-duplicates" },
      body
    });
  } catch {}
  try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
}
async function loadData(key, fallback) {
  try { const cloud = await sbGet(key); if (cloud !== null) return cloud; } catch {}
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
async function saveData(key, data) { await sbSet(key, data); }

  "ICT / SMC","VWAP Fade","Opening Range","Trend Follow",
  "Mean Revert","News Play","Scalp","Breakout","Other",
];
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DAYS   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const DEFAULT_BALANCE = 10000;

const fmt    = (n) => { const a = Math.abs(n).toLocaleString("en-US",{maximumFractionDigits:0}); return (n>=0?"+":"−")+"$"+a; };
const fmtPct = (n) => (n>=0?"+":"")+n.toFixed(1)+"%";
const clr    = (n) => n>0?G.green:n<0?G.red:G.textMuted;
const clrBg  = (n) => n>0?G.greenLight:n<0?G.redLight:"#F5F5F5";
const fmtBal = (n) => "$"+Number(n).toLocaleString("en-US",{maximumFractionDigits:2});

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function fmtNoteDate(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diffDays = Math.floor((now - d) / 86400000);
  if (diffDays === 0) return d.toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" });
  if (diffDays === 1) return "Yesterday";
  if (diffDays < 7)  return DAYS[d.getDay()];
  return `${d.getDate()} ${MONTHS[d.getMonth()]}`;
}
function getCalendarDays(year, month) {
  const first = new Date(year, month, 1).getDay();
  const total = new Date(year, month+1, 0).getDate();
  const cells = [];
  for (let i=0;i<first;i++) cells.push(null);
  for (let d=1;d<=total;d++) cells.push(d);
  return cells;
}

// ─── Trade Modal ──────────────────────────────────────────────────────────────

    if (!form.date || form.pnl==="") return;

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.5)", display:"flex", alignItems:"flex-end", zIndex:200, backdropFilter:"blur(4px)" }} onClick={e=>e.target===e.currentTarget&&onClose()}>

        <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
          <div><label style={lbl}>Date</label><input type="date" value={form.date} onChange={e=>set("date",e.target.value)} style={inp}/></div>
          <div style={{ display:"flex", gap:12 }}>
            <div style={{ flex:1 }}>

            <label style={lbl}>Strategy</label>
            <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
              {STRATEGIES.map(s=>(

// ─── Data Backup Modal ────────────────────────────────────────────────────────
function DataModal({ trades, notes, accountBalance, onImport, onClearAll, onClose }) {
  const fileRef = useRef(null);
  const [status, setStatus] = useState(null);
  const [confirmClear, setConfirmClear] = useState(false);

  const handleExport = () => {
    try {
      const wb = XLSX.utils.book_new();
      const tradeRows = trades.length
        ? trades.map(t => ({ Date: t.date, PnL_USD: t.pnl, RR: t.rr, Strategy: t.strategy, Notes: t.notes||"", _id: t.id }))
        : [{ Date:"", PnL_USD:"", RR:"", Strategy:"", Notes:"", _id:"" }];
      const ws1 = XLSX.utils.json_to_sheet(tradeRows);
      ws1["!cols"] = [{ wch:12 },{ wch:10 },{ wch:6 },{ wch:16 },{ wch:40 },{ wch:16 }];
      XLSX.utils.book_append_sheet(wb, ws1, "Trades");
      const noteRows = notes.length
        ? notes.map(n => ({ Title: n.title, Body: n.body||"", UpdatedAt: n.updatedAt, _id: n.id }))
        : [{ Title:"", Body:"", UpdatedAt:"", _id:"" }];
      const ws2 = XLSX.utils.json_to_sheet(noteRows);
      XLSX.utils.book_append_sheet(wb, ws2, "Notes");
      const ws3 = XLSX.utils.json_to_sheet([{ AccountBalance: accountBalance, ExportedAt: new Date().toISOString() }]);
      XLSX.utils.book_append_sheet(wb, ws3, "Settings");
      XLSX.writeFile(wb, `trading-journal-${todayStr()}.xlsx`);
      setStatus({ ok:true, msg:`✓ Exported ${trades.length} trades, ${notes.length} notes` });
    } catch(e) { setStatus({ ok:false, msg:"Export failed: "+e.message }); }
  };

  const handleFileChange = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setStatus(null);
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const wb = XLSX.read(new Uint8Array(ev.target.result), { type:"array" });
        let importedTrades = null, importedNotes = null, importedBalance = null;
        if (wb.SheetNames.includes("Trades")) {
          const rows = XLSX.utils.sheet_to_json(wb.Sheets["Trades"]);
          importedTrades = rows.filter(r => r.Date).map(r => ({
            id: r._id || Date.now() + Math.random(),
            date: String(r.Date), pnl: parseFloat(r.PnL_USD)||0,
            rr: parseFloat(r.RR)||0, strategy: r.Strategy||"Other", notes: r.Notes||"",
          }));
        }
        if (wb.SheetNames.includes("Notes")) {
          const rows = XLSX.utils.sheet_to_json(wb.Sheets["Notes"]);
          importedNotes = rows.filter(r => r.Title).map(r => ({
            id: r._id || Date.now() + Math.random(),
            title: r.Title||"Untitled", body: r.Body||"", updatedAt: r.UpdatedAt||new Date().toISOString(),
          }));
        }
        if (wb.SheetNames.includes("Settings")) {
          const rows = XLSX.utils.sheet_to_json(wb.Sheets["Settings"]);
          if (rows.length > 0 && rows[0].AccountBalance != null) importedBalance = parseFloat(rows[0].AccountBalance);
        }
        if (!importedTrades && !importedNotes && importedBalance == null) {
          setStatus({ ok:false, msg:"File not recognized." }); return;
        }
        onImport({ trades: importedTrades, notes: importedNotes, balance: importedBalance });
        setStatus({ ok:true, msg:`✓ Imported ${importedTrades?.length||0} trades, ${importedNotes?.length||0} notes` });
      } catch(err) { setStatus({ ok:false, msg:"Failed to read file: "+err.message }); }
    };
    reader.readAsArrayBuffer(file);
    e.target.value = "";
  };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.5)", display:"flex", alignItems:"flex-end", zIndex:200, backdropFilter:"blur(4px)" }} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{ width:"100%", maxWidth:480, margin:"0 auto", background:G.white, borderRadius:"24px 24px 0 0", padding:"20px 20px 48px", maxHeight:"85vh", overflowY:"auto" }}>
        <div style={{ width:40, height:4, background:G.border, borderRadius:2, margin:"0 auto 20px" }} />
        <div style={{ fontSize:18, fontWeight:800, color:G.textPrimary, marginBottom:4 }}>Backup & Sync</div>
        <div style={{ fontSize:13, color:G.textMuted, marginBottom:24 }}>Export to Excel to back up or transfer to another device.</div>
        <div style={{ fontSize:12, color:G.textSecondary, fontWeight:700, letterSpacing:0.5, textTransform:"uppercase", marginBottom:10 }}>Export</div>
        <button onClick={handleExport} style={{ width:"100%", padding:"15px 16px", background:G.green, border:"none", borderRadius:14, color:"#fff", fontSize:14, fontWeight:800, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:10, marginBottom:6, boxShadow:"0 4px 16px rgba(0,170,19,0.25)" }}>

// ─── Calendar View ─────────────────────────────────────────────────────────────
function CalendarView({ trades }) {
  const now = new Date();
  const [year, setYear] = useState(now.getFullYear());
  const [month, setMonth] = useState(now.getMonth());
  const dayMap = {};
  trades.forEach(t => { dayMap[t.date] = (dayMap[t.date]||0) + t.pnl; });
  const cells = getCalendarDays(year, month);
  const prev = () => { if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1); };
  const next = () => { if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1); };
  const monthPnl = Object.entries(dayMap).filter(([k])=>k.startsWith(`${year}-${String(month+1).padStart(2,"0")}`)).reduce((a,[,v])=>a+v,0);
  return (
    <div style={{ background:G.white, borderRadius:20, padding:"16px", boxShadow:G.shadow }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
        <button onClick={prev} style={{ background:G.bg, border:"none", color:G.textSecondary, fontSize:18, cursor:"pointer", padding:"8px 14px", borderRadius:10, fontWeight:800 }}>‹</button>
        <div style={{ textAlign:"center" }}>
          <div style={{ fontSize:16, fontWeight:800, color:G.textPrimary }}>{MONTHS[month]} {year}</div>
          <div style={{ fontSize:13, color:clr(monthPnl), fontWeight:700 }}>{fmt(monthPnl)}</div>
        </div>
        <button onClick={next} style={{ background:G.bg, border:"none", color:G.textSecondary, fontSize:18, cursor:"pointer", padding:"8px 14px", borderRadius:10, fontWeight:800 }}>›</button>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:4, marginBottom:4 }}>
        {DAYS.map(d=><div key={d} style={{ textAlign:"center", fontSize:10, color:G.textMuted, fontWeight:700, padding:"4px 0" }}>{d}</div>)}
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:4 }}>
        {cells.map((day,i)=>{
          if(!day) return <div key={`e${i}`}/>;
          const key=`${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
          const pnl=dayMap[key];
          const isToday=key===todayStr();
          return (
            <div key={key} style={{ borderRadius:10, padding:"6px 2px", textAlign:"center", background:pnl!==undefined?clrBg(pnl):isToday?G.greenLight:"transparent", border:isToday?`2px solid ${G.green}`:"2px solid transparent", minHeight:46 }}>
              <div style={{ fontSize:11, color:G.textSecondary, fontWeight:700 }}>{day}</div>
              {pnl!==undefined&&<div style={{ fontSize:8, color:clr(pnl), fontWeight:800, marginTop:2, lineHeight:1.2 }}>{pnl>0?"+":"−"}${Math.abs(pnl).toLocaleString()}</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Note Editor ──────────────────────────────────────────────────────────────
function NoteEditor({ note, onBack, onSave, onDelete }) {
  const [title, setTitle] = useState(note.title || "");
  const [body,  setBody]  = useState(note.body  || "");
  const saveTimer = useRef(null);
  const isNew = !note.id;
  const noteRef = useRef(note);
  noteRef.current = note;
  const triggerSave = useCallback((t, b) => {
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      onSave({ ...noteRef.current, id: noteRef.current.id||Date.now(), title:t.trim()||"Untitled", body:b, updatedAt:new Date().toISOString() }, false);
    }, 800);
  }, [onSave]);
  const handleTitle = (v) => { setTitle(v); triggerSave(v, body); };
  const handleBody  = (v) => { setBody(v);  triggerSave(title, v); };
  const handleBack = () => {
    if (saveTimer.current) clearTimeout(saveTimer.current);
    if (title.trim()||body.trim()) onSave({ ...noteRef.current, id:noteRef.current.id||Date.now(), title:title.trim()||"Untitled", body, updatedAt:new Date().toISOString() }, true);
    else onBack();
  };
  return (
    <div style={{ position:"fixed", inset:0, background:G.white, zIndex:150, display:"flex", flexDirection:"column", maxWidth:480, margin:"0 auto", left:0, right:0 }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"52px 16px 14px", borderBottom:`1px solid ${G.border}`, background:G.white }}>
        <button onClick={handleBack} style={{ background:"none", border:"none", color:G.green, fontSize:15, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", gap:4 }}>
          <span style={{ fontSize:22 }}>‹</span> Notes
        </button>
        {!isNew && <button onClick={()=>onDelete(note.id)} style={{ background:G.redLight, border:"none", borderRadius:10, color:G.red, fontSize:12, fontWeight:700, padding:"7px 14px", cursor:"pointer" }}>Delete</button>}
      </div>
      <div style={{ flex:1, overflowY:"auto", padding:"20px 20px 40px" }}>
        <textarea value={title} onChange={e=>handleTitle(e.target.value)} placeholder="Title" rows={1} style={{ width:"100%", background:"none", border:"none", outline:"none", color:G.textPrimary, fontSize:22, fontWeight:800, fontFamily:"'Plus Jakarta Sans',sans-serif", resize:"none", lineHeight:1.3, marginBottom:10, boxSizing:"border-box", overflow:"hidden" }}/>
        <div style={{ fontSize:12, color:G.textMuted, marginBottom:18 }}>{new Date().toLocaleDateString("en-US",{ weekday:"long",year:"numeric",month:"long",day:"numeric" })}</div>
        <textarea value={body} onChange={e=>handleBody(e.target.value)} placeholder="Start writing..." style={{ width:"100%", background:"none", border:"none", outline:"none", color:G.textSecondary, fontSize:16, fontFamily:"'Plus Jakarta Sans',sans-serif", resize:"none", lineHeight:1.8, boxSizing:"border-box", minHeight:"62vh" }}/>
      </div>
    </div>
  );
}

// ─── Drawdown Line Chart ──────────────────────────────────────────────────────
function DrawdownChart({ trades, accountBalance, drawdownLimit, totalPnl, consistencyLimit }) {
  const sorted = [...trades].sort((a,b)=>a.date.localeCompare(b.date));
  let peak = accountBalance;
  let bal  = accountBalance;
  const points = [{ bal, dd:0, ddPct:0 }];
  sorted.forEach(t => {
    bal += t.pnl;
    if (bal > peak) peak = bal;
    const dd    = peak - bal;
    const ddPct = peak > 0 ? (dd / peak) * 100 : 0;
    points.push({ bal, dd, ddPct });
  });

  const currentBal    = accountBalance + trades.reduce((a,t)=>a+t.pnl,0);
  const currentPeak   = Math.max(accountBalance, ...points.map(p=>p.bal));
  const currentDD     = currentPeak - currentBal;
  const currentDDPct  = currentPeak > 0 ? (currentDD / currentPeak) * 100 : 0;
  const ddLimit       = drawdownLimit || 0;
  const ddUsedPct     = ddLimit > 0 ? Math.min((currentDD / ddLimit) * 100, 100) : 0;
  const safe = ddUsedPct < 70, warn = ddUsedPct >= 70 && ddUsedPct < 90;

  // Consistency rule — manual limit input
  const today   = todayStr();
  const todayPnl = trades.filter(t=>t.date===today).reduce((a,t)=>a+t.pnl,0);
  const autoLimit = totalPnl > 0 ? totalPnl * 0.5 : 0;   // 50% of total PnL as reference
  const activeLimit = consistencyLimit > 0 ? consistencyLimit : autoLimit;
  const consistencyExceeded = activeLimit > 0 && todayPnl > activeLimit;
  const consistencyUsedPct  = activeLimit > 0 ? Math.min((todayPnl / activeLimit) * 100, 120) : 0;

  // SVG line chart
  const chartPts = points.slice(-20);
  const W = 320, H = 80;
  const maxDDPct = Math.max(...chartPts.map(p=>p.ddPct), ddLimit>0?(ddLimit/currentPeak)*100:1, 0.5);
  const toX = i => (i / (chartPts.length - 1 || 1)) * W;
  const toY = v => H - (v / maxDDPct) * H;
  const pathD = chartPts.map((p,i)=>`${i===0?"M":"L"}${toX(i).toFixed(1)},${toY(p.ddPct).toFixed(1)}`).join(" ");
  const areaD = pathD + ` L${W},${H} L0,${H} Z`;
  const limitY = ddLimit > 0 && currentPeak > 0 ? toY((ddLimit / currentPeak) * 100) : null;

  return (
    <div style={{ background:G.white, borderRadius:20, padding:"16px", marginBottom:16, boxShadow:G.shadow }}>
      <div style={{ fontSize:12, color:G.textMuted, fontWeight:700, letterSpacing:0.5, textTransform:"uppercase", marginBottom:14 }}>Drawdown Tracker</div>

      {/* Current DD vs Limit */}
      <div style={{ display:"flex", gap:10, marginBottom:14 }}>
        <div style={{ flex:1, background:G.bg, borderRadius:14, padding:"12px" }}>
          <div style={{ fontSize:10, color:G.textMuted, fontWeight:700, textTransform:"uppercase", letterSpacing:0.3, marginBottom:4 }}>Current Drawdown</div>
          <div style={{ fontSize:20, fontWeight:900, color:currentDD>0?G.red:G.green, letterSpacing:-0.5 }}>{currentDDPct.toFixed(1)}%</div>
          <div style={{ fontSize:11, color:G.textMuted }}>${currentDD.toLocaleString("en-US",{maximumFractionDigits:0})}</div>
        </div>
        <div style={{ flex:1, background:G.bg, borderRadius:14, padding:"12px" }}>
          <div style={{ fontSize:10, color:G.textMuted, fontWeight:700, textTransform:"uppercase", letterSpacing:0.3, marginBottom:4 }}>DD Limit</div>
          <div style={{ fontSize:20, fontWeight:900, color:G.textPrimary, letterSpacing:-0.5 }}>{ddLimit>0?`$${ddLimit.toLocaleString()}`:"—"}</div>
          <div style={{ fontSize:11, color:G.textMuted }}>{ddLimit>0?`Remaining $${Math.max(0,ddLimit-currentDD).toLocaleString()}`:"Not set"}</div>
        </div>
      </div>

      {/* DD progress bar */}
      {ddLimit > 0 && (
        <div style={{ marginBottom:14 }}>
          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5 }}>
            <span style={{ fontSize:11, color:G.textMuted, fontWeight:600 }}>DD Used</span>
            <span style={{ fontSize:11, fontWeight:800, color:safe?G.green:warn?G.yellow:G.red }}>{ddUsedPct.toFixed(1)}%</span>
          </div>
          <div style={{ height:6, background:G.bg, borderRadius:3, overflow:"hidden" }}>
            <div style={{ height:"100%", width:`${ddUsedPct}%`, background:safe?G.green:warn?G.yellow:G.red, borderRadius:3, transition:"width 0.5s" }}/>
          </div>
          <div style={{ display:"flex", justifyContent:"space-between", marginTop:3 }}>
            <span style={{ fontSize:10, color:G.textMuted }}>$0</span>
            <span style={{ fontSize:10, color:G.textMuted }}>${ddLimit.toLocaleString()}</span>
          </div>
        </div>
      )}

      {/* SVG line chart */}
      {points.length > 1 && (
        <div style={{ marginBottom:14 }}>
          <div style={{ fontSize:11, color:G.textMuted, fontWeight:600, marginBottom:8 }}>Drawdown History</div>
          <svg viewBox={`0 0 ${W} ${H + 4}`} width="100%" style={{ overflow:"visible", display:"block" }}>
            <defs>
              <linearGradient id="ddAreaGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={G.red} stopOpacity="0.12"/>
                <stop offset="100%" stopColor={G.red} stopOpacity="0.01"/>
              </linearGradient>
            </defs>
            <path d={areaD} fill="url(#ddAreaGrad)"/>
            {limitY !== null && (
              <line x1="0" y1={limitY} x2={W} y2={limitY} stroke={G.red} strokeWidth="1.5" strokeDasharray="4,3" opacity="0.55"/>
            )}
            <path d={pathD} fill="none" stroke={G.red} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            {chartPts.length > 0 && (
              <circle cx={toX(chartPts.length-1)} cy={toY(chartPts[chartPts.length-1].ddPct)} r="3.5" fill={G.red} stroke={G.white} strokeWidth="2"/>
            )}
          </svg>
          <div style={{ display:"flex", justifyContent:"space-between", marginTop:2 }}>
            <span style={{ fontSize:9, color:G.textMuted, fontWeight:600 }}>Earlier</span>
            <span style={{ fontSize:9, color:G.textMuted, fontWeight:600 }}>Latest</span>
          </div>
        </div>
      )}

      {/* Consistency Rule */}
      <div style={{ marginTop:14, paddingTop:14, borderTop:`1px solid ${G.border}` }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
          <div style={{ fontSize:11, fontWeight:700, color:G.textSecondary, textTransform:"uppercase", letterSpacing:0.3 }}>Consistency Rule</div>
          {consistencyExceeded && (
            <div style={{ display:"flex", alignItems:"center", gap:4, background:G.redLight, borderRadius:6, padding:"2px 8px" }}>
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke={G.red} strokeWidth="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
              <span style={{ fontSize:10, color:G.red, fontWeight:800 }}>LIMIT EXCEEDED</span>
            </div>
          )}
        </div>
        <div style={{ fontSize:12, color:G.textMuted, marginBottom:6 }}>
          Max daily profit:{" "}
          <span style={{ color:G.textPrimary, fontWeight:700 }}>
            {activeLimit > 0 ? `$${activeLimit.toFixed(0)}` : "—"}
          </span>
          {consistencyLimit <= 0 && autoLimit > 0 && (
            <span style={{ color:G.textMuted, fontSize:11 }}> (auto: 50% of total P&L)</span>
          )}
        </div>
        {activeLimit > 0 && (
          <>
            <div style={{ height:6, background:G.bg, borderRadius:3, overflow:"hidden", marginBottom:5 }}>
              <div style={{ height:"100%", width:`${Math.min(consistencyUsedPct,100)}%`, background:consistencyExceeded?G.red:consistencyUsedPct>=70?G.yellow:G.green, borderRadius:3, transition:"width 0.4s" }}/>
            </div>
            <div style={{ fontSize:11, color:G.textMuted }}>
              Today's P&L:{" "}
              <span style={{ fontWeight:700, color:clr(todayPnl) }}>{fmt(todayPnl)}</span>
              {consistencyExceeded && <span style={{ color:G.red, fontWeight:700, marginLeft:8 }}>— Stop trading for today</span>}
            </div>
          </>
        )}
        {activeLimit === 0 && (
          <div style={{ fontSize:12, color:G.textMuted }}>Set a limit or log profitable trades to activate.</div>
        )}
      </div>
    </div>
  );
}

            <div style={{ fontSize:11, color:G.textMuted, marginTop:4 }}>
              {suggestedLimit
                ? `50% of total P&L = $${suggestedLimit}. Leave blank to use auto.`
                : "Leave blank to auto-calculate as 50% of total P&L."}
            </div>
          </div>
        </div>
        <button
          onClick={()=>onSave(parseFloat(dd)||0, parseFloat(cl)||0)}
          style={{ width:"100%", marginTop:24, padding:"17px", background:G.green, border:"none", borderRadius:16, color:"#fff", fontSize:16, fontWeight:800, cursor:"pointer", boxShadow:"0 4px 16px rgba(0,170,19,0.35)" }}
        >
          Save Settings
        </button>
      </div>
    </div>
  );
}

// ─── Risk Management ──────────────────────────────────────────────────────────
function RiskManagement({ accountBalance, totalPnl }) {
  const currentBalance = accountBalance + totalPnl;
  const [useManual, setUseManual] = useState(false);
  const [manualBal, setManualBal] = useState("");
  const [riskPct,   setRiskPct]   = useState("0.5");
  const [result,    setResult]    = useState(null);
  const activeBalance = useManual ? (parseFloat(manualBal)||0) : currentBalance;
  const handleCalc = () => {
    const bal = activeBalance, pct = parseFloat(riskPct)/100;
    if (bal>0 && pct>0) setResult({ balance:bal, pct:parseFloat(riskPct), maxLoss:bal*pct });
  };
  const inp = { width:"100%", background:G.bg, border:`1.5px solid ${G.border}`, borderRadius:12, color:G.textPrimary, fontSize:15, padding:"13px 14px", outline:"none", boxSizing:"border-box", fontFamily:"'Plus Jakarta Sans',sans-serif", fontWeight:600 };
  return (
    <div>
      <div style={{ background:`linear-gradient(135deg, ${G.green}, ${G.greenDark})`, borderRadius:20, padding:"20px", marginBottom:16, position:"relative", overflow:"hidden" }}>
        <div style={{ position:"absolute", top:-20, right:-20, width:100, height:100, borderRadius:"50%", background:"rgba(255,255,255,0.1)", pointerEvents:"none" }}/>
        <div style={{ fontSize:12, color:"rgba(255,255,255,0.75)", fontWeight:600, letterSpacing:0.5, textTransform:"uppercase", marginBottom:6 }}>Current Account Value</div>
        <div style={{ fontSize:34, fontWeight:900, color:"#fff", letterSpacing:-1 }}>{fmtBal(currentBalance)}</div>
        <div style={{ display:"flex", gap:16, marginTop:8 }}>
          <div><span style={{ fontSize:11, color:"rgba(255,255,255,0.6)" }}>Base </span><span style={{ fontSize:13, fontWeight:700, color:"#fff" }}>{fmtBal(accountBalance)}</span></div>
          <div><span style={{ fontSize:11, color:"rgba(255,255,255,0.6)" }}>P&L </span><span style={{ fontSize:13, fontWeight:700, color:"#fff" }}>{fmt(totalPnl)}</span></div>
        </div>
      </div>
      <div style={{ background:G.white, borderRadius:16, padding:"16px", marginBottom:12, boxShadow:G.shadow }}>
        <div style={{ fontSize:12, color:G.textSecondary, fontWeight:700, letterSpacing:0.5, textTransform:"uppercase", marginBottom:12 }}>Balance Source</div>
        <div style={{ display:"flex", gap:8, marginBottom: useManual?12:0 }}>
          {[["Dashboard", false],["Manual", true]].map(([label, val])=>(
            <button key={label} onClick={()=>{ setUseManual(val); setResult(null); }} style={{ flex:1, padding:"11px", borderRadius:12, fontSize:12, fontWeight:700, border:"none", background:useManual===val?G.green:G.bg, color:useManual===val?"#fff":G.textSecondary, cursor:"pointer" }}>{label}</button>
          ))}
        </div>
        {useManual ? (
          <input type="number" placeholder="Enter balance, e.g. 50000" value={manualBal} onChange={e=>{ setManualBal(e.target.value); setResult(null); }} style={inp}/>
        ) : (
          <div style={{ fontSize:13, color:G.textMuted }}>Using: <span style={{ color:G.green, fontWeight:800 }}>{fmtBal(currentBalance)}</span></div>
        )}
      </div>
      <div style={{ background:G.white, borderRadius:16, padding:"16px", marginBottom:16, boxShadow:G.shadow }}>
        <div style={{ fontSize:12, color:G.textSecondary, fontWeight:700, letterSpacing:0.5, textTransform:"uppercase", marginBottom:12 }}>Risk Per Trade (%)</div>
        <div style={{ display:"flex", gap:8 }}>
          {["0.5","1","2"].map(p=>(
            <button key={p} onClick={()=>{ setRiskPct(p); setResult(null); }} style={{ flex:1, padding:"11px", borderRadius:12, fontSize:14, fontWeight:800, border:"none", background:riskPct===p?G.yellow:G.bg, color:riskPct===p?"#fff":G.textSecondary, cursor:"pointer" }}>{p}%</button>
          ))}
          <input type="number" step="0.1" value={["0.5","1","2"].includes(riskPct)?"":riskPct} onChange={e=>{ setRiskPct(e.target.value); setResult(null); }} placeholder="%" style={{ ...inp, flex:1, padding:"11px", textAlign:"center", fontSize:13 }}/>
        </div>
      </div>
      <button onClick={handleCalc} style={{ width:"100%", padding:"17px", background:G.green, border:"none", borderRadius:16, color:"#fff", fontSize:16, fontWeight:800, cursor:"pointer", marginBottom:16, boxShadow:"0 4px 16px rgba(0,170,19,0.35)" }}>
        Calculate Max Risk →
      </button>
      {result && (
        <div style={{ background:`linear-gradient(135deg, ${G.yellowLight}, #FFF8E8)`, border:`1.5px solid ${G.yellow}55`, borderRadius:20, padding:"22px 20px", textAlign:"center", marginBottom:16 }}>
          <div style={{ fontSize:11, color:G.textMuted, fontWeight:700, letterSpacing:0.5, textTransform:"uppercase", marginBottom:8 }}>Max Risk — Next Trade</div>
          <div style={{ fontSize:42, fontWeight:900, color:G.yellow, letterSpacing:-1.5, marginBottom:8 }}>${result.maxLoss.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
          <div style={{ fontSize:13, color:G.textSecondary }}>{fmtBal(result.balance)} × {result.pct}%</div>
          <div style={{ marginTop:14, padding:"10px 14px", background:"rgba(255,255,255,0.7)", borderRadius:12, fontSize:12, color:G.textSecondary }}>
            If max loss hit → remaining <span style={{ color:G.red, fontWeight:800 }}>{fmtBal(result.balance - result.maxLoss)}</span>
          </div>
        </div>
      )}
      <div style={{ padding:"14px 16px", background:G.greenLight, borderRadius:14, border:`1px solid ${G.green}33` }}>
        <div style={{ fontSize:12, color:G.greenDark, lineHeight:1.7, fontWeight:600 }}>📌 <strong>Prop firm standard:</strong> 0.5% – 1% per trade. Keep risk consistent to protect your drawdown limit.</div>
      </div>
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function TradingJournal() {
  const [trades,           setTrades]           = useState([]);
  const [notes,            setNotes]            = useState([]);
  const [accountBalance,   setAccountBalance]   = useState(DEFAULT_BALANCE);
  const [drawdownLimit,    setDrawdownLimit]    = useState(0);
  const [consistencyLimit, setConsistencyLimit] = useState(0); // manual $ limit
  const [tab,              setTab]              = useState("dashboard");
  const [noteSubTab,       setNoteSubTab]       = useState("personal");
  const [tradeModal,       setTradeModal]       = useState(null);
  const [openNote,         setOpenNote]         = useState(null);
  const [balanceModal,     setBalanceModal]     = useState(false);
  const [dataModal,        setDataModal]        = useState(false);
  const [ddModal,          setDdModal]          = useState(false);
  const [loading,          setLoading]          = useState(true);
  const [syncStatus,       setSyncStatus]       = useState("syncing");

  useEffect(() => {
    fetch(`${SUPABASE_URL}/rest/v1/journal_data?limit=1`, { headers: SB_HEADERS })
      .then(r => { if(r.ok) setSyncStatus("ok"); else setSyncStatus("offline"); })
      .catch(() => setSyncStatus("offline"));

    Promise.all([
      loadData(TRADES_KEY,       []),
      loadData(NOTES_KEY,        []),
      loadData(BALANCE_KEY,      DEFAULT_BALANCE),
      loadData(DRAWDOWN_KEY,     0),
      loadData(CONSISTENCY_KEY,  0),
    ]).then(([t,n,b,dd,cl]) => {
      setTrades(t); setNotes(n);
      setAccountBalance(typeof b==="number" ? b : DEFAULT_BALANCE);
      setDrawdownLimit(dd||0);
      setConsistencyLimit(cl||0);
      setLoading(false);
    });
  }, []);

  const handleSaveBalance  = useCallback((val) => { setAccountBalance(val); saveData(BALANCE_KEY,val); setBalanceModal(false); }, []);
  const handleSaveTrade    = useCallback((trade) => {
    setTrades(prev=>{ const idx=prev.findIndex(t=>t.id===trade.id); const next=idx>=0?prev.map(t=>t.id===trade.id?trade:t):[trade,...prev]; saveData(TRADES_KEY,next); return next; });
    setTradeModal(null);
  }, []);
  const handleDeleteTrade  = useCallback((id) => {
    setTrades(prev=>{ const next=prev.filter(t=>t.id!==id); saveData(TRADES_KEY,next); return next; });
    setTradeModal(null);
  }, []);
  const handleSaveNote     = useCallback((note, doBack) => {
    setNotes(prev=>{ const idx=prev.findIndex(n=>n.id===note.id); const next=idx>=0?prev.map(n=>n.id===note.id?note:n):[note,...prev]; saveData(NOTES_KEY,next); return next; });
    if (doBack) setOpenNote(null);
    else setOpenNote(prev=>(prev&&prev.id===note.id)?note:{...note});
  }, []);
  const handleDeleteNote   = useCallback((id) => {
    setNotes(prev=>{ const next=prev.filter(n=>n.id!==id); saveData(NOTES_KEY,next); return next; });
    setOpenNote(null);
  }, []);
  const handleImport       = useCallback(({ trades:t, notes:n, balance:b }) => {
    if (t != null) { setTrades(t); saveData(TRADES_KEY, t); }
    if (n != null) { setNotes(n);  saveData(NOTES_KEY,  n); }
    if (b != null) { setAccountBalance(b); saveData(BALANCE_KEY, b); }
  }, []);
  const handleClearAll     = useCallback(() => {
    setTrades([]); setNotes([]); setAccountBalance(DEFAULT_BALANCE);
    saveData(TRADES_KEY,[]); saveData(NOTES_KEY,[]); saveData(BALANCE_KEY,DEFAULT_BALANCE);
  }, []);
  const handleSaveDrawdown = useCallback((dd, cl) => {
    setDrawdownLimit(dd); setConsistencyLimit(cl);
    saveData(DRAWDOWN_KEY, dd); saveData(CONSISTENCY_KEY, cl);
    setDdModal(false);
  }, []);

  const wins     = trades.filter(t=>t.pnl>0);
  const losses   = trades.filter(t=>t.pnl<0);
  const totalPnl = trades.reduce((a,t)=>a+t.pnl,0);
  const winRate  = trades.length?Math.round((wins.length/trades.length)*100):0;
  const avgRR    = trades.length?(trades.reduce((a,t)=>a+t.rr,0)/trades.length).toFixed(1):"—";
  const gainsPct = accountBalance>0?((totalPnl/accountBalance)*100).toFixed(1):"0.0";
  const avgWin   = wins.length?wins.reduce((a,t)=>a+t.pnl,0)/wins.length:0;
  const avgLoss  = losses.length?losses.reduce((a,t)=>a+t.pnl,0)/losses.length:0;
  const sorted   = [...trades].sort((a,b)=>b.date.localeCompare(a.date));
  const currentBal = accountBalance + totalPnl;

  const plusAction = tab==="notes" ? ()=>setOpenNote({title:"",body:"",updatedAt:new Date().toISOString()})
    : tab==="risk" ? null : ()=>setTradeModal({});

  if (loading) return (
    <div style={{ background:G.bg, minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:12 }}>
      <AppIcon size={48}/>
      <div style={{ color:G.textMuted, fontSize:14, fontWeight:600 }}>Loading journal...</div>
      <div style={{ color:G.green, fontSize:12, fontWeight:600 }}>☁ Syncing with cloud...</div>
    </div>
  );

  return (
    <div style={{ background:G.bg, minHeight:"100vh", maxWidth:480, margin:"0 auto", fontFamily:"'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif", color:G.textPrimary, paddingBottom:100 }}>

      {openNote !== null && (
        <NoteEditor note={openNote} onBack={()=>setOpenNote(null)} onSave={handleSaveNote} onDelete={handleDeleteNote}/>
      )}

      <AppHeader tab={tab} onBackup={()=>setDataModal(true)} syncStatus={syncStatus}/>

      {/* FAB */}
      {plusAction && (
        <div style={{ position:"fixed", bottom:86, right:"max(16px, calc(50% - 224px))", zIndex:100 }}>
          <button onClick={plusAction} className="ripple" style={{ width:56, height:56, borderRadius:16, background:G.green, border:"none", color:"#fff", fontSize:26, cursor:"pointer", boxShadow:"0 6px 24px rgba(0,170,19,0.4)", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:700 }}>+</button>
        </div>
      )}

      <div style={{ padding:"16px 16px 0" }}>

        {/* ── Dashboard ── */}
        {tab==="dashboard" && (
          <>
            {/* PnL Hero Card */}
            <div style={{ background:G.white, borderRadius:20, padding:"20px", marginBottom:14, boxShadow:G.shadow }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:16 }}>
                <div>
                  <div style={{ fontSize:12, color:G.textMuted, fontWeight:600, letterSpacing:0.5, textTransform:"uppercase", marginBottom:6 }}>Account Balance</div>
                  {/* Primary: account balance */}
                  <div style={{ fontSize:36, fontWeight:900, color:clr(totalPnl), letterSpacing:-1.5 }}>{fmtBal(currentBal)}</div>
                  {/* Secondary: P&L info */}
                  <div style={{ display:"flex", gap:10, marginTop:6, alignItems:"center" }}>
                    <span style={{ fontSize:12, color:G.textMuted, fontWeight:600 }}>P&amp;L <span style={{ color:clr(totalPnl), fontWeight:700 }}>{fmtPct(parseFloat(gainsPct))}</span></span>
                    <span style={{ fontSize:12, color:clr(totalPnl), fontWeight:700 }}>{fmt(totalPnl)}</span>
                    <span style={{ fontSize:11, color:G.textMuted }}>·</span>
                    <span style={{ fontSize:12, color:G.textMuted, fontWeight:600 }}>Trades <span style={{ color:G.textSecondary, fontWeight:700 }}>{trades.length}</span></span>
                  </div>
                </div>
                <div style={{ width:46, height:46, background:clrBg(totalPnl), borderRadius:13, display:"flex", alignItems:"center", justifyContent:"center" }}>
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={totalPnl>=0?G.green:G.red} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                    {totalPnl>=0 ? <><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></> : <><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></>}
                  </svg>
                </div>
              </div>
              {/* Quick actions */}
              <div style={{ display:"flex", gap:8 }}>
                <button onClick={()=>setBalanceModal(true)} style={{ flex:1, padding:"11px 8px", background:G.greenLight, border:"none", borderRadius:12, cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={G.green} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                  <span style={{ fontSize:11, color:G.green, fontWeight:700 }}>Balance</span>
                </button>
                <button onClick={()=>setTradeModal({})} style={{ flex:1, padding:"11px 8px", background:G.greenLight, border:"none", borderRadius:12, cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={G.green} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>

                </button>
                <button onClick={()=>setDdModal(true)} style={{ flex:1, padding:"11px 8px", background:G.redLight, border:"none", borderRadius:12, cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={G.red} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>

                </button>
                <button onClick={()=>setTab("risk")} style={{ flex:1, padding:"11px 8px", background:G.yellowLight, border:"none", borderRadius:12, cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={G.yellow} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>

            <div style={{ display:"flex", gap:10, marginBottom:10 }}>

        {[

          },
          { id:"calendar", label:"Calendar",
            icon: (a) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={a?"#1A1A1A":G.textMuted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          },
          { id:"risk", label:"Risk",
            icon: (a) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={a?"#1A1A1A":G.textMuted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          },
          { id:"notes", label:"Notes",
            icon: (a) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={a?"#1A1A1A":G.textMuted} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          },
        ].map(({ id, label, icon }) => {
          const active = tab === id;
          return (
            <button key={id} onClick={()=>setTab(id)} className="ripple" style={{ flex:1, background:"none", border:"none", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:3, padding:"4px 0" }}>
              <div style={{ width:36, height:36, borderRadius:10, background:active?"#F0F0F0":"transparent", display:"flex", alignItems:"center", justifyContent:"center", transition:"background 0.15s" }}>
                {icon(active)}
              </div>
              <span style={{ fontSize:10, fontWeight:700, color:active?"#1A1A1A":G.textMuted, transition:"color 0.15s" }}>{label}</span>
            </button>
          );
        })}
      </div>

      {/* Modals */}
      {tradeModal !== null && <TradeModal trade={tradeModal} onSave={handleSaveTrade} onDelete={handleDeleteTrade} onClose={()=>setTradeModal(null)}/>}
      {balanceModal && <BalanceModal currentBalance={accountBalance} onSave={handleSaveBalance} onClose={()=>setBalanceModal(false)}/>}
      {dataModal && <DataModal trades={trades} notes={notes} accountBalance={accountBalance} onImport={handleImport} onClearAll={handleClearAll} onClose={()=>setDataModal(false)}/>}
      {ddModal && <DrawdownModal drawdownLimit={drawdownLimit} consistencyLimit={consistencyLimit} totalPnl={totalPnl} onSave={handleSaveDrawdown} onClose={()=>setDdModal(false)}/>}

    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<TradingJournal />);
</script>
</body>
</html>
