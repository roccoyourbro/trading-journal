<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#0D0D0D"/>
  <title>Trading Journal</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    /* ── Design System: Tradezella-inspired ── */
    :root {
      --page:     #0F1117;
      --surface:  #161B27;
      --elevated: #1E2535;
      --overlay:  #252D3F;
      --line:     rgba(255,255,255,0.06);
      --line-md:  rgba(255,255,255,0.11);
      --t1: #EFF1F5;
      --t2: #8B95A9;
      --t3: #3E4758;
      --green:      #22C55E;
      --green-dim:  rgba(34,197,94,0.12);
      --red:        #EF4444;
      --red-dim:    rgba(239,68,68,0.11);
      --amber:      #F59E0B;
      --amber-dim:  rgba(245,158,11,0.11);
      --blue:       #3B82F6;
      --blue-dim:   rgba(59,130,246,0.12);
      --accent:     #6366F1;
      --accent-dim: rgba(99,102,241,0.14);
      --mono: 'DM Mono', monospace;
      --sans: 'Plus Jakarta Sans', sans-serif;
      --r-sm: 6px; --r-md: 10px; --r-lg: 14px; --r-xl: 20px;
      --sidebar-w: 240px;
    }
    [data-theme="light"] {
      --page:     #F3F4F8;
      --surface:  #FFFFFF;
      --elevated: #F0F1F5;
      --overlay:  #E5E7EE;
      --line:     rgba(0,0,0,0.06);
      --line-md:  rgba(0,0,0,0.11);
      --t1: #0F1117;
      --t2: #5A6478;
      --t3: #B8BDC8;
      --green:      #16A34A;
      --green-dim:  rgba(22,163,74,0.09);
      --red:        #DC2626;
      --red-dim:    rgba(220,38,38,0.08);
      --amber:      #D97706;
      --amber-dim:  rgba(217,119,6,0.09);
      --blue:       #2563EB;
      --blue-dim:   rgba(37,99,235,0.09);
      --accent:     #4F46E5;
      --accent-dim: rgba(79,70,229,0.10);
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{background:var(--page);min-height:100%;-webkit-font-smoothing:antialiased;font-family:var(--sans);color:var(--t1)}
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
    input[type=date]::-webkit-calendar-picker-indicator{opacity:.4;filter:invert(1)}
    [data-theme="light"] input[type=date]::-webkit-calendar-picker-indicator{filter:none;opacity:.5}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--overlay);border-radius:99px}
    button{touch-action:manipulation;-webkit-tap-highlight-color:transparent;font-family:var(--sans);cursor:pointer}
    input,textarea{font-family:var(--sans)}

    @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    @keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
    @keyframes toastIn{from{opacity:0;transform:translateY(8px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    .tab-content{animation:fadeUp .15s ease forwards}
    .skeleton{background:linear-gradient(90deg,var(--elevated) 25%,var(--overlay) 50%,var(--elevated) 75%);background-size:600px 100%;animation:shimmer 1.3s infinite;border-radius:var(--r-md)}
    .toast-in{animation:toastIn .18s ease forwards}
    .tap{transition:opacity .1s,transform .1s;cursor:pointer}
    .tap:active{opacity:.65;transform:scale(.97)}
    .mono{font-family:var(--mono)}
    .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg)}
    .elev{background:var(--elevated);border:1px solid var(--line);border-radius:var(--r-md)}
    .pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
    .inp{width:100%;background:var(--elevated);border:1px solid var(--line-md);border-radius:var(--r-md);color:var(--t1);font-size:15px;padding:11px 13px;outline:none;transition:border-color .15s;font-family:var(--sans);font-weight:500}
    .inp:focus{border-color:var(--accent)}
    .inp::placeholder{color:var(--t3)}
    .sec{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.09em;text-transform:uppercase;margin-bottom:10px}
    .divider{height:1px;background:var(--line)}

    /* Sidebar nav item hover */
    .nav-item{transition:background .12s,color .12s}
    .nav-item:hover{background:var(--overlay)!important}

    /* Topbar btn */
    .topbar-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--r-sm);border:1px solid var(--line-md);background:var(--elevated);color:var(--t2);font-size:12px;font-weight:600;cursor:pointer;transition:all .12s;white-space:nowrap}
    .topbar-btn:hover{border-color:var(--line-md);color:var(--t1);background:var(--overlay)}

    /* Stat card accent bar */
    .stat-card-inner{position:relative;overflow:hidden}
    .stat-card-inner::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;border-radius:2px 2px 0 0}
    .stat-card-green::before{background:var(--green)}
    .stat-card-red::before{background:var(--red)}
    .stat-card-amber::before{background:var(--amber)}
    .stat-card-blue::before{background:var(--blue)}
    .stat-card-accent::before{background:var(--accent)}

    /* tablet only */
    @media(min-width:768px) and (max-width:1023px){
      .shell{max-width:640px!important;margin:0 auto!important}
      .bot-nav{max-width:640px!important;left:50%!important;transform:translateX(-50%)!important}
    }
    /* desktop */
    @media(min-width:1024px){
      .bot-nav{display:none!important}
      .sidebar{display:flex!important;width:var(--sidebar-w)}
      .shell{margin-left:var(--sidebar-w)!important;margin-right:0!important;max-width:none!important;width:calc(100vw - var(--sidebar-w))!important}
      .desk-pad{padding:16px 16px 0!important}
      .desk-grid{display:grid!important;grid-template-columns:1fr 280px;gap:14px;align-items:start;width:100%}
      .desk-col-left{min-width:0;overflow:hidden}
      .desk-col-right{position:sticky;top:0;min-width:0}
      .fab-w{right:32px!important;bottom:32px!important}
    }
    @media(min-width:1280px){
      .desk-grid{grid-template-columns:1fr 300px!important}
    }
    @media(min-width:1440px){
      .desk-grid{grid-template-columns:1fr 320px!important}
    }
    @media print{
      .bot-nav,.sidebar,.fab-w,.np{display:none!important}
      body{background:#fff!important}
      .shell{margin:0!important;max-width:100%!important;width:100%!important}
    }
  </style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef,useMemo,createContext,useContext}=React;
const PnlCtx=createContext(false);
const BPCtx=createContext({isDesktop:false});
const useBP=()=>useContext(BPCtx);
const ToastCtx=createContext(null);
const useToast=()=>useContext(ToastCtx);

function useWidth(){
  const[w,setW]=useState(window.innerWidth);
  useEffect(()=>{
    let t;
    const h=()=>{clearTimeout(t);t=setTimeout(()=>setW(window.innerWidth),150)};
    window.addEventListener("resize",h,{passive:true});
    return()=>{window.removeEventListener("resize",h);clearTimeout(t)};
  },[]);
  return w;
}

/* ── Supabase / Storage ── */
const SB_URL="https://ravlncpwpxdzwagojblh.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJhdmxuY3B3cHhkendhZ29qYmxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MTU3MDIsImV4cCI6MjA5MzM5MTcwMn0.n68uMBfS8iSC3ViYzkMKvZFKJrGfafyGtiIL8v82h2w";
const SBH={"Content-Type":"application/json","apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}`};
const AK="nq-journal-accounts",AAK="nq-journal-active-account",TPK="nq-journal-trades-",NK="nq-journal-notes";
const _st={};
function saveData(key,data){
  try{localStorage.setItem(key,JSON.stringify(data))}catch{}
  clearTimeout(_st[key]);
  _st[key]=setTimeout(async()=>{
    try{await fetch(`${SB_URL}/rest/v1/journal_data`,{method:"POST",headers:{...SBH,"Prefer":"resolution=merge-duplicates"},body:JSON.stringify({key,value:JSON.stringify(data)})})}catch{}
  },700);
}
async function loadData(key,fb){
  try{const r=await fetch(`${SB_URL}/rest/v1/journal_data?key=eq.${encodeURIComponent(key)}&select=value`,{headers:SBH});if(r.ok){const d=await r.json();if(d.length)return JSON.parse(d[0].value)}}catch{}
  try{const v=localStorage.getItem(key);return v?JSON.parse(v):fb}catch{return fb}
}

/* ── Constants ── */
const STRATS=["ICT / SMC","VWAP Fade","Opening Range","Trend Follow","Mean Revert","News Play","Scalp","Breakout","Other"];
const TAGS=["A+ Setup","B Setup","C Setup","FOMO","Revenge","Overtraded","Early Exit","Late Entry","Patient","Tilted","News Driven","Breakeven"];
const SESSIONS=["NY","London","Asia","Other"];
const SCOL={NY:"#4D9FFF",London:"#A78BFA",Asia:"#FB923C",Other:"#666"};
const INSTRS=["MNQ","NQ","ES","MES","XAUUSD","Other"];
const ICOL={MNQ:"#22D3EE",NQ:"#4D9FFF",ES:"#A78BFA",MES:"#C084FC",XAUUSD:"#FFB830",Other:"#666"};
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const DEF_BAL=10000;
const ACOLS=["#00E676","#4D9FFF","#A78BFA","#FB923C","#22D3EE","#F472B6","#86EFAC","#FFB830"];
const DEF_ACC={id:"acc_default",name:"Main Account",color:ACOLS[0],balance:DEF_BAL,drawdownLimit:0,consistencyLimit:0};

/* ── Helpers ── */
const fmt=n=>{const a=Math.abs(n).toLocaleString("en-US",{maximumFractionDigits:0});return(n>=0?"+":"−")+"$"+a};
const fmtPct=n=>(n>=0?"+":"")+n.toFixed(1)+"%";
const fmtBal=n=>"$"+Number(n).toLocaleString("en-US",{maximumFractionDigits:2});
const clr=(n,neutral=false)=>neutral?"var(--t2)":n>0?"var(--green)":n<0?"var(--red)":"var(--t2)";
const clrDim=(n,neutral=false)=>neutral?"var(--elevated)":n>0?"var(--green-dim)":n<0?"var(--red-dim)":"var(--elevated)";
const PNL_MASK="••••••";
function today(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
function fmtNoteDate(iso){
  const d=new Date(iso),now=new Date(),diff=Math.floor((now-d)/86400000);
  if(diff===0)return d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
  if(diff===1)return"Yesterday";
  if(diff<7)return DAYS[d.getDay()];
  return`${d.getDate()} ${MONTHS[d.getMonth()]}`;
}
function calDays(y,m){const f=new Date(y,m,1).getDay(),t=new Date(y,m+1,0).getDate(),c=[];for(let i=0;i<f;i++)c.push(null);for(let d=1;d<=t;d++)c.push(d);return c}
function newId(){return"acc_"+Date.now()+"_"+Math.random().toString(36).slice(2,7)}

/* ── Toast ── */
function ToastProvider({children}){
  const[ts,setTs]=useState([]);
  const show=useCallback((msg,type="success")=>{
    const id=Date.now();
    setTs(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setTs(p=>p.filter(t=>t.id!==id)),2500);
  },[]);
  const col={success:"var(--green)",error:"var(--red)",warn:"var(--amber)"};
  return(
    <ToastCtx.Provider value={show}>
      {children}
      <div style={{position:"fixed",bottom:96,left:"50%",transform:"translateX(-50%)",zIndex:600,display:"flex",flexDirection:"column",gap:6,alignItems:"center",pointerEvents:"none"}}>
        {ts.map(t=><div key={t.id} className="toast-in" style={{background:col[t.type]||col.success,color:"#000",padding:"9px 18px",borderRadius:99,fontSize:13,fontWeight:600,whiteSpace:"nowrap"}}>{t.msg}</div>)}
      </div>
    </ToastCtx.Provider>
  );
}

/* ── Image compress ── */
function compressImage(url,maxPx=1280,q=.8){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      let{width:w,height:h}=img;
      if(w>maxPx||h>maxPx){if(w>h){h=Math.round(h*maxPx/w);w=maxPx}else{w=Math.round(w*maxPx/h);h=maxPx}}
      const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);
      res(c.toDataURL("image/jpeg",q));
    };img.src=url;
  });
}

);

const IcoCal=Ico(<><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>);
const IcoShield=Ico(<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>);
const IcoNote=Ico(<><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></>);
const IcoPlus=Ico(<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>);
const IcoUp=Ico(<><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></>);
const IcoSun=Ico(<><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></>);
const IcoMoon=Ico(<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>);
const IcoTrendUp=Ico(<><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></>);
const IcoTrendDn=Ico(<><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></>);

const IcoX=Ico(<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>);
const IcoChL=Ico(<polyline points="15 18 9 12 15 6"/>);
const IcoChR=Ico(<polyline points="9 18 15 12 9 6"/>);
const IcoUser=Ico(<><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></>);
const IcoTrash=Ico(<><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></>);
const IcoWarn=Ico(<><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>);
const IcoChart=Ico(<><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></>);

/* ── Stat Card ── */
const StatCard=React.memo(function StatCard({label,value,sub,col,mono=true}){
  const accentClass=col===undefined?"stat-card-accent":col==="var(--green)"?"stat-card-green":col==="var(--red)"?"stat-card-red":col==="var(--amber)"?"stat-card-amber":col==="var(--blue)"?"stat-card-blue":"stat-card-accent";
  return(
    <div className={`elev stat-card-inner ${accentClass}`} style={{padding:"14px 15px",flex:1,minWidth:0}}>
      <div style={{fontSize:10,color:"var(--t3)",fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",marginBottom:6}}>{label}</div>
      <div className={mono?"mono":""} style={{fontSize:20,fontWeight:600,color:col||"var(--t1)",letterSpacing:"-.5px",lineHeight:1}}>{value}</div>
      {sub&&<div style={{fontSize:11,color:"var(--t2)",marginTop:5}}>{sub}</div>}
    </div>
  );
});

/* ── Trade Row — flat list ── */
const TradeRow=React.memo(function TradeRow({trade,onPress,isLast}){
  const pnlHidden=useContext(PnlCtx);
  const win=trade.pnl>0,loss=trade.pnl<0;
  const cts=trade.contracts||1;
  return(
    <div onClick={onPress} className="tap" style={{display:"flex",alignItems:"center",gap:12,padding:"13px 0",borderBottom:isLast?"none":"1px solid var(--line)",cursor:"pointer"}}>
      <div style={{width:3,height:34,borderRadius:99,background:win?"var(--green)":loss?"var(--red)":"var(--t3)",flexShrink:0}}/>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
            <span className="mono" style={{fontSize:13,fontWeight:500,color:"var(--t1)"}}>{trade.date}{trade.time&&<span style={{color:"var(--t3)",fontWeight:400,fontSize:11}}> {trade.time}</span>}</span>
            {trade.direction&&<span className="pill" style={{background:trade.direction==="long"?"var(--green-dim)":"var(--red-dim)",color:trade.direction==="long"?"var(--green)":"var(--red)"}}>{trade.direction==="long"?"▲ L":"▼ S"}</span>}
            {trade.session&&<span className="pill" style={{background:SCOL[trade.session]+"22",color:SCOL[trade.session]}}>{trade.session}</span>}
            {trade.instrument&&<span className="pill" style={{background:(ICOL[trade.instrument]||"#666")+"22",color:ICOL[trade.instrument]||"var(--t2)"}}>{trade.instrument}{cts>1?` ×${cts}`:""}</span>}
          </div>
          <span className="mono" style={{fontSize:15,fontWeight:500,color:pnlHidden?"var(--t3)":"var(--t2)",flexShrink:0,marginLeft:8}}>{pnlHidden?PNL_MASK:fmt(trade.pnl)}</span>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
            <span style={{fontSize:11,color:"var(--t2)"}}>{trade.strategy}</span>
            {(trade.tags||[]).filter(t=>["A+ Setup","FOMO","Revenge","Patient","Tilted"].includes(t)).slice(0,2).map(tag=>{
              const bad=["FOMO","Revenge","Tilted"].includes(tag),good=["A+ Setup","Patient"].includes(tag);
              return<span key={tag} className="pill" style={{background:bad?"var(--red-dim)":good?"var(--green-dim)":"var(--elevated)",color:bad?"var(--red)":good?"var(--green)":"var(--t2)"}}>{tag}</span>;
            })}
            {trade.images?.length>0&&<span style={{fontSize:10,color:"var(--t3)",display:"flex",alignItems:"center",gap:2}}><IcoImg size={10} col="var(--t3)"/> {trade.images.length}</span>}
          </div>
          <div style={{display:"flex",gap:8,flexShrink:0}}>
            <span className="mono" style={{fontSize:11,color:"var(--t3)"}}>{trade.rr}R</span>
            {cts>1&&<span className="mono" style={{fontSize:11,color:"var(--t3)"}}>{pnlHidden?PNL_MASK:fmt(trade.pnl/cts)}/ct</span>}
          </div>
        </div>
      </div>
    </div>
  );
});

/* ── Equity Curve sparkline ── */
const EquityCurve=React.memo(function EquityCurve({trades,accountBalance}){
  const pts=useMemo(()=>{
    const s=[...trades].sort((a,b)=>a.date.localeCompare(b.date));
    let bal=accountBalance;const arr=[bal];
    s.forEach(t=>{bal+=t.pnl;arr.push(bal)});return arr;
  },[trades,accountBalance]);
  if(pts.length<2)return null;
  const W=300,H=48,mn=Math.min(...pts),mx=Math.max(...pts),rng=mx-mn||1;
  const tx=i=>(i/(pts.length-1))*W;
  const ty=v=>H-(((v-mn)/rng)*H*.82+H*.09);
  const line=pts.map((v,i)=>`${i===0?"M":"L"}${tx(i).toFixed(1)},${ty(v).toFixed(1)}`).join(" ");
  const area=line+` L${W},${H} L0,${H} Z`;
  const up=pts[pts.length-1]>=pts[0];
  const sc=up?"var(--green)":"var(--red)",hex=up?"#00E676":"#FF4D4D";
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",display:"block",overflow:"visible"}}>
      <defs><linearGradient id="eqg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={hex} stopOpacity=".2"/><stop offset="100%" stopColor={hex} stopOpacity="0"/></linearGradient></defs>
      <path d={area} fill="url(#eqg)"/>
      <path d={line} fill="none" stroke={sc} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={tx(pts.length-1)} cy={ty(pts[pts.length-1])} r="3" fill={sc} stroke="var(--surface)" strokeWidth="1.5"/>
    </svg>
  );
});

/* ── Drawdown Card ── */
const DrawdownCard=React.memo(function DrawdownCard({trades,accountBalance,drawdownLimit,totalPnl,consistencyLimit}){
  const sorted=useMemo(()=>[...trades].sort((a,b)=>a.date.localeCompare(b.date)),[trades]);
  // Trailing DD — Funded Next / FTMO style
  // - DD floor = peak balance - ddLimit (trailing up with balance)
  // - Floor LOCKS at startingBalance once profit >= ddLimit (floor never goes above start)
  // - Breach = current balance <= floor
  const{points,curBal,curFloor,curDD,curDDPct,isBreached,floorLocked}=useMemo(()=>{
    const ddLim=drawdownLimit||0;
    const startBal=accountBalance;
    let bal=startBal;
    let peak=startBal;
    // floor starts at startBal - ddLimit
    let floor=ddLim>0?startBal-ddLim:0;
    const pts=[{bal,floor,dd:ddLim>0?ddLim:0,pct:0}];
    sorted.forEach(t=>{
      bal+=t.pnl;
      if(bal>peak){
        peak=bal;
        if(ddLim>0){
          const newFloor=peak-ddLim;
          // floor trails up BUT locks at startBal (never go above start balance)
          floor=Math.min(newFloor,startBal);
        }
      }
      const dd=Math.max(bal-floor,0);
      const pct=ddLim>0?Math.max(((floor+ddLim-bal)/ddLim)*100,0):0;
      pts.push({bal,floor,dd:floor>0?bal-floor:0,pct});
    });
    const curDD=ddLim>0?bal-floor:0; // positive = how much room left above floor
    const ddUsed=ddLim>0?Math.max(0,floor+ddLim-bal):0; // how much DD consumed
    const ddUsedPct=ddLim>0?(ddUsedPct_=>(ddUsedPct_))((ddUsed/ddLim)*100):0;
    const isBreached=ddLim>0&&bal<=floor;
    const floorLocked=ddLim>0&&floor>=startBal;
    return{
      points:pts,
      curBal:bal,
      curFloor:floor,
      curDD:ddUsed,          // how much DD has been consumed
      curDDPct:ddLim>0?(ddUsed/ddLim)*100:0,
      bufferLeft:ddLim>0?bal-floor:0,  // how much left before breach
      isBreached,
      floorLocked,
    };
  },[sorted,accountBalance,drawdownLimit]);
  const ddLim=drawdownLimit||0;
  const used=ddLim>0?Math.min(curDDPct,100):0;
  const safe=used<70,warn=used>=70&&used<90;
  const bufferLeft=ddLim>0?curBal-curFloor:0;
  const todayPnl=useMemo(()=>trades.filter(t=>t.date===today()).reduce((a,t)=>a+t.pnl,0),[trades]);
  const autoLim=totalPnl>0?totalPnl*.5:0,actLim=consistencyLimit>0?consistencyLimit:autoLim;
  const conUsed=actLim>0?Math.min((todayPnl/actLim)*100,120):0,conEx=actLim>0&&todayPnl>actLim;
  const cPts=points.slice(-30),W=280,H=60;
  // chart: show balance vs floor
  const allBals=cPts.map(p=>p.bal),allFloors=cPts.map(p=>p.floor||0);
  const chartMin=Math.min(...allBals,...allFloors)*0.999;
  const chartMax=Math.max(...allBals,...allFloors)*1.001;
  const chartRng=chartMax-chartMin||1;
  const tx=i=>(i/(cPts.length-1||1))*W;
  const ty=v=>H-((v-chartMin)/chartRng)*H;
  const balPath=cPts.map((p,i)=>`${i===0?"M":"L"}${tx(i).toFixed(1)},${ty(p.bal).toFixed(1)}`).join(" ");
  const floorPath=ddLim>0?cPts.map((p,i)=>`${i===0?"M":"L"}${tx(i).toFixed(1)},${ty(p.floor||0).toFixed(1)}`).join(" "):null;
  return(
    <div className="card" style={{padding:"18px",marginBottom:12}}>
      <div className="sec">Drawdown & Risk</div>
      {/* Breach alert */}
      {isBreached&&<div style={{background:"var(--red)",borderRadius:"var(--r-md)",padding:"10px 14px",marginBottom:12,display:"flex",gap:8,alignItems:"center"}}><span style={{fontSize:16}}>🚨</span><span style={{fontSize:12,color:"#fff",fontWeight:700}}>DD BREACHED — Account limit hit. Stop trading immediately.</span></div>}
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        <div className="elev" style={{flex:1,padding:"12px 14px"}}>
          <div style={{fontSize:9,color:"var(--t3)",fontWeight:600,letterSpacing:".07em",textTransform:"uppercase",marginBottom:4}}>DD Floor</div>
          <div className="mono" style={{fontSize:20,fontWeight:500,color:isBreached?"var(--red)":"var(--t1)",letterSpacing:"-.5px"}}>{ddLim>0?`$${Math.round(curFloor).toLocaleString()}`:"—"}</div>
          <div style={{fontSize:10,color:"var(--t2)",marginTop:3}}>{floorLocked?<span style={{color:"var(--amber)",fontWeight:700}}>🔒 Locked at starting balance</span>:<span>Trailing up with balance</span>}</div>
        </div>
        <div className="elev" style={{flex:1,padding:"12px 14px"}}>
          <div style={{fontSize:9,color:"var(--t3)",fontWeight:600,letterSpacing:".07em",textTransform:"uppercase",marginBottom:4}}>Buffer Left</div>
          <div className="mono" style={{fontSize:20,fontWeight:500,color:bufferLeft<=0?"var(--red)":safe?"var(--green)":"var(--amber)",letterSpacing:"-.5px"}}>{ddLim>0?`$${Math.max(0,Math.round(bufferLeft)).toLocaleString()}`:"—"}</div>
          <div style={{fontSize:10,color:"var(--t2)",marginTop:3}}>{ddLim>0?`DD limit: $${ddLim.toLocaleString()}`:"Not set"}</div>
        </div>
      </div>
      {/* DD progress */}
      {ddLim>0&&<div style={{marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
          <span style={{fontSize:11,color:"var(--t2)"}}>DD Used <span style={{fontSize:10,color:"var(--t3)"}}>(${Math.round(curDD).toLocaleString()} of ${ddLim.toLocaleString()})</span></span>
          <span className="mono" style={{fontSize:11,fontWeight:500,color:safe?"var(--green)":warn?"var(--amber)":"var(--red)"}}>{Math.min(used,100).toFixed(1)}%</span>
        </div>
        <div style={{height:5,background:"var(--elevated)",borderRadius:99,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${Math.min(used,100)}%`,background:safe?"var(--green)":warn?"var(--amber)":"var(--red)",borderRadius:99,transition:"width .3s"}}/>
        </div>
      </div>}
      {ddLim>0&&(
        <div style={{marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
            <span style={{fontSize:11,color:"var(--t2)"}}>DD Used</span>
            <span className="mono" style={{fontSize:11,fontWeight:500,color:safe?"var(--green)":warn?"var(--amber)":"var(--red)"}}>{used.toFixed(1)}%</span>
          </div>
          <div style={{height:4,background:"var(--elevated)",borderRadius:99,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${used}%`,background:safe?"var(--green)":warn?"var(--amber)":"var(--red)",borderRadius:99,transition:"width .3s"}}/>
          </div>
        </div>
      )}
      {cPts.length>2&&ddLim>0&&(
        <div style={{marginBottom:14}}>
          <div style={{display:"flex",gap:16,marginBottom:6}}>
            <div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:20,height:2,background:"var(--green)",borderRadius:1}}/><span style={{fontSize:10,color:"var(--t3)"}}>Balance</span></div>
            <div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:20,height:2,background:"var(--red)",borderRadius:1,borderTop:"1px dashed var(--red)"}}/><span style={{fontSize:10,color:"var(--t3)"}}>DD Floor {floorLocked?"🔒":""}</span></div>
          </div>
          <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{display:"block",overflow:"visible"}}>
            <defs>
              <linearGradient id="balg" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="#00E676" stopOpacity=".15"/>
                <stop offset="100%" stopColor="#00E676" stopOpacity="0"/>
              </linearGradient>
            </defs>
            {/* Balance area fill */}
            <path d={balPath+` L${W},${H} L0,${H} Z`} fill="url(#balg)"/>
            {/* Floor line — dashed red */}
            {floorPath&&<path d={floorPath} fill="none" stroke="var(--red)" strokeWidth="1.5" strokeDasharray="4,3" opacity=".7"/>}
            {/* Balance line */}
            <path d={balPath} fill="none" stroke="var(--green)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
            {/* Current balance dot */}
            <circle cx={tx(cPts.length-1)} cy={ty(cPts[cPts.length-1].bal)} r="3" fill="var(--green)" stroke="var(--surface)" strokeWidth="1.5"/>
            {/* Current floor dot */}
            {ddLim>0&&<circle cx={tx(cPts.length-1)} cy={ty(cPts[cPts.length-1].floor||0)} r="3" fill="var(--red)" stroke="var(--surface)" strokeWidth="1.5"/>}
          </svg>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
            <span style={{fontSize:10,color:"var(--t3)"}}>Balance <span className="mono" style={{color:clr(totalPnl)}}>${Math.round(curBal).toLocaleString()}</span></span>
            <span style={{fontSize:10,color:"var(--t3)"}}>Floor <span className="mono" style={{color:"var(--red)"}}>$${Math.round(curFloor).toLocaleString()}</span></span>

      )}
      <div style={{borderTop:"1px solid var(--line)",paddingTop:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>

/* ── Breakdown ── */
const BreakdownCard=React.memo(function BreakdownCard({trades}){
  const{sRows,iRows}=useMemo(()=>{
    const sm={},im={};
    trades.forEach(t=>{
      if(!sm[t.strategy])sm[t.strategy]={pnl:0,wins:0,n:0};
      sm[t.strategy].pnl+=t.pnl;sm[t.strategy].n++;if(t.pnl>0)sm[t.strategy].wins++;
      const ik=t.instrument||"Other";
      if(!im[ik])im[ik]={pnl:0,wins:0,n:0,cts:0};
      im[ik].pnl+=t.pnl;im[ik].n++;im[ik].cts+=(t.contracts||1);if(t.pnl>0)im[ik].wins++;
    });
    return{
      sRows:Object.entries(sm).map(([k,v])=>({name:k,...v,wr:Math.round((v.wins/v.n)*100)})).sort((a,b)=>b.pnl-a.pnl).slice(0,5),
      iRows:Object.entries(im).map(([k,v])=>({name:k,...v,wr:Math.round((v.wins/v.n)*100),ppc:v.pnl/v.cts})).sort((a,b)=>b.pnl-a.pnl),
    };
  },[trades]);
  if(trades.length<3)return null;
  const maxS=Math.max(...sRows.map(r=>Math.abs(r.pnl)),1),maxI=Math.max(...iRows.map(r=>Math.abs(r.pnl)),1);

            </div>
            <div style={{height:3,background:"var(--elevated)",borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.round((Math.abs(r.pnl)/maxS)*100)}%`,background:r.pnl>=0?"var(--green)":"var(--red)",borderRadius:99}}/></div>
          </div>
        ))}
      </>}
      {iRows.length>=1&&<>
        <div className="sec" style={{marginTop:sRows.length>=2?14:0}}>Instrument</div>
        {iRows.map((r,i)=>{const col=ICOL[r.name]||"var(--t2)";return(
          <div key={i} style={{marginBottom:10}}>

              <div style={{textAlign:"right"}}><div className="mono" style={{fontSize:12,fontWeight:500,color:clr(r.pnl)}}>{fmt(r.pnl)}</div><div className="mono" style={{fontSize:10,color:"var(--t3)"}}>{fmt(r.ppc)}/ct</div></div>
            </div>
            <div style={{height:3,background:"var(--elevated)",borderRadius:99,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.round((Math.abs(r.pnl)/maxI)*100)}%`,background:r.pnl>=0?col:"var(--red)",borderRadius:99,opacity:.8}}/></div>
          </div>

});

    if(sorted.length>0){for(let i=1;i<sorted.length;i++){if((sorted[i].pnl>0)===iw)s++;else break};if(iw)ws=s;}

            </div>
          </div>
          <span className="mono" style={{fontSize:28,fontWeight:700,color:col,opacity:.2,flexShrink:0}}>{lossStreak}</span>
        </div>

                <div style={{display:"flex",alignItems:"center",gap:8}}>

/* ── Dashboard Calendar — Tradezella style ── */
function DashboardCalendar({trades,onLogTrade}){
  const now=new Date();
  const[year,setYear]=useState(now.getFullYear());
  const[month,setMonth]=useState(now.getMonth());
  const pnlHidden=useContext(PnlCtx);

  const dm=useMemo(()=>{
    const m={};
    trades.forEach(t=>{
      if(!m[t.date])m[t.date]={pnl:0,count:0,wins:0};
      m[t.date].pnl+=t.pnl;
      m[t.date].count++;
      if(t.pnl>0)m[t.date].wins++;
    });
    return m;
  },[trades]);

  const cells=useMemo(()=>calDays(year,month),[year,month]);
  const pfx=`${year}-${String(month+1).padStart(2,"0")}`;
  const monthEntries=useMemo(()=>Object.entries(dm).filter(([k])=>k.startsWith(pfx)),[dm,pfx]);
  const mPnl=useMemo(()=>monthEntries.reduce((a,[,v])=>a+v.pnl,0),[monthEntries]);
  const mTradingDays=monthEntries.length;
  const mWinDays=monthEntries.filter(([,v])=>v.pnl>0).length;

  const weeks=useMemo(()=>{
    const ws=[];let week=[];
    cells.forEach(d=>{week.push(d);if(week.length===7){ws.push(week);week=[];}});
    if(week.length)ws.push(week);
    return ws;
  },[cells]);

  const weeklyStats=useMemo(()=>weeks.map(wk=>{
    let pnl=0,days=0;
    wk.forEach(d=>{
      if(!d)return;
      const key=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      if(dm[key]){pnl+=dm[key].pnl;days++;}
    });
    return{pnl,days};
  }),[weeks,dm,year,month]);

  const prev=()=>{if(month===0){setMonth(11);setYear(y=>y-1)}else setMonth(m=>m-1)};
  const next=()=>{if(month===11){setMonth(0);setYear(y=>y+1)}else setMonth(m=>m+1)};

                  </div>

              <div style={{minHeight:68,padding:"8px 6px",borderLeft:"1px solid var(--line)",borderBottom:rowBorder,display:"flex",flexDirection:"column",justifyContent:"center"}}>

                    <div className="mono" style={{fontSize:11,fontWeight:700,color:pnlHidden?"var(--t3)":clr(ws.pnl),marginBottom:1}}>{pnlHidden?PNL_MASK:fmtK(ws.pnl)}</div>

            </React.Fragment>

        })}
      </div>
    </div>
  );
}

/* ── Calendar ── */
function CalendarView({trades}){
  const now=new Date();
  const[year,setYear]=useState(now.getFullYear());
  const[month,setMonth]=useState(now.getMonth());
  const[mode,setMode]=useState("month");
  const dm=useMemo(()=>{const m={};trades.forEach(t=>{m[t.date]=(m[t.date]||0)+t.pnl});return m},[trades]);
  const cells=useMemo(()=>calDays(year,month),[year,month]);
  const pfx=`${year}-${String(month+1).padStart(2,"0")}`;
  const mPnl=useMemo(()=>Object.entries(dm).filter(([k])=>k.startsWith(pfx)).reduce((a,[,v])=>a+v,0),[dm,pfx]);
  const mW=useMemo(()=>Object.entries(dm).filter(([k,v])=>k.startsWith(pfx)&&v>0).length,[dm,pfx]);
  const mD=useMemo(()=>Object.entries(dm).filter(([k])=>k.startsWith(pfx)).length,[dm,pfx]);
  const chartData=useMemo(()=>{
    if(mode==="day")return Object.entries(dm).filter(([k])=>k.startsWith(pfx)).sort(([a],[b])=>a.localeCompare(b)).map(([k,v])=>({l:k.slice(8),v}));
    if(mode==="month")return Array.from({length:12},(_,i)=>{const p=`${year}-${String(i+1).padStart(2,"0")}`;return{l:MONTHS[i],v:Object.entries(dm).filter(([k])=>k.startsWith(p)).reduce((a,[,v])=>a+v,0)}});
    const ym={};Object.entries(dm).forEach(([k,v])=>{const y=k.slice(0,4);ym[y]=(ym[y]||0)+v});
    return Object.entries(ym).sort().map(([k,v])=>({l:k,v}));
  },[mode,year,month,dm]);
  const prev=()=>{if(month===0){setMonth(11);setYear(y=>y-1)}else setMonth(m=>m-1)};
  const next=()=>{if(month===11){setMonth(0);setYear(y=>y+1)}else setMonth(m=>m+1)};

    if(!data.length)return<div style={{textAlign:"center",padding:"28px 0",color:"var(--t3)",fontSize:12}}>No data</div>;
    const vals=data.map(d=>d.v),mx=Math.max(...vals.map(Math.abs),1),total=vals.reduce((a,b)=>a+b,0);
    return(
      <div>
        <div style={{display:"flex",alignItems:"flex-end",gap:3,height:72,marginBottom:6}}>
          {data.map((d,i)=><div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",height:"100%"}}>
            <div style={{width:"100%",height:`${Math.max((Math.abs(d.v)/mx)*64,2)}px`,background:d.v>=0?"var(--green)":"var(--red)",borderRadius:"3px 3px 0 0",opacity:.8}}/>
          </div>)}
        </div>
        <div style={{display:"flex",gap:3,marginBottom:10}}>
          {data.map((d,i)=>{if(data.length>14&&i%Math.ceil(data.length/7)!==0)return<div key={i} style={{flex:1}}/>;return<div key={i} style={{flex:1,fontSize:9,color:"var(--t3)",textAlign:"center",fontFamily:"var(--mono)"}}>{d.l}</div>})}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",paddingTop:10,borderTop:"1px solid var(--line)"}}>
          <div><div style={{fontSize:10,color:"var(--t3)",marginBottom:2}}>Total</div><div className="mono" style={{fontSize:14,fontWeight:500,color:clr(total)}}>{fmt(total)}</div></div>
          <div style={{textAlign:"center"}}><div style={{fontSize:10,color:"var(--t3)",marginBottom:2}}>Best</div><div className="mono" style={{fontSize:14,fontWeight:500,color:"var(--green)"}}>{fmt(Math.max(...vals))}</div></div>
          <div style={{textAlign:"right"}}><div style={{fontSize:10,color:"var(--t3)",marginBottom:2}}>Worst</div><div className="mono" style={{fontSize:14,fontWeight:500,color:"var(--red)"}}>{fmt(Math.min(...vals))}</div></div>
        </div>
      </div>
    );
  }
  return(
    <>
      <div className="card" style={{padding:"16px",marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <button onClick={prev} className="tap" style={{background:"var(--elevated)",border:"none",width:32,height:32,borderRadius:"var(--r-sm)",display:"flex",alignItems:"center",justifyContent:"center"}}><IcoChL size={15} col="var(--t1)"/></button>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:14,fontWeight:700,color:"var(--t1)"}}>{MONTHS[month]} {year}</div>
            <div className="mono" style={{fontSize:13,color:clr(mPnl)}}>{fmt(mPnl)}</div>
            {mD>0&&<div style={{fontSize:10,color:"var(--t3)",marginTop:1}}>{mW}W / {mD-mW}L</div>}
          </div>
          <button onClick={next} className="tap" style={{background:"var(--elevated)",border:"none",width:32,height:32,borderRadius:"var(--r-sm)",display:"flex",alignItems:"center",justifyContent:"center"}}><IcoChR size={15} col="var(--t1)"/></button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:3}}>
          {DAYS.map(d=><div key={d} style={{textAlign:"center",fontSize:9,color:"var(--t3)",fontWeight:600}}>{d[0]}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
          {cells.map((day,i)=>{
            if(!day)return<div key={`e${i}`}/>;
            const key=`${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
            const pnl=dm[key],isT=key===today();
            return(
              <div key={key} style={{borderRadius:"var(--r-sm)",padding:"5px 2px",textAlign:"center",background:pnl!==undefined?clrDim(pnl):isT?"var(--green-dim)":"transparent",border:isT?"1px solid var(--green)44":"1px solid transparent",minHeight:38}}>
                <div style={{fontSize:10,color:pnl!==undefined?"var(--t2)":"var(--t2)",fontWeight:isT?700:500}}>{day}</div>
                {pnl!==undefined&&<div className="mono" style={{fontSize:7,color:"var(--t2)",marginTop:1,lineHeight:1.1}}>{pnl>0?"+":"−"}${Math.abs(pnl).toLocaleString()}</div>}
              </div>
            );
          })}
        </div>
      </div>
      <div className="card" style={{padding:"16px",marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <div style={{fontSize:13,fontWeight:700,color:"var(--t1)"}}>Performance</div>
          <div style={{display:"flex",background:"var(--elevated)",borderRadius:"var(--r-sm)",padding:3,gap:2}}>
            {[{id:"day",l:"Day"},{id:"month",l:"Month"},{id:"year",l:"Year"}].map(m=>(
              <button key={m.id} onClick={()=>setMode(m.id)} style={{padding:"4px 10px",borderRadius:6,border:"none",background:mode===m.id?"var(--surface)":"transparent",color:mode===m.id?"var(--t1)":"var(--t3)",fontSize:11,fontWeight:600,cursor:"pointer"}}>{m.l}</button>
            ))}
          </div>
        </div>
        <BarChart data={chartData}/>
      </div>
    </>
  );
}

          <div style={{paddingTop:4}}>
            {/* Date range */}

              <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} className="inp" style={{flex:1,padding:"7px 10px",fontSize:12}}/>

          </div>
        )}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:10,color:"var(--t3)",fontWeight:600,letterSpacing:".07em",textTransform:"uppercase"}}>{accountName} · {filtered.length}{anyF?` / ${trades.length}` :""} trades</span>
          {filtered.length>0&&anyF&&<span style={{fontSize:10,color:"var(--t3)"}}>· {filtWR}% WR</span>}
        </div>
        {filtered.length>0&&<span className="mono" style={{fontSize:13,fontWeight:500,color:filtered.length>0?clr(filtPnl):"var(--t2)"}}>{fmt(filtPnl)}</span>}
      </div>
      <div className="card" style={{padding:"0 16px"}}>
        {filtered.map((t,i)=><TradeRow key={t.id} trade={t} onPress={()=>onPress(t)} isLast={i===filtered.length-1}/>)}
        {filtered.length===0&&<div style={{textAlign:"center",padding:"44px 0",fontSize:12,color:"var(--t3)"}}>{trades.length===0?"No trades yet":"No trades match filters"}</div>}
      </div>
    </>
  );

/* ── Trade Modal ── */
function TradeModal({trade,onSave,onDelete,onClose}){
  const{isDesktop}=useBP(),toast=useToast(),isNew=!trade.id;
  const imgRef=useRef(null);
  const[lb,setLb]=useState(null),[cDel,setCDel]=useState(false),[drag,setDrag]=useState(false);
  const[form,setForm]=useState({date:trade.date||today(),time:trade.time||"",direction:trade.direction||"",pnl:trade.pnl!==undefined?String(trade.pnl):"",rr:trade.rr!==undefined?String(trade.rr):"",entryPrice:trade.entryPrice!==undefined?String(trade.entryPrice):"",stopLoss:trade.stopLoss!==undefined?String(trade.stopLoss):"",takeProfit:trade.takeProfit!==undefined?String(trade.takeProfit):"",strategy:trade.strategy||STRATS[0],session:trade.session||"",instrument:trade.instrument||"MNQ",contracts:trade.contracts!==undefined?String(trade.contracts):"1",tags:trade.tags||[],feelings:trade.feelings||"",notes:trade.notes||"",images:trade.images||[]});
  // auto-calc RR from entry/SL/TP
  const autoRR=useMemo(()=>{
    const e=parseFloat(form.entryPrice),sl=parseFloat(form.stopLoss),tp=parseFloat(form.takeProfit);
    if(!e||!sl||isNaN(e)||isNaN(sl))return null;
    const risk=Math.abs(e-sl);if(!risk)return null;
    if(!tp||isNaN(tp))return null;
    const reward=Math.abs(tp-e);
    return(reward/risk).toFixed(2);
  },[form.entryPrice,form.stopLoss,form.takeProfit]);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  useEffect(()=>{
    const h=e=>{const items=e.clipboardData?.items;if(!items)return;for(const item of Array.from(items)){if(item.type.startsWith("image/")){const r=new FileReader();r.onload=async ev=>{const c=await compressImage(ev.target.result);setForm(f=>({...f,images:[...f.images,c]}))};r.readAsDataURL(item.getAsFile())}}};
    window.addEventListener("paste",h);return()=>window.removeEventListener("paste",h);

/* ── Goal Tracker ── */
function GoalTracker({trades,accountBalance}){
  const pnlHidden=useContext(PnlCtx);
  const SK="nq-goals";
  const[goals,setGoals]=useState(()=>{try{const v=localStorage.getItem(SK);return v?JSON.parse(v):[]}catch{return[]}});
  const[adding,setAdding]=useState(false);
  const[form,setForm]=useState({label:"",target:"",period:"monthly",type:"pnl"});
  const toast=useToast();

  const save=g=>{try{localStorage.setItem(SK,JSON.stringify(g))}catch{}};

  const now=new Date();
  const monthKey=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
  const weekStart=new Date(now);weekStart.setDate(now.getDate()-now.getDay()+1);
  const weekKey=weekStart.toISOString().slice(0,10);

  function getProgress(goal){
    let ts=trades;
    if(goal.period==="monthly")ts=trades.filter(t=>t.date.startsWith(monthKey));
    else if(goal.period==="weekly")ts=trades.filter(t=>t.date>=weekKey);
    if(goal.type==="pnl")return ts.reduce((a,t)=>a+t.pnl,0);
    if(goal.type==="trades")return ts.length;
    if(goal.type==="winrate")return ts.length?Math.round(ts.filter(t=>t.pnl>0).length/ts.length*100):0;
    return 0;
  }

  function addGoal(){
    if(!form.label||!form.target){toast("Fill all fields","warn");return;}
    const g=[...goals,{id:Date.now(),label:form.label,target:parseFloat(form.target),period:form.period,type:form.type}];
    setGoals(g);save(g);setAdding(false);setForm({label:"",target:"",period:"monthly",type:"pnl"});toast("Goal added");
  }
  function delGoal(id){const g=goals.filter(x=>x.id!==id);setGoals(g);save(g);}

  const periodLabel={monthly:"This month",weekly:"This week",alltime:"All time"};
  const typeLabel={pnl:"P&L",trades:"# Trades",winrate:"Win Rate %"};

  if(goals.length===0&&!adding)return(
    <div className="card" style={{padding:"16px",marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div>
        <div style={{fontSize:13,fontWeight:700,color:"var(--t1)"}}>Goals</div>
        <div style={{fontSize:11,color:"var(--t3)",marginTop:2}}>Set a target to track</div>
      </div>
      <button onClick={()=>setAdding(true)} className="tap" style={{padding:"7px 14px",background:"var(--accent)",border:"none",borderRadius:"var(--r-sm)",color:"#fff",fontSize:12,fontWeight:700}}>+ Add Goal</button>
    </div>
  );

  return(
    <div className="card" style={{padding:"16px",marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontSize:13,fontWeight:700,color:"var(--t1)"}}>Goals</div>
        {!adding&&<button onClick={()=>setAdding(true)} className="tap" style={{padding:"5px 12px",background:"var(--accent-dim)",border:"1px solid var(--accent)33",borderRadius:"var(--r-sm)",color:"var(--accent)",fontSize:11,fontWeight:700}}>+ Add</button>}
      </div>

      {adding&&(
        <div style={{background:"var(--elevated)",borderRadius:"var(--r-md)",padding:"14px",marginBottom:12,border:"1px solid var(--line)"}}>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <input className="inp" placeholder="Goal name (e.g. Hit $2k profit)" value={form.label} onChange={e=>setForm(f=>({...f,label:e.target.value}))} style={{fontSize:13,padding:"9px 12px"}} autoFocus/>
            <div style={{display:"flex",gap:8}}>
              <div style={{flex:1}}>
                <div style={{fontSize:9,color:"var(--t3)",fontWeight:700,letterSpacing:".07em",textTransform:"uppercase",marginBottom:5}}>Type</div>
                <div style={{display:"flex",gap:4}}>
                  {[{v:"pnl",l:"P&L $"},{v:"trades",l:"Trades"},{v:"winrate",l:"Win %"}].map(o=>(
                    <button key={o.v} onClick={()=>setForm(f=>({...f,type:o.v}))} className="tap" style={{flex:1,padding:"7px 4px",borderRadius:"var(--r-sm)",border:"none",background:form.type===o.v?"var(--accent-dim)":"var(--overlay)",color:form.type===o.v?"var(--accent)":"var(--t3)",fontSize:10,fontWeight:700}}>{o.l}</button>
                  ))}
                </div>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:9,color:"var(--t3)",fontWeight:700,letterSpacing:".07em",textTransform:"uppercase",marginBottom:5}}>Period</div>
                <div style={{display:"flex",gap:4}}>
                  {[{v:"weekly",l:"Week"},{v:"monthly",l:"Month"},{v:"alltime",l:"All"}].map(o=>(
                    <button key={o.v} onClick={()=>setForm(f=>({...f,period:o.v}))} className="tap" style={{flex:1,padding:"7px 4px",borderRadius:"var(--r-sm)",border:"none",background:form.period===o.v?"var(--accent-dim)":"var(--overlay)",color:form.period===o.v?"var(--accent)":"var(--t3)",fontSize:10,fontWeight:700}}>{o.l}</button>
                  ))}
                </div>
              </div>
            </div>
            <input className="inp mono" type="number" placeholder={form.type==="pnl"?"2000":form.type==="winrate"?"60":"20"} value={form.target} onChange={e=>setForm(f=>({...f,target:e.target.value}))} style={{padding:"9px 12px",fontSize:13}}/>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setAdding(false)} className="tap" style={{flex:1,padding:"10px",background:"var(--overlay)",border:"none",borderRadius:"var(--r-sm)",color:"var(--t2)",fontSize:13,fontWeight:600}}>Cancel</button>
              <button onClick={addGoal} className="tap" style={{flex:2,padding:"10px",background:"var(--accent)",border:"none",borderRadius:"var(--r-sm)",color:"#fff",fontSize:13,fontWeight:700}}>Save Goal</button>
            </div>
          </div>
        </div>
      )}

      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {goals.map(goal=>{
          const prog=getProgress(goal);
          const pct=Math.min(Math.max((prog/goal.target)*100,0),100);
          const done=prog>=goal.target;
          const negative=prog<0;
          const showVal=goal.type==="pnl"?(pnlHidden?PNL_MASK:fmt(prog)):(goal.type==="winrate"?prog+"%":prog);
          const showTarget=goal.type==="pnl"?"$"+goal.target.toLocaleString():(goal.type==="winrate"?goal.target+"%":goal.target);
          return(
            <div key={goal.id} style={{padding:"12px",background:"var(--elevated)",borderRadius:"var(--r-md)",border:`1px solid ${done?"var(--green)33":"var(--line)"}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <div>
                  <div style={{fontSize:12,fontWeight:700,color:done?"var(--green)":"var(--t1)",display:"flex",alignItems:"center",gap:6}}>
                    {done&&<span style={{fontSize:14}}>✓</span>}{goal.label}
                  </div>
                  <div style={{fontSize:10,color:"var(--t3)",marginTop:2}}>{periodLabel[goal.period]} · {typeLabel[goal.type]}</div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{textAlign:"right"}}>
                    <div className="mono" style={{fontSize:13,fontWeight:700,color:done?"var(--green)":negative?"var(--red)":"var(--t1)"}}>{showVal}</div>
                    <div style={{fontSize:10,color:"var(--t3)"}}>of {showTarget}</div>
                  </div>
                  <button onClick={()=>delGoal(goal.id)} className="tap" style={{background:"var(--red-dim)",border:"none",borderRadius:"var(--r-sm)",padding:"5px 6px",display:"flex",alignItems:"center"}}><IcoX size={11} col="var(--red)"/></button>
                </div>
              </div>
              <div style={{height:5,background:"var(--overlay)",borderRadius:99,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${pct}%`,background:done?"var(--green)":negative?"var(--red)":"var(--accent)",borderRadius:99,transition:"width .4s"}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
                <span style={{fontSize:9,color:"var(--t3)"}}>{Math.round(pct)}% complete</span>
                {!done&&goal.type==="pnl"&&<span style={{fontSize:9,color:"var(--t3)"}} className="mono">{pnlHidden?PNL_MASK:(fmt(goal.target-Math.max(prog,0))+" to go")}</span>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}


/* ── Analytics View ── */
function AnalyticsView({trades,accountBalance}){
  const pnlHidden=useContext(PnlCtx);
  const[period,setPeriod]=useState("all");
  const filtered=useMemo(()=>{
    if(period==="all")return trades;
    const cutoff=new Date();
    if(period==="7d"){cutoff.setDate(cutoff.getDate()-7)}
    else if(period==="30d"){cutoff.setDate(cutoff.getDate()-30)}
    else if(period==="90d"){cutoff.setDate(cutoff.getDate()-90)}
    const co=cutoff.toISOString().slice(0,10);
    return trades.filter(t=>t.date>=co);
  },[trades,period]);

  const sorted=useMemo(()=>[...filtered].sort((a,b)=>a.date.localeCompare(b.date)),[filtered]);

  const stats=useMemo(()=>{
    const w=filtered.filter(t=>t.pnl>0),l=filtered.filter(t=>t.pnl<0);
    const total=filtered.reduce((a,t)=>a+t.pnl,0);
    const wr=filtered.length?Math.round((w.length/filtered.length)*100):0;
    const aw=w.length?w.reduce((a,t)=>a+t.pnl,0)/w.length:0;
    const al=l.length?l.reduce((a,t)=>a+t.pnl,0)/l.length:0;
    const tw=w.reduce((a,t)=>a+t.pnl,0),tl=Math.abs(l.reduce((a,t)=>a+t.pnl,0));
    const pf=tl>0?(tw/tl).toFixed(2):"inf";
    const pfDisplay=tl>0?(tw/tl).toFixed(2):"\u221e";
    const exp=filtered.length?Math.round((wr/100)*aw-((100-wr)/100)*Math.abs(al)):0;
    const rr=filtered.length?(filtered.reduce((a,t)=>a+t.rr,0)/filtered.length).toFixed(1):"0.0";
    let peak=accountBalance,bal=accountBalance,mdd=0;
    sorted.forEach(t=>{bal+=t.pnl;if(bal>peak)peak=bal;const dd=peak>0?(peak-bal)/peak*100:0;if(dd>mdd)mdd=dd;});
    const dm={};sorted.forEach(t=>{dm[t.date]=(dm[t.date]||0)+t.pnl});
    const dr=Object.values(dm);
    const mean=dr.length?dr.reduce((a,b)=>a+b,0)/dr.length:0;
    const std=dr.length>1?Math.sqrt(dr.reduce((a,v)=>a+Math.pow(v-mean,2),0)/(dr.length-1)):0;
    const sh=std>0?(mean/std*Math.sqrt(252)).toFixed(2):"—";
    return{wins:w,losses:l,totalPnl:total,winRate:wr,avgWin:aw,avgLoss:al,profitFactor:pfDisplay,profitFactorNum:parseFloat(pf),expectancy:exp,avgRR:rr,maxDD:mdd.toFixed(1),sharpe:sh};
  },[filtered,sorted,accountBalance]);

  const eqData=useMemo(()=>{
    let bal=accountBalance;const pts=[{d:"Start",v:bal}];
    sorted.forEach(t=>{bal+=t.pnl;pts.push({d:t.date.slice(5),v:bal})});
    return pts;
  },[sorted,accountBalance]);

  const dowData=useMemo(()=>{
    const days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    const m={};days.forEach(d=>{m[d]={pnl:0,n:0,wins:0}});
    filtered.forEach(t=>{const d=days[new Date(t.date+"T12:00:00").getDay()];if(d){m[d].pnl+=t.pnl;m[d].n++;if(t.pnl>0)m[d].wins++;}});
    return days.filter(d=>m[d].n>0).map(d=>({l:d,...m[d],wr:m[d].n?Math.round(m[d].wins/m[d].n*100):0}));
  },[filtered]);

  const sessData=useMemo(()=>{
    const m={};
    filtered.forEach(t=>{const s=t.session||"Other";if(!m[s])m[s]={pnl:0,n:0,wins:0};m[s].pnl+=t.pnl;m[s].n++;if(t.pnl>0)m[s].wins++;});
    return Object.entries(m).map(([s,v])=>({l:s,...v,wr:Math.round(v.wins/v.n*100),col:SCOL[s]||"#666"})).sort((a,b)=>b.pnl-a.pnl);
  },[filtered]);

  const stratData=useMemo(()=>{
    const m={};
    filtered.forEach(t=>{const s=t.strategy||"Other";if(!m[s])m[s]={pnl:0,n:0,wins:0};m[s].pnl+=t.pnl;m[s].n++;if(t.pnl>0)m[s].wins++;});
    return Object.entries(m).map(([s,v])=>({l:s,...v,wr:Math.round(v.wins/v.n*100)})).sort((a,b)=>b.pnl-a.pnl).slice(0,6);
  },[filtered]);

  const instrData=useMemo(()=>{
    const m={};
    filtered.forEach(t=>{const s=t.instrument||"Other";if(!m[s])m[s]={pnl:0,n:0,wins:0,cts:0};m[s].pnl+=t.pnl;m[s].n++;m[s].cts+=(t.contracts||1);if(t.pnl>0)m[s].wins++;});
    return Object.entries(m).map(([s,v])=>({l:s,...v,wr:Math.round(v.wins/v.n*100),col:ICOL[s]||"#666"})).sort((a,b)=>b.pnl-a.pnl);
  },[filtered]);

  const tagData=useMemo(()=>{
    const m={};
    filtered.forEach(t=>(t.tags||[]).forEach(tag=>{if(!m[tag])m[tag]={pnl:0,n:0,wins:0};m[tag].pnl+=t.pnl;m[tag].n++;if(t.pnl>0)m[tag].wins++;}));
    return Object.entries(m).map(([tag,v])=>({l:tag,...v,wr:Math.round(v.wins/v.n*100)})).sort((a,b)=>b.n-a.n).slice(0,8);
  },[filtered]);

  const rrDist=useMemo(()=>{
    const b={"<0":0,"0-1R":0,"1-2R":0,"2-3R":0,"3R+":0};
    filtered.forEach(t=>{const r=t.rr||0;if(r<0)b["<0"]++;else if(r<1)b["0-1R"]++;else if(r<2)b["1-2R"]++;else if(r<3)b["2-3R"]++;else b["3R+"]++;});
    return Object.entries(b).map(([l,v])=>({l,v,col:l==="<0"?"var(--red)":l==="3R+"?"var(--green)":"var(--blue)"})).filter(d=>d.v>0);
  },[filtered]);

  const monthlyData=useMemo(()=>{
    const m={};filtered.forEach(t=>{const k=t.date.slice(0,7);m[k]=(m[k]||0)+t.pnl});
    return Object.entries(m).sort().map(([k,v])=>({l:MONTHS[parseInt(k.slice(5))-1]+" '"+k.slice(2,4),v}));
  },[filtered]);

  function MiniBarChart({data,height=60,colFn}){
    if(!data.length)return null;
    const vals=data.map(d=>d.v!=null?d.v:0);
    const mx=Math.max(...vals.map(Math.abs),1);
    return(
      <div style={{display:"flex",alignItems:"flex-end",gap:3,height:height+20}}>
        {data.map((d,i)=>{
          const v=vals[i];const h2=Math.max((Math.abs(v)/mx)*height,2);
          const col=colFn?colFn(d,v):v>=0?"var(--green)":"var(--red)";
          return(
            <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",height:height+20,gap:2}}>
              <div style={{width:"100%",height:h2,background:col,borderRadius:"3px 3px 0 0",opacity:.85}}/>
              <div style={{fontSize:8,color:"var(--t3)",textAlign:"center",lineHeight:1.1,fontFamily:"var(--mono)"}}>{d.l}</div>
            </div>
          );
        })}
      </div>
    );
  }

  function EquityCurveChart({data}){
    if(data.length<2)return null;
    const W=600,H=100;
    const vals=data.map(d=>d.v);
    const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
    const tx=i=>(i/(data.length-1))*W;
    const ty=v=>H-(((v-mn)/rng)*(H*0.82)+H*0.09);
    const line=data.map((d,i)=>`${i===0?"M":"L"}${tx(i).toFixed(1)},${ty(d.v).toFixed(1)}`).join(" ");
    const area=line+` L${W},${H} L0,${H} Z`;
    const up=vals[vals.length-1]>=vals[0];
    const sc=up?"var(--green)":"var(--red)",hex=up?"#22C55E":"#EF4444";
    return(
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",display:"block",overflow:"visible",marginBottom:4}}>
        <defs>
          <linearGradient id="aqg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={hex} stopOpacity=".25"/>
            <stop offset="100%" stopColor={hex} stopOpacity="0"/>
          </linearGradient>
        </defs>
        <path d={area} fill="url(#aqg)"/>
        <path d={line} fill="none" stroke={sc} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        <circle cx={tx(data.length-1)} cy={ty(vals[vals.length-1])} r="3.5" fill={sc} stroke="var(--surface)" strokeWidth="1.5"/>
      </svg>
    );
  }

  if(filtered.length===0)return(
    <div style={{textAlign:"center",padding:"64px 20px"}}>
      <IcoChart size={36} col="var(--t3)"/>
      <div style={{fontSize:15,fontWeight:700,color:"var(--t2)",margin:"14px 0 6px"}}>No trades to analyze</div>
      <div style={{fontSize:13,color:"var(--t3)"}}>Log some trades first</div>
    </div>
  );

  const {wins,losses,totalPnl,winRate,avgWin,avgLoss,profitFactor,profitFactorNum,expectancy,avgRR,maxDD,sharpe}=stats;

  const metricGrid=[
    {label:"Win Rate",value:`${winRate}%`,sub:`${wins.length}W · ${losses.length}L`,col:winRate>=50?"var(--green)":"var(--red)"},
    {label:"Profit Factor",value:profitFactor,sub:"gross win/loss",col:profitFactorNum>=1.5||profitFactor==="\u221e"?"var(--green)":profitFactorNum<1?"var(--red)":"var(--amber)"},
    {label:"Expectancy",value:expectancy>=0?`+$${expectancy}`:`-$${Math.abs(expectancy)}`,sub:"avg per trade",col:expectancy>=0?"var(--green)":"var(--red)",hide:true},
    {label:"Avg R:R",value:`${avgRR}R`,sub:`${filtered.length} trades`,col:"var(--blue)"},
    {label:"Avg Win",value:avgWin?`$${Math.round(avgWin)}`:"—",sub:"per winner",col:"var(--green)",hide:true},
    {label:"Avg Loss",value:avgLoss?`$${Math.abs(Math.round(avgLoss))}`:"—",sub:"per loser",col:"var(--red)",hide:true},
    {label:"Max DD",value:`${maxDD}%`,sub:"from peak",col:parseFloat(maxDD)>10?"var(--red)":parseFloat(maxDD)>5?"var(--amber)":"var(--green)"},
    {label:"Sharpe (est.)",value:sharpe,sub:"daily return ratio",col:sharpe!=="—"&&parseFloat(sharpe)>=1?"var(--green)":sharpe!=="—"&&parseFloat(sharpe)<0?"var(--red)":"var(--amber)"},
  ];

  return(
    <div>
      <GoalTracker trades={trades} accountBalance={accountBalance}/>
      <div style={{display:"flex",background:"var(--surface)",borderRadius:"var(--r-md)",padding:4,border:"1px solid var(--line)",marginBottom:16,gap:2}}>
        {[{id:"7d",l:"7D"},{id:"30d",l:"30D"},{id:"90d",l:"90D"},{id:"all",l:"All Time"}].map(p=>(
          <button key={p.id} onClick={()=>setPeriod(p.id)} className="tap" style={{flex:1,padding:"7px 6px",borderRadius:"var(--r-sm)",border:"none",background:period===p.id?"var(--elevated)":"transparent",color:period===p.id?"var(--t1)":"var(--t3)",fontSize:12,fontWeight:700,cursor:"pointer"}}>{p.l}</button>
        ))}
      </div>

      <div className="card" style={{padding:"18px",marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:"var(--t1)"}}>Equity Curve</div>
            <div className="mono" style={{fontSize:12,color:clr(totalPnl),marginTop:2}}>{pnlHidden?PNL_MASK:fmt(totalPnl)}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:10,color:"var(--t3)",fontWeight:600,letterSpacing:".07em",textTransform:"uppercase",marginBottom:2}}>Current Balance</div>
            <div className="mono" style={{fontSize:13,fontWeight:700,color:"var(--t1)"}}>{pnlHidden?PNL_MASK:("$"+(accountBalance+totalPnl).toLocaleString())}</div>
          </div>
        </div>
        <EquityCurveChart data={eqData}/>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"var(--t3)",marginTop:4}}>
          <span className="mono">Start ${accountBalance.toLocaleString()}</span>
          <span className="mono">Now ${(accountBalance+totalPnl).toLocaleString()}</span>
        </div>
      </div>

      <div className="card" style={{padding:"18px",marginBottom:12}}>
        <div className="sec">Key Metrics</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {metricGrid.map((m,i)=>(
            <div key={i} className="elev" style={{padding:"12px 14px",borderRadius:"var(--r-md)"}}>
              <div style={{fontSize:10,color:"var(--t3)",fontWeight:700,letterSpacing:".07em",textTransform:"uppercase",marginBottom:5}}>{m.label}</div>
              <div className="mono" style={{fontSize:18,fontWeight:600,color:m.col,lineHeight:1}}>{pnlHidden&&m.hide?PNL_MASK:m.value}</div>
              <div style={{fontSize:10,color:"var(--t3)",marginTop:4}}>{m.sub}</div>
            </div>
          ))}
        </div>
      </div>

      {monthlyData.length>0&&(
        <div className="card" style={{padding:"18px",marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:700,color:"var(--t1)"}}>Monthly P&L</div>
            <div className="mono" style={{fontSize:12,color:clr(totalPnl)}}>{pnlHidden?PNL_MASK:fmt(totalPnl)}</div>
          </div>
          <MiniBarChart data={monthlyData} height={72}/>
          {monthlyData.length>0&&<div style={{display:"flex",justifyContent:"space-between",paddingTop:10,borderTop:"1px solid var(--line)",marginTop:4}}>
            <div><div style={{fontSize:10,color:"var(--t3)",marginBottom:2}}>Best</div><div className="mono" style={{fontSize:12,fontWeight:600,color:"var(--green)"}}>{pnlHidden?PNL_MASK:fmt(Math.max(...monthlyData.map(d=>d.v)))}</div></div>
            <div style={{textAlign:"right"}}><div style={{fontSize:10,color:"var(--t3)",marginBottom:2}}>Worst</div><div className="mono" style={{fontSize:12,fontWeight:600,color:"var(--red)"}}>{pnlHidden?PNL_MASK:fmt(Math.min(...monthlyData.map(d=>d.v)))}</div></div>
          </div>}
        </div>
      )}

      {dowData.length>0&&(
        <div className="card" style={{padding:"18px",marginBottom:12}}>
          <div style={{fontSize:13,fontWeight:700,color:"var(--t1)",marginBottom:14}}>P&L by Day of Week</div>
          <MiniBarChart data={dowData} height={60}/>
          <div style={{marginTop:10,display:"flex",flexDirection:"column",gap:6}}>
            {[...dowData].sort((a,b)=>b.pnl-a.pnl).slice(0,3).map((d,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{width:6,height:6,borderRadius:"50%",background:i===0?"var(--green)":i===1?"var(--amber)":"var(--red)",flexShrink:0}}/>
                  <span style={{fontSize:12,color:"var(--t2)",fontWeight:500}}>{d.l}</span>
                </div>
                <div style={{display:"flex",gap:12}}>
                  <span style={{fontSize:11,color:"var(--t3)"}}>{d.wr}% · {d.n}T</span>
                  <span className="mono" style={{fontSize:12,fontWeight:500,color:pnlHidden?"var(--t3)":clr(d.pnl),minWidth:60,textAlign:"right"}}>{pnlHidden?PNL_MASK:fmt(d.pnl)}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {sessData.length>0&&(
        <div className="card" style={{padding:"18px",marginBottom:12}}>
          <div style={{fontSize:13,fontWeight:700,color:"var(--t1)",marginBottom:14}}>Session Performance</div>
          {sessData.map((s,i)=>{
            const maxP=Math.max(...sessData.map(x=>Math.abs(x.pnl)),1);
            return(
              <div key={i} style={{marginBottom:i<sessData.length-1?12:0}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span className="pill" style={{background:s.col+"22",color:s.col}}>{s.l}</span>
                    <span style={{fontSize:11,color:"var(--t3)"}}>{s.wr}% · {s.n}T</span>
                  </div>

      )}

      {tagData.length>0&&(

              const col=bad?"var(--red)":good?"var(--green)":"var(--t2)";
              return(
                <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 12px",background:"var(--elevated)",borderRadius:"var(--r-sm)"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span className="pill" style={{background:bad?"var(--red-dim)":good?"var(--green-dim)":"var(--overlay)",color:col}}>{t.l}</span>
                    <span style={{fontSize:11,color:"var(--t3)"}}>{t.n}x · {t.wr}%</span>

                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── Heatmap jam trading ── */}
      {filtered.length>0&&(()=>{
        const HOURS=Array.from({length:14},(_,i)=>i+8); // 08:00 - 21:00
        const WDAYS=["Mon","Tue","Wed","Thu","Fri"];
        const hm={};
        filtered.forEach(t=>{
          if(!t.time)return;
          const hr=parseInt(t.time.split(":")[0]);
          const dow=new Date(t.date+"T12:00:00").getDay();
          if(dow===0||dow===6)return;
          const key=`${dow}-${hr}`;
          if(!hm[key])hm[key]={pnl:0,n:0};
          hm[key].pnl+=t.pnl;hm[key].n++;
        });
        const hasTimes=Object.keys(hm).length>0;
        if(!hasTimes)return null;
        const vals=Object.values(hm).map(v=>Math.abs(v.pnl));
        const maxV=Math.max(...vals,1);
        return(
          <div className="card" style={{padding:"18px",marginBottom:12}}>
            <div style={{fontSize:13,fontWeight:700,color:"var(--t1)",marginBottom:4}}>Trading Heatmap</div>

            <div style={{overflowX:"auto"}}>
              <div style={{minWidth:320}}>
                {/* Hour labels */}
                <div style={{display:"flex",marginLeft:36,marginBottom:3,gap:2}}>
                  {HOURS.map(h=><div key={h} style={{flex:1,textAlign:"center",fontSize:8,color:"var(--t3)",fontFamily:"var(--mono)"}}>{h}</div>)}
                </div>
                {/* Grid rows */}
                {WDAYS.map((day,di)=>{
                  const dow=di+1;
                  return(
                    <div key={day} style={{display:"flex",alignItems:"center",gap:2,marginBottom:2}}>
                      <div style={{width:32,fontSize:9,color:"var(--t3)",fontWeight:600,flexShrink:0}}>{day}</div>
                      {HOURS.map(hr=>{
                        const key=`${dow}-${hr}`;
                        const cell=hm[key];
                        const intensity=cell?Math.min((Math.abs(cell.pnl)/maxV)*0.9+0.1,1):0;
                        const bg=cell?(cell.pnl>=0?`rgba(34,197,94,${intensity})`:`rgba(239,68,68,${intensity})`):"var(--elevated)";
                        return(
                          <div key={hr} title={cell?`${fmt(cell.pnl)} (${cell.n}T)`:"No trades"} style={{flex:1,height:28,borderRadius:4,background:bg,cursor:cell?"pointer":"default",display:"flex",alignItems:"center",justifyContent:"center"}}>
                            {cell&&cell.n>1&&<span style={{fontSize:7,color:"rgba(255,255,255,0.7)",fontWeight:700}}>{cell.n}</span>}
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
                <div style={{display:"flex",alignItems:"center",gap:8,marginTop:10,justifyContent:"flex-end"}}>
                  <span style={{fontSize:9,color:"var(--t3)"}}>Loss</span>
                  {[.8,.5,.2].map(o=><div key={o} style={{width:12,height:12,borderRadius:3,background:`rgba(239,68,68,${o})`}}/>)}
                  <div style={{width:12,height:12,borderRadius:3,background:"var(--elevated)"}}/>
                  {[.2,.5,.8].map(o=><div key={o} style={{width:12,height:12,borderRadius:3,background:`rgba(34,197,94,${o})`}}/>)}
                  <span style={{fontSize:9,color:"var(--t3)"}}>Win</span>
                </div>
              </div>
            </div>
          </div>
        );
      })()}

    </div>
  );
}

/* ── Equity Curve Full Card (Dashboard) ── */
function EquityCurveDashCard({trades,accountBalance}){
  const pnlHidden=useContext(PnlCtx);
  const pts=useMemo(()=>{
    const s=[...trades].sort((a,b)=>a.date.localeCompare(b.date)||(a.time||"").localeCompare(b.time||""));
    let bal=accountBalance;const arr=[{d:"Start",v:bal,pnl:0}];
    s.forEach(t=>{bal+=t.pnl;arr.push({d:t.date.slice(5),v:bal,pnl:t.pnl,id:t.id})});
    return arr;
  },[trades,accountBalance]);
  const[hover,setHover]=useState(null);
  if(pts.length<2)return null;
  const W=600,H=110;
  const vals=pts.map(p=>p.v);
  const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const tx=i=>(i/(pts.length-1))*W;
  const ty=v=>H-(((v-mn)/rng)*(H*0.78)+H*0.11);
  const line=pts.map((p,i)=>`${i===0?"M":"L"}${tx(i).toFixed(1)},${ty(p.v).toFixed(1)}`).join(" ");
  const area=line+` L${W},${H} L0,${H} Z`;
  const up=vals[vals.length-1]>=vals[0];
  const sc=up?"var(--green)":"var(--red)",hex=up?"#22C55E":"#EF4444";
  const totalPnl=vals[vals.length-1]-vals[0];
  // Drawdown from peak
  let peak=vals[0],maxDd=0;vals.forEach(v=>{if(v>peak)peak=v;const dd=(peak-v)/peak*100;if(dd>maxDd)maxDd=dd;});
  const hpt=hover!==null?pts[hover]:null;

  return(
    <div className="card" style={{padding:"16px 18px",marginBottom:14,overflow:"hidden"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
        <div>
          <div style={{fontSize:13,fontWeight:700,color:"var(--t1)",marginBottom:4}}>Equity Curve</div>
          <div style={{display:"flex",gap:14,alignItems:"center"}}>
            <span className="mono" style={{fontSize:16,fontWeight:700,color:pnlHidden?"var(--t3)":clr(totalPnl)}}>{pnlHidden?PNL_MASK:fmt(totalPnl)}</span>
            {maxDd>0&&<span style={{fontSize:10,color:"var(--t3)",background:"var(--red-dim)",padding:"2px 7px",borderRadius:99}}>Max DD {maxDd.toFixed(1)}%</span>}
          </div>
        </div>
        {hpt&&(
          <div style={{textAlign:"right",animation:"fadeUp .1s ease forwards"}}>
            <div style={{fontSize:11,color:"var(--t3)"}}>{hpt.d}</div>
            <div className="mono" style={{fontSize:13,fontWeight:700,color:"var(--t1)"}}>{pnlHidden?PNL_MASK:("$"+hpt.v.toLocaleString())}</div>
            {hpt.pnl!==0&&<div className="mono" style={{fontSize:11,color:clr(hpt.pnl)}}>{pnlHidden?PNL_MASK:fmt(hpt.pnl)}</div>}
          </div>
        )}
      </div>
      <div style={{position:"relative",userSelect:"none"}}>
        <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",display:"block",overflow:"visible"}}
          onMouseMove={e=>{const r=e.currentTarget.getBoundingClientRect();const x=(e.clientX-r.left)/r.width*W;const idx=Math.round(x/(W/(pts.length-1)));setHover(Math.max(0,Math.min(idx,pts.length-1)))}}
          onMouseLeave={()=>setHover(null)}>
          <defs>
            <linearGradient id="ecfg" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={hex} stopOpacity=".22"/>
              <stop offset="100%" stopColor={hex} stopOpacity="0"/>
            </linearGradient>
          </defs>
          <path d={area} fill="url(#ecfg)"/>
          <path d={line} fill="none" stroke={sc} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
          {/* Start/end dots */}
          <circle cx={tx(0)} cy={ty(pts[0].v)} r="3" fill="var(--t3)" stroke="var(--surface)" strokeWidth="1.5"/>
          <circle cx={tx(pts.length-1)} cy={ty(pts[pts.length-1].v)} r="4" fill={sc} stroke="var(--surface)" strokeWidth="1.5"/>
          {/* Hover crosshair */}
          {hover!==null&&<>
            <line x1={tx(hover)} y1="0" x2={tx(hover)} y2={H} stroke="var(--line-md)" strokeWidth="1" strokeDasharray="3,3"/>
            <circle cx={tx(hover)} cy={ty(pts[hover].v)} r="4" fill={pts[hover].pnl>=0?"var(--green)":"var(--red)"} stroke="var(--surface)" strokeWidth="1.5"/>
          </>}
        </svg>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
        <span className="mono" style={{fontSize:9,color:"var(--t3)"}}>Start ${accountBalance.toLocaleString()}</span>
        <span style={{fontSize:9,color:"var(--t3)"}}>{trades.length} trades</span>
        <span className="mono" style={{fontSize:9,color:"var(--t3)"}}>${(accountBalance+totalPnl).toLocaleString()}</span>
      </div>
    </div>
  );
}

/* ── Daily Kill Switch ── */
function DailyKillSwitch({trades,accountBalance,drawdownLimit}){
  const pnlHidden=useContext(PnlCtx);
  const[dismissed,setDismissed]=useState(()=>{
    try{const d=localStorage.getItem("nq-kill-dismissed");return d===today()}catch{return false}
  });
  const todayKey=today();
  const todayTrades=useMemo(()=>trades.filter(t=>t.date===todayKey),[trades,todayKey]);
  const todayPnl=todayTrades.reduce((a,t)=>a+t.pnl,0);
  // daily loss limit — use 2% of balance by default, or configured DD limit if smaller
  const bal=accountBalance;
  const dailyLimit=drawdownLimit>0?Math.min(drawdownLimit*0.5,bal*0.02):bal*0.02;
  const isBreached=todayPnl<0&&Math.abs(todayPnl)>=dailyLimit;
  const isCaution=todayPnl<0&&Math.abs(todayPnl)>=dailyLimit*0.6&&!isBreached;

  if(dismissed||todayTrades.length===0)return null;
  if(!isBreached&&!isCaution)return null;

  const handleDismiss=()=>{
    setDismissed(true);
    try{localStorage.setItem("nq-kill-dismissed",today())}catch{}
  };

  if(isBreached)return(
    <div style={{position:"fixed",inset:0,zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:20,background:"rgba(0,0,0,.85)",backdropFilter:"blur(12px)"}}>
      <div style={{width:"100%",maxWidth:420,background:"var(--surface)",borderRadius:"var(--r-xl)",border:"2px solid var(--red)",overflow:"hidden"}}>
        <div style={{background:"var(--red)",padding:"24px 24px 20px",textAlign:"center"}}>
          <div style={{fontSize:48,marginBottom:8}}>🛑</div>
          <div style={{fontSize:22,fontWeight:900,color:"#fff",letterSpacing:"-.5px"}}>STOP TRADING</div>
          <div style={{fontSize:13,color:"rgba(255,255,255,.8)",marginTop:4}}>Daily loss limit reached</div>
        </div>
        <div style={{padding:"20px 24px 28px",textAlign:"center"}}>
          <div className="mono" style={{fontSize:32,fontWeight:700,color:"var(--red)",marginBottom:6}}>{pnlHidden?PNL_MASK:fmt(todayPnl)}</div>
          <div style={{fontSize:13,color:"var(--t2)",marginBottom:6}}>Today's P&L — limit is {pnlHidden?PNL_MASK:("−$"+Math.round(dailyLimit))}</div>
          <div style={{fontSize:12,color:"var(--t3)",marginBottom:24,lineHeight:1.7}}>You've hit your daily max loss. Step away, review your trades, and come back tomorrow with a clear head.</div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={handleDismiss} style={{flex:1,padding:"12px",background:"var(--elevated)",border:"1px solid var(--line)",borderRadius:"var(--r-md)",color:"var(--t2)",fontSize:13,fontWeight:600,cursor:"pointer"}}>I understand, close</button>
          </div>
        </div>
      </div>
    </div>
  );

  return(
    <div style={{background:"var(--amber-dim)",border:"1px solid var(--amber)44",borderRadius:"var(--r-md)",padding:"12px 14px",marginBottom:12,display:"flex",gap:10,alignItems:"flex-start"}}>
      <span style={{fontSize:20,flexShrink:0}}>⚠️</span>
      <div style={{flex:1}}>
        <div style={{fontSize:12,fontWeight:700,color:"var(--amber)",marginBottom:2}}>Daily loss caution — {pnlHidden?PNL_MASK:fmt(todayPnl)} today</div>
        <div style={{fontSize:11,color:"var(--t2)"}}>Approaching daily limit of {pnlHidden?PNL_MASK:("−$"+Math.round(dailyLimit))}. Consider pausing and reviewing your setups.</div>
      </div>
      <button onClick={handleDismiss} style={{background:"none",border:"none",cursor:"pointer",color:"var(--t3)",fontSize:16,padding:2,lineHeight:1,flexShrink:0}}>✕</button>
    </div>
  );
}
