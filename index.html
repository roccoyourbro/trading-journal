<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo, createContext, useContext } = React;

const BreakpointCtx = createContext({ isDesktop: false, isTablet: false });
function useBreakpoint() { return useContext(BreakpointCtx); }

// ── Debounced window width — fixes lag on resize ─────────────────────────────
function useWindowWidth() {
  const [w, setW] = useState(typeof window !== "undefined" ? window.innerWidth : 375);
  useEffect(() => {
    let timer;
    const h = () => { clearTimeout(timer); timer = setTimeout(() => setW(window.innerWidth), 150); };
    window.addEventListener("resize", h, { passive: true });
    return () => { window.removeEventListener("resize", h); clearTimeout(timer); };
  }, []);
  return w;
}

// ── Supabase ─────────────────────────────────────────────────────────────────
const SUPABASE_URL = "https://ravlncpwpxdzwagojblh.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJhdmxuY3B3cHhkendhZ29qYmxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MTU3MDIsImV4cCI6MjA5MzM5MTcwMn0.n68uMBfS8iSC3ViYzkMKvZFKJrGfafyGtiIL8v82h2w";
const SB_HEADERS = { "Content-Type": "application/json", "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` };

async function sbGet(key) {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/journal_data?key=eq.${encodeURIComponent(key)}&select=value`, { headers: SB_HEADERS });
    if (!res.ok) return null;
    const rows = await res.json();
    return rows.length > 0 ? JSON.parse(rows[0].value) : null;
  } catch { return null; }
}
async function sbSet(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/journal_data`, {
      method: "POST",
      headers: { ...SB_HEADERS, "Prefer": "resolution=merge-duplicates" },
      body: JSON.stringify({ key, value: JSON.stringify(value) })
    });
  } catch {}
}
async function loadData(key, fallback) {
  try { const cloud = await sbGet(key); if (cloud !== null) return cloud; } catch {}
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
}
// Debounced save — avoids spamming Supabase on every keystroke
const _saveTimers = {};
function saveData(key, data) {
  try { localStorage.setItem(key, JSON.stringify(data)); } catch {}
  clearTimeout(_saveTimers[key]);
  _saveTimers[key] = setTimeout(() => sbSet(key, data), 600);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
const fmt    = (n) => { const a = Math.abs(n).toLocaleString("en-US",{maximumFractionDigits:0}); return (n>=0?"+":"−")+"$"+a; };
const fmtPct = (n) => (n>=0?"+":"")+n.toFixed(1)+"%";
const clr    = (n) => n>0?"var(--green)":n<0?"var(--red)":"var(--text-muted)";
const clrBg  = (n) => n>0?"var(--green-light)":n<0?"var(--red-light)":"var(--bg)";
const fmtBal = (n) => "$"+Number(n).toLocaleString("en-US",{maximumFractionDigits:2});
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function fmtNoteDate(iso) {
  const d = new Date(iso), now = new Date();
  const diffDays = Math.floor((now - d) / 86400000);
  if (diffDays === 0) return d.toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" });
  if (diffDays === 1) return "Yesterday";
  if (diffDays < 7)  return DAYS[d.getDay()];
  return `${d.getDate()} ${MONTHS[d.getMonth()]}`;
}
function getCalendarDays(year, month) {
  const first = new Date(year, month, 1).getDay();
  const total = new Date(year, month+1, 0).getDate();
  const cells = [];
  for (let i=0;i<first;i++) cells.push(null);
  for (let d=1;d<=total;d++) cells.push(d);
  return cells;
}
function newAccountId() { return "acc_" + Date.now() + "_" + Math.random().toString(36).slice(2,7); }

// ── Toast ─────────────────────────────────────────────────────────────────────
const ToastCtx = createContext(null);
function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const show = useCallback((msg, type="success") => {
    const id = Date.now();
    setToasts(p => [...p, { id, msg, type }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 2400);
  }, []);
  return (
    <ToastCtx.Provider value={show}>
      {children}
      <div style={{ position:"fixed", bottom:100, left:"50%", transform:"translateX(-50%)", zIndex:500, display:"flex", flexDirection:"column", gap:6, alignItems:"center", pointerEvents:"none" }}>
        {toasts.map(t => (
          <div key={t.id} className="toast" style={{
            background: t.type==="error" ? "var(--red)" : t.type==="warn" ? "var(--yellow)" : "var(--green)",
            color:"#fff", padding:"10px 20px", borderRadius:30, fontSize:13, fontWeight:700,
            boxShadow:"0 4px 20px rgba(0,0,0,0.25)", whiteSpace:"nowrap"
          }}>{t.msg}</div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
}
function useToast() { return useContext(ToastCtx); }

// ── TradeRow (memoized) ───────────────────────────────────────────────────────
const TradeRow = React.memo(function TradeRow({ trade, onPress }) {

  return (
    <div onClick={onPress} className="ripple" style={{ display:"flex", alignItems:"flex-start", gap:12, background:"var(--white)", borderRadius:16, padding:"14px 16px", marginBottom:10, cursor:"pointer", boxShadow:"var(--shadow)", border:"1px solid var(--border)" }}>

// ── Image Compressor ──────────────────────────────────────────────────────────
function compressImage(dataUrl, maxPx = 1280, quality = 0.80) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      let { width: w, height: h } = img;
      if (w > maxPx || h > maxPx) {
        if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
        else       { w = Math.round(w * maxPx / h); h = maxPx; }
      }
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL("image/jpeg", quality));
    };
    img.src = dataUrl;
  });
}

function TradeModal({ trade, onSave, onDelete, onClose }) {

    date: trade.date || todayStr(),
    pnl:  trade.pnl !== undefined ? String(trade.pnl) : "",
    rr:   trade.rr  !== undefined ? String(trade.rr)  : "",
    strategy:   trade.strategy   || STRATEGIES[0],
    session:    trade.session    || "",
    instrument: trade.instrument || "MNQ",
    contracts:  trade.contracts  !== undefined ? String(trade.contracts) : "1",
    tags:       trade.tags       || [],
    notes:      trade.notes      || "",
    images:     trade.images     || [],
  });
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  useEffect(() => {
    const handlePaste = (e) => {
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const item of Array.from(items)) {
        if (item.type.startsWith("image/")) {
          const file = item.getAsFile();
          if (!file) continue;
          const reader = new FileReader();
          reader.onload = async (ev) => {
            const compressed = await compressImage(ev.target.result);
            setForm(f => ({ ...f, images: [...f.images, compressed] }));
          };
          reader.readAsDataURL(file);
        }
      }
    };
    window.addEventListener("paste", handlePaste);
    return () => window.removeEventListener("paste", handlePaste);
  }, []);

  const handleFileInput = (e) => {
    Array.from(e.target.files || []).forEach(file => {
      if (!file.type.startsWith("image/")) return;
      const reader = new FileReader();
      reader.onload = async (ev) => {
        const compressed = await compressImage(ev.target.result);
        setForm(f => ({ ...f, images: [...f.images, compressed] }));

      reader.readAsDataURL(file);

  const [dragOver, setDragOver] = useState(false);

    e.preventDefault(); setDragOver(false);

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.5)", display:"flex", alignItems:"flex-end", justifyContent:"center", zIndex:300, backdropFilter:"blur(4px)" }} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{ width:"100%", maxWidth:480, margin:"0 auto", background:"var(--white)", borderRadius:"24px 24px 0 0", padding:"20px 20px 48px", maxHeight:"85vh", overflowY:"auto" }}>
        <div style={{ width:40, height:4, background:"var(--border)", borderRadius:2, margin:"0 auto 20px" }}/>
        {mode==="list" && <>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
            <div style={{ fontSize:18, fontWeight:800, color:"var(--text-primary)" }}>Trading Accounts</div>
            <button onClick={openAdd} style={{ background:"var(--green)", border:"none", borderRadius:10, color:"#fff", fontSize:13, fontWeight:700, padding:"8px 14px", cursor:"pointer" }}>+ Add Account</button>
          </div>
          {accounts.map(acc => (
            <div key={acc.id} style={{ display:"flex", alignItems:"center", gap:12, background: acc.id===activeId?"var(--green-light)":"var(--bg)", border:`1.5px solid ${acc.id===activeId?"var(--green)":"var(--border)"}`, borderRadius:16, padding:"14px 16px", marginBottom:10, cursor:"pointer" }} onClick={()=>{ onSwitch(acc.id); onClose(); }}>
              <div style={{ width:40, height:40, borderRadius:"50%", background:acc.color, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, boxShadow:"0 2px 8px rgba(0,0,0,0.15)" }}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
              </div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                  <span style={{ fontSize:15, fontWeight:800, color:"var(--text-primary)" }}>{acc.name}</span>
                  {acc.id===activeId && <span style={{ fontSize:10, background:"var(--green)", color:"#fff", borderRadius:20, padding:"2px 8px", fontWeight:700 }}>ACTIVE</span>}
                </div>
                <div style={{ fontSize:12, color:"var(--text-muted)", marginTop:2 }}>Balance: {fmtBal(acc.balance||DEFAULT_BALANCE)}</div>
              </div>
              <button onClick={e=>{ e.stopPropagation(); openEdit(acc); }} style={{ background:"none", border:"1px solid var(--border)", borderRadius:8, padding:"6px 10px", cursor:"pointer", color:"var(--text-muted)", fontSize:12, fontWeight:600 }}>Edit</button>
              {accounts.length > 1 && (
                confirmDelete===acc.id
                  ? <div style={{ display:"flex", gap:4 }} onClick={e=>e.stopPropagation()}>
                      <button onClick={()=>setConfirmDelete(null)} style={{ background:"var(--bg)", border:"none", borderRadius:8, padding:"6px 8px", cursor:"pointer", fontSize:11, color:"var(--text-muted)", fontWeight:600 }}>No</button>
                      <button onClick={()=>{ onDelete(acc.id); setConfirmDelete(null); toast("Account deleted","error"); }} style={{ background:"var(--red)", border:"none", borderRadius:8, padding:"6px 8px", cursor:"pointer", fontSize:11, color:"#fff", fontWeight:700 }}>Delete</button>
                    </div>
                  : <button onClick={e=>{ e.stopPropagation(); setConfirmDelete(acc.id); }} style={{ background:"var(--red-light)", border:"none", borderRadius:8, padding:"6px 8px", cursor:"pointer" }}>
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--red)" strokeWidth="2" strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    </button>
              )}
            </div>
          ))}
        </>}
        {(mode==="add"||mode==="edit") && <>
          <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:20 }}>
            <button onClick={()=>setMode("list")} style={{ background:"none", border:"none", cursor:"pointer", color:"var(--green)", fontSize:22, fontWeight:700, padding:0, lineHeight:1 }}>‹</button>
            <div style={{ fontSize:18, fontWeight:800, color:"var(--text-primary)" }}>{mode==="add"?"New Account":"Edit Account"}</div>
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
            <div><label style={lbl}>Account Nickname</label><input type="text" placeholder="e.g. FTMO Main, Apex Eval" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} style={inp} autoFocus/></div>
            <div><label style={lbl}>Starting Balance ($)</label><input type="number" placeholder={`e.g. ${DEFAULT_BALANCE}`} value={form.balance} onChange={e=>setForm(f=>({...f,balance:e.target.value}))} style={inp}/></div>
            <div>
              <label style={lbl}>Account Color</label>
              <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
                {ACC_COLORS.map(c=>(
                  <button key={c} onClick={()=>setForm(f=>({...f,color:c}))} style={{ width:36, height:36, borderRadius:"50%", background:c, border: form.color===c?"3px solid var(--text-primary)":"3px solid transparent", cursor:"pointer", flexShrink:0, outline:"none", boxShadow: form.color===c?"0 0 0 2px var(--white), 0 0 0 4px "+c:"none" }}/>
                ))}
              </div>
            </div>
          </div>
          <div style={{ display:"flex", gap:10, marginTop:24 }}>
            <button onClick={()=>setMode("list")} style={{ flex:1, padding:"14px", background:"var(--bg)", border:"none", borderRadius:14, color:"var(--text-secondary)", fontSize:15, fontWeight:700, cursor:"pointer" }}>Cancel</button>
            <button onClick={handleSave} style={{ flex:2, padding:"14px", background:form.color||"var(--green)", border:"none", borderRadius:14, color:"#fff", fontSize:15, fontWeight:800, cursor:"pointer" }}>{mode==="add"?"Create Account":"Save Changes"}</button>
          </div>
        </>}
      </div>
    </div>
  );
}

// ── Data Backup Modal ─────────────────────────────────────────────────────────
function DataModal({ trades, notes, account, onImport, onClearAll, onClose }) {
  const fileRef = useRef(null);
  const [status, setStatus] = useState(null);
  const [confirmClear, setConfirmClear] = useState(false);
  const toast = useToast();

  const handleExport = () => {
    try {
      const wb = XLSX.utils.book_new();
      const tradeRows = trades.length
        ? trades.map(t => ({ Date:t.date, PnL_USD:t.pnl, RR:t.rr, Instrument:t.instrument||"", Contracts:t.contracts||1, Strategy:t.strategy, Session:t.session||"", Tags:(t.tags||[]).join(";"), Notes:t.notes||"", _id:t.id }))
        : [{ Date:"", PnL_USD:"", RR:"", Instrument:"", Contracts:"", Strategy:"", Session:"", Tags:"", Notes:"", _id:"" }];
      const ws1 = XLSX.utils.json_to_sheet(tradeRows);
      ws1["!cols"] = [{wch:12},{wch:10},{wch:6},{wch:10},{wch:10},{wch:16},{wch:10},{wch:30},{wch:40},{wch:16}];
      XLSX.utils.book_append_sheet(wb, ws1, "Trades");
      const noteRows = notes.length ? notes.map(n=>({Title:n.title,Body:n.body||"",UpdatedAt:n.updatedAt,_id:n.id})) : [{Title:"",Body:"",UpdatedAt:"",_id:""}];
      const ws2 = XLSX.utils.json_to_sheet(noteRows);
      XLSX.utils.book_append_sheet(wb, ws2, "Notes");
      const ws3 = XLSX.utils.json_to_sheet([{AccountName:account?.name||"",AccountBalance:account?.balance||DEFAULT_BALANCE,ExportedAt:new Date().toISOString()}]);
      XLSX.utils.book_append_sheet(wb, ws3, "Settings");
      XLSX.writeFile(wb, `trading-journal-${account?.name?.replace(/\s+/g,"-")||"account"}-${todayStr()}.xlsx`);
      toast(`Exported ${trades.length} trades ✓`);
      setStatus({ ok:true, msg:`✓ Exported ${trades.length} trades, ${notes.length} notes` });
    } catch(e) { setStatus({ ok:false, msg:"Export failed: "+e.message }); }
  };

  const handleFileChange = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setStatus(null);
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const wb = XLSX.read(new Uint8Array(ev.target.result), { type:"array" });
        let importedTrades = null, importedNotes = null, importedBalance = null;
        if (wb.SheetNames.includes("Trades")) {
          const rows = XLSX.utils.sheet_to_json(wb.Sheets["Trades"]);
          importedTrades = rows.filter(r=>r.Date).map(r=>({ id:r._id||Date.now()+Math.random(), date:String(r.Date), pnl:parseFloat(r.PnL_USD)||0, rr:parseFloat(r.RR)||0, strategy:r.Strategy||"Other", session:r.Session||"", instrument:r.Instrument||"MNQ", contracts:parseInt(r.Contracts)||1, tags:r.Tags?r.Tags.split(";").filter(Boolean):[], notes:r.Notes||"" }));
        }
        if (wb.SheetNames.includes("Notes")) {
          const rows = XLSX.utils.sheet_to_json(wb.Sheets["Notes"]);
          importedNotes = rows.filter(r=>r.Title).map(r=>({ id:r._id||Date.now()+Math.random(), title:r.Title||"Untitled", body:r.Body||"", updatedAt:r.UpdatedAt||new Date().toISOString() }));
        }
        if (wb.SheetNames.includes("Settings")) {
          const rows = XLSX.utils.sheet_to_json(wb.Sheets["Settings"]);
          if (rows.length>0&&rows[0].AccountBalance!=null) importedBalance = parseFloat(rows[0].AccountBalance);
        }
        if (!importedTrades&&!importedNotes&&importedBalance==null) { setStatus({ok:false,msg:"File not recognized."}); return; }
        onImport({ trades:importedTrades, notes:importedNotes, balance:importedBalance });
        const msg = `✓ Imported ${importedTrades?.length||0} trades`;
        setStatus({ ok:true, msg });
        toast(msg);
      } catch(err) { setStatus({ ok:false, msg:"Failed: "+err.message }); }
    };
    reader.readAsArrayBuffer(file);
    e.target.value = "";
  };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.5)", display:"flex", alignItems:"flex-end", zIndex:200, backdropFilter:"blur(4px)" }} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{ width:"100%", maxWidth:480, margin:"0 auto", background:"var(--white)", borderRadius:"24px 24px 0 0", padding:"20px 20px 48px", maxHeight:"85vh", overflowY:"auto" }}>
        <div style={{ width:40, height:4, background:"var(--border)", borderRadius:2, margin:"0 auto 20px" }} />
        <div style={{ fontSize:18, fontWeight:800, color:"var(--text-primary)", marginBottom:4 }}>Backup & Sync</div>
        <div style={{ fontSize:13, color:"var(--text-muted)", marginBottom:24 }}>Exporting from: <span style={{ fontWeight:700, color:"var(--text-primary)" }}>{account?.name}</span></div>
        <div style={{ fontSize:12, color:"var(--text-secondary)", fontWeight:700, letterSpacing:0.5, textTransform:"uppercase", marginBottom:10 }}>Export</div>
        <button onClick={handleExport} style={{ width:"100%", padding:"15px 16px", background:"var(--green)", border:"none", borderRadius:14, color:"#fff", fontSize:14, fontWeight:800, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:10, marginBottom:8 }}>Download Excel (.xlsx)</button>
        <button onClick={()=>{ onClose(); setTimeout(()=>window.print(), 200); }} style={{ width:"100%", padding:"15px 16px", background:"var(--bg)", border:"1.5px solid var(--border)", borderRadius:14, color:"var(--text-secondary)", fontSize:14, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:10, marginBottom:6 }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Print / Save as PDF
        </button>
        <div style={{ fontSize:12, color:"var(--text-muted)", marginBottom:20 }}>{trades.length} trades · {notes.length} notes</div>
        <div style={{ fontSize:12, color:"var(--text-secondary)", fontWeight:700, letterSpacing:0.5, textTransform:"uppercase", marginBottom:10 }}>Import</div>
        <input ref={fileRef} type="file" accept=".xlsx,.xls" onChange={handleFileChange} style={{ display:"none" }}/>
        <button onClick={()=>fileRef.current?.click()} style={{ width:"100%", padding:"15px 16px", background:"var(--bg)", border:"2px dashed var(--border)", borderRadius:14, color:"var(--text-secondary)", fontSize:14, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:10, marginBottom:6 }}>Select .xlsx file</button>
        <div style={{ fontSize:12, color:"var(--red)", marginBottom:20, fontWeight:600 }}>⚠ Import replaces trades for this account</div>
        {status && <div style={{ padding:"12px 14px", borderRadius:12, background:status.ok?"var(--green-light)":"var(--red-light)", border:`1px solid ${status.ok?"var(--green)":"var(--red)"}33`, fontSize:13, color:status.ok?"var(--green)":"var(--red)", fontWeight:700, marginBottom:16 }}>{status.msg}</div>}
        <div style={{ borderTop:"1px solid var(--border)", paddingTop:16 }}>
          <div style={{ fontSize:12, color:"var(--text-muted)", fontWeight:700, letterSpacing:0.5, textTransform:"uppercase", marginBottom:10 }}>⚠ Danger Zone</div>
          {!confirmClear
            ? <button onClick={()=>setConfirmClear(true)} style={{ width:"100%", padding:"14px", background:"var(--red-light)", border:"none", borderRadius:14, color:"var(--red)", fontSize:14, fontWeight:700, cursor:"pointer" }}>Clear This Account's Data</button>
            : <div>
                <div style={{ fontSize:13, color:"var(--red)", fontWeight:700, marginBottom:10, textAlign:"center" }}>Delete all trades for "{account?.name}"?</div>
                <div style={{ display:"flex", gap:8 }}>
                  <button onClick={()=>setConfirmClear(false)} style={{ flex:1, padding:"12px", background:"var(--bg)", border:"none", borderRadius:12, color:"var(--text-secondary)", fontSize:13, fontWeight:700, cursor:"pointer" }}>Cancel</button>
                  <button onClick={()=>{ onClearAll(); setConfirmClear(false); onClose(); toast("All data cleared","error"); }} style={{ flex:1, padding:"12px", background:"var(--red)", border:"none", borderRadius:12, color:"#fff", fontSize:13, fontWeight:800, cursor:"pointer" }}>Yes, Delete</button>
                </div>
              </div>
          }
        </div>
      </div>
    </div>
  );
}

// ── Calendar View ─────────────────────────────────────────────────────────────
function CalendarView({ trades }) {
  const now = new Date();
  const [year, setYear] = useState(now.getFullYear());
  const [month, setMonth] = useState(now.getMonth());
  const [chartMode, setChartMode] = useState("month");

  const dayMap = useMemo(() => {
    const m = {};
    trades.forEach(t => { m[t.date] = (m[t.date]||0) + t.pnl; });
    return m;
  }, [trades]);

  const cells = useMemo(() => getCalendarDays(year, month), [year, month]);
  const prev = () => { if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1); };
  const next = () => { if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1); };

  const monthPrefix = `${year}-${String(month+1).padStart(2,"0")}`;
  const monthPnl  = useMemo(() => Object.entries(dayMap).filter(([k])=>k.startsWith(monthPrefix)).reduce((a,[,v])=>a+v,0), [dayMap, monthPrefix]);
  const monthWins = useMemo(() => Object.entries(dayMap).filter(([k,v])=>k.startsWith(monthPrefix)&&v>0).length, [dayMap, monthPrefix]);
  const monthDays = useMemo(() => Object.entries(dayMap).filter(([k])=>k.startsWith(monthPrefix)).length, [dayMap, monthPrefix]);

  const chartData = useMemo(() => {
    if (chartMode === "day") {
      return Object.entries(dayMap).filter(([k])=>k.startsWith(monthPrefix)).sort(([a],[b])=>a.localeCompare(b)).map(([k,v])=>({ label:k.slice(8), value:v }));
    }
    if (chartMode === "month") {
      return Array.from({length:12}, (_,i) => {
        const pfx = `${year}-${String(i+1).padStart(2,"0")}`;
        const val = Object.entries(dayMap).filter(([k])=>k.startsWith(pfx)).reduce((a,[,v])=>a+v,0);
        return { label:MONTHS[i], value:val };
      });
    }
    const yearMap = {};
    Object.entries(dayMap).forEach(([k,v]) => { const y=k.slice(0,4); yearMap[y]=(yearMap[y]||0)+v; });
    return Object.entries(yearMap).sort(([a],[b])=>a.localeCompare(b)).map(([k,v])=>({ label:k, value:v }));
  }, [chartMode, year, month, dayMap]);

  function PerformanceChart({ data }) {
    const { isDesktop } = useBreakpoint();
    if (!data.length) return <div style={{ textAlign:"center", padding:"48px 0", color:"var(--text-muted)", fontSize:14, fontWeight:600 }}>No data for this period</div>;
    const W=600, H=isDesktop?240:300;
    const PAD_L=54, PAD_B=isDesktop?36:42, PAD_T=isDesktop?18:20, PAD_R=10;
    const innerW=W-PAD_L-PAD_R, innerH=H-PAD_B-PAD_T;
    const vals=data.map(d=>d.value);
    const totalPnl=vals.reduce((a,b)=>a+b,0);
    const minV=Math.min(...vals), maxV=Math.max(...vals);
    const pad=Math.max((maxV-minV)*0.15,1);
    const lo=minV-pad, hi=maxV+pad, rangeV=hi-lo||1;
    const toY=v=>PAD_T+innerH*(1-(v-lo)/rangeV);
    const toX=i=>PAD_L+(data.length===1?innerW/2:(innerW/(data.length-1))*i);
    const showZero=lo<0&&hi>0;
    const axisVals=[lo,lo+rangeV*0.25,lo+rangeV*0.5,lo+rangeV*0.75,hi];
    const fmtAxis=v=>{ const a=Math.abs(v),s=v>=0?"+":"−"; if(a>=1000)return s+"$"+(a>=10000?Math.round(a/1000)+"k":(a/1000).toFixed(1)+"k"); return s+"$"+Math.round(a); };
    const points=data.map((_,i)=>`${toX(i)},${toY(vals[i])}`).join(" ");
    const areaPath=data.length>1?`M${toX(0)},${toY(vals[0])} `+data.slice(1).map((_,i)=>`L${toX(i+1)},${toY(vals[i+1])}`).join(" ")+` L${toX(data.length-1)},${H-PAD_B} L${toX(0)},${H-PAD_B} Z`:"";
    const lineColor=totalPnl>=0?"var(--green)":"var(--red)";
    const lineColorHex=totalPnl>=0?"#00AA13":"#E02020";
    const dotR=data.length>24?2:data.length>12?3.5:isDesktop?5:6;
    const fontSize=isDesktop?9:11;
    return (
      <div style={{ margin:isDesktop?0:"0 -20px" }}>
        <svg viewBox={`0 0 ${W} ${H}`} style={{ width:"100%", display:"block" }}>
          <defs>
            <linearGradient id="lineAreaGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={lineColorHex} stopOpacity="0.25"/>
              <stop offset="100%" stopColor={lineColorHex} stopOpacity="0.02"/>
            </linearGradient>
          </defs>
          {axisVals.map((v,i)=>{const y=toY(v);return(<g key={i}><line x1={PAD_L} y1={y} x2={W-PAD_R} y2={y} stroke="var(--border)" strokeWidth={0.8} strokeDasharray="4,4"/><text x={PAD_L-6} y={y+4} textAnchor="end" fontSize={fontSize} fill="var(--text-muted)" fontFamily="'Plus Jakarta Sans',sans-serif" fontWeight="700">{fmtAxis(v)}</text></g>);})}
          {showZero&&<line x1={PAD_L} y1={toY(0)} x2={W-PAD_R} y2={toY(0)} stroke="var(--text-muted)" strokeWidth={1.5}/>}
          {areaPath&&<path d={areaPath} fill="url(#lineAreaGrad)"/>}
          <polyline points={points} fill="none" stroke={lineColor} strokeWidth={isDesktop?2.5:3} strokeLinejoin="round" strokeLinecap="round"/>
          {data.map((_,i)=><circle key={i} cx={toX(i)} cy={toY(vals[i])} r={dotR} fill={lineColor} stroke="var(--white)" strokeWidth={2}/>)}
          {data.map((d,i)=>{if(data.length>18&&i%Math.ceil(data.length/10)!==0)return null;return(<text key={i} x={toX(i)} y={H-PAD_B+(isDesktop?16:18)} textAnchor="middle" fontSize={data.length>10?fontSize:fontSize+2} fill="var(--text-muted)" fontFamily="'Plus Jakarta Sans',sans-serif" fontWeight="700">{d.label}</text>);})}
        </svg>
        <div style={{ display:"flex", justifyContent:"space-between", margin:isDesktop?"16px 0 0":"16px 20px 0", padding:"16px 0 0", borderTop:"1px solid var(--border)" }}>
          <div><div style={{ fontSize:11, color:"var(--text-muted)", fontWeight:600, marginBottom:4 }}>Total P&L</div><div style={{ fontSize:isDesktop?18:20, fontWeight:800, color:clr(totalPnl) }}>{fmt(totalPnl)}</div></div>
          <div style={{ textAlign:"center" }}><div style={{ fontSize:11, color:"var(--text-muted)", fontWeight:600, marginBottom:4 }}>Best</div><div style={{ fontSize:isDesktop?18:20, fontWeight:800, color:"var(--green)" }}>{fmt(Math.max(...vals))}</div></div>
          <div style={{ textAlign:"right" }}><div style={{ fontSize:11, color:"var(--text-muted)", fontWeight:600, marginBottom:4 }}>Worst</div><div style={{ fontSize:isDesktop?18:20, fontWeight:800, color:"var(--red)" }}>{fmt(Math.min(...vals))}</div></div>
        </div>
      </div>
    );
  }

  return (
    <>
      <div style={{ background:"var(--white)", borderRadius:20, padding:"16px", boxShadow:"var(--shadow)", marginBottom:12 }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
          <button onClick={prev} style={{ background:"var(--bg)", border:"none", color:"var(--text-secondary)", fontSize:18, cursor:"pointer", padding:"8px 14px", borderRadius:10, fontWeight:800 }}>‹</button>
          <div style={{ textAlign:"center" }}>
            <div style={{ fontSize:16, fontWeight:800, color:"var(--text-primary)" }}>{MONTHS[month]} {year}</div>
            <div style={{ fontSize:13, color:clr(monthPnl), fontWeight:700 }}>{fmt(monthPnl)}</div>
            {monthDays > 0 && <div style={{ fontSize:11, color:"var(--text-muted)", fontWeight:600 }}>{monthWins}W / {monthDays-monthWins}L · {monthDays} days</div>}
          </div>
          <button onClick={next} style={{ background:"var(--bg)", border:"none", color:"var(--text-secondary)", fontSize:18, cursor:"pointer", padding:"8px 14px", borderRadius:10, fontWeight:800 }}>›</button>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:4, marginBottom:4 }}>
          {DAYS.map(d=><div key={d} style={{ textAlign:"center", fontSize:10, color:"var(--text-muted)", fontWeight:700, padding:"4px 0" }}>{d}</div>)}
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:4 }}>
          {cells.map((day,i)=>{
            if(!day) return <div key={`e${i}`}/>;
            const key=`${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
            const pnl=dayMap[key];
            const isToday=key===todayStr();
            return (
              <div key={key} style={{ borderRadius:10, padding:"6px 2px", textAlign:"center", background:pnl!==undefined?clrBg(pnl):isToday?"var(--green-light)":"transparent", border:isToday?`2px solid var(--green)`:"2px solid transparent", minHeight:46 }}>
                <div style={{ fontSize:11, color:"var(--text-secondary)", fontWeight:700 }}>{day}</div>
                {pnl!==undefined&&<div style={{ fontSize:8, color:clr(pnl), fontWeight:800, marginTop:2, lineHeight:1.2 }}>{pnl>0?"+":"−"}${Math.abs(pnl).toLocaleString()}</div>}

function NoteEditor({ note, onBack, onSave, onDelete }) {
  const { isDesktop } = useBreakpoint();
  const [title, setTitle] = useState(note.title || "");
  const [body,  setBody]  = useState(note.body  || "");
  const saveTimer = useRef(null);
  const isNew = !note.id;
  const noteRef = useRef(note);
  noteRef.current = note;
  const triggerSave = useCallback((t, b) => {
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      onSave({ ...noteRef.current, id:noteRef.current.id||Date.now(), title:t.trim()||"Untitled", body:b, updatedAt:new Date().toISOString() }, false);
    }, 800);
  }, [onSave]);
  const handleTitle = (v) => { setTitle(v); triggerSave(v, body); };
  const handleBody  = (v) => { setBody(v);  triggerSave(title, v); };
  const handleBack = () => {
    if (saveTimer.current) clearTimeout(saveTimer.current);
    if (title.trim()||body.trim()) onSave({ ...noteRef.current, id:noteRef.current.id||Date.now(), title:title.trim()||"Untitled", body, updatedAt:new Date().toISOString() }, true);
    else onBack();
  };
  return (
    <div style={{ position:"fixed", inset:0, background:"var(--white)", zIndex:150, display:"flex", flexDirection:"column", maxWidth:isDesktop?"none":480, marginLeft:isDesktop?240:"auto", marginRight:isDesktop?0:"auto", left:isDesktop?240:0, right:0 }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:isDesktop?"20px 36px 14px":"52px 16px 14px", borderBottom:"1px solid var(--border)", background:"var(--white)" }}>
        <button onClick={handleBack} style={{ background:"none", border:"none", color:"var(--green)", fontSize:15, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", gap:4 }}>
          <span style={{ fontSize:22 }}>‹</span> Notes
        </button>
        {!isNew && <button onClick={()=>onDelete(note.id)} style={{ background:"var(--red-light)", border:"none", borderRadius:10, color:"var(--red)", fontSize:12, fontWeight:700, padding:"7px 14px", cursor:"pointer" }}>Delete</button>}
      </div>
      <div style={{ flex:1, overflowY:"auto", padding:isDesktop?"28px 36px 40px":"20px 20px 40px" }}>
        <div style={{ maxWidth:isDesktop?860:"none", margin:isDesktop?"0 auto":undefined }}>
          <textarea value={title} onChange={e=>handleTitle(e.target.value)} placeholder="Title" rows={1} style={{ width:"100%", background:"none", border:"none", outline:"none", color:"var(--text-primary)", fontSize:22, fontWeight:800, fontFamily:"'Plus Jakarta Sans',sans-serif", resize:"none", lineHeight:1.3, marginBottom:10, boxSizing:"border-box", overflow:"hidden" }}/>
          <div style={{ fontSize:12, color:"var(--text-muted)", marginBottom:18 }}>{new Date().toLocaleDateString("en-US",{ weekday:"long",year:"numeric",month:"long",day:"numeric" })}</div>
          <textarea value={body} onChange={e=>handleBody(e.target.value)} placeholder="Start writing..." style={{ width:"100%", background:"none", border:"none", outline:"none", color:"var(--text-secondary)", fontSize:16, fontFamily:"'Plus Jakarta Sans',sans-serif", resize:"none", lineHeight:1.8, boxSizing:"border-box", minHeight:"62vh" }}/>
        </div>
      </div>
    </div>
  );
}

// ── Drawdown Chart ────────────────────────────────────────────────────────────
const DrawdownChart = React.memo(function DrawdownChart({ trades, accountBalance, drawdownLimit, totalPnl, consistencyLimit }) {
  const sorted = useMemo(() => [...trades].sort((a,b)=>a.date.localeCompare(b.date)), [trades]);
  const { points, currentBal, currentPeak, currentDD, currentDDPct } = useMemo(() => {
    let peak=accountBalance, bal=accountBalance;
    const points=[{bal,dd:0,ddPct:0}];
    sorted.forEach(t=>{
      bal+=t.pnl;
      if(bal>peak)peak=bal;
      const dd=peak-bal;
      points.push({bal,dd,ddPct:peak>0?(dd/peak)*100:0});
    });
    const currentBal=accountBalance+sorted.reduce((a,t)=>a+t.pnl,0);
    const currentPeak=Math.max(accountBalance,...points.map(p=>p.bal));
    const currentDD=currentPeak-currentBal;
    return { points, currentBal, currentPeak, currentDD, currentDDPct:currentPeak>0?(currentDD/currentPeak)*100:0 };
  }, [sorted, accountBalance]);

  const ddLimit=drawdownLimit||0;
  const ddUsedPct=ddLimit>0?Math.min((currentDD/ddLimit)*100,100):0;
  const safe=ddUsedPct<70, warn=ddUsedPct>=70&&ddUsedPct<90;
  const today=todayStr();
  const todayPnl=useMemo(()=>trades.filter(t=>t.date===today).reduce((a,t)=>a+t.pnl,0),[trades,today]);
  const autoLimit=totalPnl>0?totalPnl*0.5:0;
  const activeLimit=consistencyLimit>0?consistencyLimit:autoLimit;
  const consistencyExceeded=activeLimit>0&&todayPnl>activeLimit;
  const consistencyUsedPct=activeLimit>0?Math.min((todayPnl/activeLimit)*100,120):0;

  const chartPts=points.slice(-20);
  const W=320,H=80;
  const maxDDPct=Math.max(...chartPts.map(p=>p.ddPct),ddLimit>0?(ddLimit/currentPeak)*100:1,0.5);
  const toX=i=>(i/(chartPts.length-1||1))*W;
  const toY=v=>H-(v/maxDDPct)*H;
  const pathD=chartPts.map((p,i)=>`${i===0?"M":"L"}${toX(i).toFixed(1)},${toY(p.ddPct).toFixed(1)}`).join(" ");
  const areaD=pathD+` L${W},${H} L0,${H} Z`;
  const limitY=ddLimit>0&&currentPeak>0?toY((ddLimit/currentPeak)*100):null;

  return (
    <div style={{ background:"var(--white)", borderRadius:20, padding:"16px", marginBottom:16, boxShadow:"var(--shadow)" }}>
      <div style={{ fontSize:12, color:"var(--text-muted)", fontWeight:700, letterSpacing:0.5, textTransform:"uppercase", marginBottom:14 }}>Drawdown Tracker</div>
      <div style={{ display:"flex", gap:10, marginBottom:14 }}>
        <div style={{ flex:1, background:"var(--bg)", borderRadius:14, padding:"12px" }}>
          <div style={{ fontSize:10, color:"var(--text-muted)", fontWeight:700, textTransform:"uppercase", letterSpacing:0.3, marginBottom:4 }}>Current DD</div>
          <div style={{ fontSize:20, fontWeight:900, color:currentDD>0?"var(--red)":"var(--green)", letterSpacing:-0.5 }}>{currentDDPct.toFixed(1)}%</div>
          <div style={{ fontSize:11, color:"var(--text-muted)" }}>${currentDD.toLocaleString("en-US",{maximumFractionDigits:0})}</div>
        </div>
        <div style={{ flex:1, background:"var(--bg)", borderRadius:14, padding:"12px" }}>
          <div style={{ fontSize:10, color:"var(--text-muted)", fontWeight:700, textTransform:"uppercase", letterSpacing:0.3, marginBottom:4 }}>DD Limit</div>
          <div style={{ fontSize:20, fontWeight:900, color:"var(--text-primary)", letterSpacing:-0.5 }}>{ddLimit>0?`$${ddLimit.toLocaleString()}`:"—"}</div>
          <div style={{ fontSize:11, color:"var(--text-muted)" }}>{ddLimit>0?`Remaining $${Math.max(0,ddLimit-currentDD).toLocaleString()}`:"Not set"}</div>
        </div>
      </div>
      {ddLimit>0&&(
        <div style={{ marginBottom:14 }}>
          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:5 }}>
            <span style={{ fontSize:11, color:"var(--text-muted)", fontWeight:600 }}>DD Used</span>
            <span style={{ fontSize:11, fontWeight:800, color:safe?"var(--green)":warn?"var(--yellow)":"var(--red)" }}>{ddUsedPct.toFixed(1)}%</span>
          </div>
          <div style={{ height:6, background:"var(--bg)", borderRadius:3, overflow:"hidden" }}>
            <div style={{ height:"100%", width:`${ddUsedPct}%`, background:safe?"var(--green)":warn?"var(--yellow)":"var(--red)", borderRadius:3, transition:"width 0.3s" }}/>
          </div>
        </div>
      )}
      {points.length>1&&(
        <div style={{ marginBottom:14 }}>
          <div style={{ fontSize:11, color:"var(--text-muted)", fontWeight:600, marginBottom:8 }}>Drawdown History</div>
          <svg viewBox={`0 0 ${W} ${H+4}`} width="100%" style={{ overflow:"visible", display:"block" }}>
            <defs>
              <linearGradient id="ddAreaGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="#E02020" stopOpacity="0.12"/>
                <stop offset="100%" stopColor="#E02020" stopOpacity="0.01"/>
              </linearGradient>
            </defs>
            <path d={areaD} fill="url(#ddAreaGrad)"/>
            {limitY!==null&&<line x1="0" y1={limitY} x2={W} y2={limitY} stroke="var(--red)" strokeWidth="1.5" strokeDasharray="4,3" opacity="0.55"/>}
            <path d={pathD} fill="none" stroke="var(--red)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            {chartPts.length>0&&<circle cx={toX(chartPts.length-1)} cy={toY(chartPts[chartPts.length-1].ddPct)} r="3.5" fill="var(--red)" stroke="var(--white)" strokeWidth="2"/>}
          </svg>
        </div>
      )}
      <div style={{ marginTop:14, paddingTop:14, borderTop:"1px solid var(--border)" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
          <div style={{ fontSize:11, fontWeight:700, color:"var(--text-secondary)", textTransform:"uppercase", letterSpacing:0.3 }}>Consistency Rule</div>
          {consistencyExceeded&&<div style={{ display:"flex", alignItems:"center", gap:4, background:"var(--red-light)", borderRadius:6, padding:"2px 8px" }}>
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--red)" strokeWidth="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            <span style={{ fontSize:10, color:"var(--red)", fontWeight:800 }}>LIMIT EXCEEDED</span>
          </div>}
        </div>
        <div style={{ fontSize:12, color:"var(--text-muted)", marginBottom:6 }}>Max daily profit: <span style={{ color:"var(--text-primary)", fontWeight:700 }}>{activeLimit>0?`$${activeLimit.toFixed(0)}`:"—"}</span></div>
        {activeLimit>0&&(
          <>
            <div style={{ height:6, background:"var(--bg)", borderRadius:3, overflow:"hidden", marginBottom:5 }}>
              <div style={{ height:"100%", width:`${Math.min(consistencyUsedPct,100)}%`, background:consistencyExceeded?"var(--red)":consistencyUsedPct>=70?"var(--yellow)":"var(--green)", borderRadius:3, transition:"width 0.3s" }}/>
            </div>
            <div style={{ fontSize:11, color:"var(--text-muted)" }}>Today's P&L: <span style={{ fontWeight:700, color:clr(todayPnl) }}>{fmt(todayPnl)}</span>{consistencyExceeded&&<span style={{ color:"var(--red)", fontWeight:700, marginLeft:8 }}>— Stop trading for today</span>}</div>
          </>
        )}
        {activeLimit===0&&<div style={{ fontSize:12, color:"var(--text-muted)" }}>Set a limit or log profitable trades to activate.</div>}
      </div>
    </div>
  );
});

const TradeLogView = React.memo(function TradeLogView({ trades, onPress, accountName }) {
  const [filterTag,      setFilterTag]      = useState("");
  const [filterSession,  setFilterSession]  = useState("");
  const [filterResult,   setFilterResult]   = useState("");
  const [filterInstr,    setFilterInstr]    = useState("");
  const [filterStrategy, setFilterStrategy] = useState("");
  const [search,         setSearch]         = useState("");

  const filtered = useMemo(() => trades.filter(t => {
    if (filterTag      && !(t.tags||[]).includes(filterTag))  return false;
    if (filterSession  && t.session !== filterSession)         return false;
    if (filterResult === "win"  && t.pnl <= 0)                return false;
    if (filterResult === "loss" && t.pnl >= 0)                return false;
    if (filterInstr    && t.instrument !== filterInstr)        return false;
    if (filterStrategy && t.strategy !== filterStrategy)       return false;
    if (search) {
      const q = search.toLowerCase();
      if (!((t.notes||"").toLowerCase().includes(q) || (t.strategy||"").toLowerCase().includes(q) || (t.date||"").includes(q))) return false;
    }
    return true;
  }), [trades, filterTag, filterSession, filterResult, filterInstr, filterStrategy, search]);

  const anyFilter = filterTag || filterSession || filterResult || filterInstr || filterStrategy || search;
  const clearAll = () => { setFilterTag(""); setFilterSession(""); setFilterResult(""); setFilterInstr(""); setFilterStrategy(""); setSearch(""); };

  const filteredPnl = useMemo(() => filtered.reduce((a,t)=>a+t.pnl,0), [filtered]);

  return (
    <>
      <div style={{ background:"var(--white)", borderRadius:16, padding:"12px", boxShadow:"var(--shadow)", marginBottom:14 }}>
        <div style={{ marginBottom:10 }}>
          <input type="text" placeholder="🔍 Search notes, strategy, date..." value={search} onChange={e=>setSearch(e.target.value)} style={{ width:"100%", background:"var(--bg)", border:"1.5px solid var(--border)", borderRadius:10, color:"var(--text-primary)", fontSize:13, padding:"10px 12px", outline:"none", fontFamily:"'Plus Jakarta Sans',sans-serif", fontWeight:600, boxSizing:"border-box" }}/>

        <div style={{ fontSize:11, color:"var(--text-muted)", fontWeight:700, textTransform:"uppercase", letterSpacing:0.3, marginBottom:8 }}>Filter</div>
        <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:8 }}>
          {["win","loss"].map(r=>(
            <button key={r} onClick={()=>setFilterResult(filterResult===r?"":r)} style={{ padding:"5px 12px", borderRadius:20, fontSize:11, fontWeight:700, border:"none", background:filterResult===r?(r==="win"?"var(--green)":"var(--red)"):"var(--bg)", color:filterResult===r?"#fff":"var(--text-secondary)", cursor:"pointer" }}>{r==="win"?"✓ Win":"✗ Loss"}</button>
          ))}
          {SESSIONS.map(s=>(
            <button key={s} onClick={()=>setFilterSession(filterSession===s?"":s)} style={{ padding:"5px 12px", borderRadius:20, fontSize:11, fontWeight:700, border:"none", background:filterSession===s?(SESSION_COLORS[s]||"var(--text-secondary)"):"var(--bg)", color:filterSession===s?"#fff":"var(--text-secondary)", cursor:"pointer" }}>{s}</button>
          ))}
          {INSTRUMENTS.map(s=>(
            <button key={s} onClick={()=>setFilterInstr(filterInstr===s?"":s)} style={{ padding:"5px 12px", borderRadius:20, fontSize:11, fontWeight:700, border:"none", background:filterInstr===s?(INSTRUMENT_COLORS[s]||"var(--text-secondary)"):"var(--bg)", color:filterInstr===s?"#fff":"var(--text-secondary)", cursor:"pointer" }}>{s}</button>
          ))}
        </div>
        <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
          {TRADE_TAGS.map(tag=>(
            <button key={tag} onClick={()=>setFilterTag(filterTag===tag?"":tag)} style={{ padding:"4px 10px", borderRadius:20, fontSize:10, fontWeight:700, border:"none", background:filterTag===tag?"var(--text-secondary)":"var(--bg)", color:filterTag===tag?"#fff":"var(--text-muted)", cursor:"pointer" }}>{tag}</button>
          ))}
        </div>
        {anyFilter&&<button onClick={clearAll} style={{ marginTop:8, padding:"4px 10px", borderRadius:20, fontSize:10, fontWeight:700, border:"none", background:"var(--red-light)", color:"var(--red)", cursor:"pointer" }}>✕ Clear all filters</button>}
      </div>

      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
        <div style={{ fontSize:13, color:"var(--text-secondary)", fontWeight:700, letterSpacing:0.3, textTransform:"uppercase" }}>
          {accountName} · {filtered.length}{anyFilter?` of ${trades.length}`:""} trades
        </div>

      </div>

      {filtered.map(t=><TradeRow key={t.id} trade={t} onPress={()=>onPress(t)}/>)}
      {filtered.length===0&&(
        <div style={{ textAlign:"center", padding:"60px 20px", background:"var(--white)", borderRadius:20, boxShadow:"var(--shadow)" }}>

// ── Consecutive Loss Alert ────────────────────────────────────────────────────
const ConsecutiveLossAlert = React.memo(function ConsecutiveLossAlert({ sorted }) {
  if (sorted.length < 3) return null;
  let streak = 0;
  for (let i=0;i<sorted.length;i++) { if(sorted[i].pnl<0) streak++; else break; }
  if (streak < 3) return null;
  const [icon,msg,col,bg] = streak>=5
    ? ["🚨","5 consecutive losses — Seriously consider stopping today.","var(--red)","var(--red-light)"]
    : ["⚠️","3 losses in a row — Step back and review your last 3 setups.","var(--yellow)","var(--yellow-light)"];
  return (
    <div style={{ background:bg, border:`1.5px solid ${col}44`, borderRadius:16, padding:"14px 16px", marginBottom:14, display:"flex", gap:12, alignItems:"flex-start" }}>
      <span style={{ fontSize:20 }}>{icon}</span>
      <div style={{ fontSize:12, color:col, fontWeight:700, lineHeight:1.5 }}>{msg}</div>
    </div>
  );
});

// ── Streak Banner ─────────────────────────────────────────────────────────────
const StreakBanner = React.memo(function StreakBanner({ sorted }) {
  if (!sorted.length) return null;
  let streak=1, isWin=sorted[0].pnl>0;
  for (let i=1;i<sorted.length;i++) { if((sorted[i].pnl>0)===isWin) streak++; else break; }
  if (streak < 2) return null;
  const col=isWin?"var(--green)":"var(--red)";
  const bg=isWin?"var(--green-light)":"var(--red-light)";
  return (
    <div style={{ background:bg, border:`1px solid ${col}33`, borderRadius:14, padding:"10px 14px", marginBottom:10, display:"flex", alignItems:"center", gap:10 }}>
      <span style={{ fontSize:20 }}>{isWin?"🔥":"❄️"}</span>
      <div style={{ flex:1 }}>
        <span style={{ fontSize:13, fontWeight:800, color:col }}>{streak}-trade {isWin?"win":"loss"} streak</span>
        <span style={{ fontSize:12, color:col, fontWeight:600, opacity:0.75, marginLeft:6 }}>{isWin?"Keep the discipline up!":"Stay focused, reset."}</span>
      </div>
      <div style={{ fontSize:24, fontWeight:900, color:col, opacity:0.25 }}>{streak}</div>
    </div>
  );
});

// ── Strategy Breakdown ────────────────────────────────────────────────────────
const StrategyBreakdownCard = React.memo(function StrategyBreakdownCard({ trades }) {
  const rows = useMemo(() => {
    if (trades.length < 3) return null;
    const map = {};
    trades.forEach(t => {
      if (!map[t.strategy]) map[t.strategy]={pnl:0,wins:0,total:0};
      map[t.strategy].pnl+=t.pnl; map[t.strategy].total++;
      if(t.pnl>0) map[t.strategy].wins++;
    });
    const r = Object.entries(map).map(([k,v])=>({name:k,...v,wr:Math.round((v.wins/v.total)*100)})).sort((a,b)=>b.pnl-a.pnl);
    return r.length>=2 ? r : null;
  }, [trades]);
  if (!rows) return null;
  const maxPnl = Math.max(...rows.map(r=>Math.abs(r.pnl)), 1);
  return (
    <div style={{ background:"var(--white)", borderRadius:20, padding:"16px", boxShadow:"var(--shadow)", marginBottom:14 }}>
      <div style={{ fontSize:13, color:"var(--text-secondary)", fontWeight:700, textTransform:"uppercase", letterSpacing:0.3, marginBottom:14 }}>Strategy Breakdown</div>
      {rows.map((r,i)=>(
        <div key={i} style={{ marginBottom:10 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
            <span style={{ fontSize:12, fontWeight:700, color:"var(--text-primary)" }}>{r.name}</span>
            <div style={{ display:"flex", gap:10, alignItems:"center" }}>
              <span style={{ fontSize:11, fontWeight:700, color:"var(--text-muted)" }}>{r.wr}% WR · {r.total}T</span>
              <span style={{ fontSize:12, fontWeight:800, color:clr(r.pnl), minWidth:64, textAlign:"right" }}>{fmt(r.pnl)}</span>
            </div>
          </div>
          <div style={{ height:5, background:"var(--bg)", borderRadius:3, overflow:"hidden" }}>
            <div style={{ height:"100%", width:`${Math.round((Math.abs(r.pnl)/maxPnl)*100)}%`, background:r.pnl>=0?"var(--green)":"var(--red)", borderRadius:3 }}/>
          </div>
        </div>
      ))}
    </div>
  );
});

// ── Instrument Breakdown ──────────────────────────────────────────────────────
const InstrumentBreakdownCard = React.memo(function InstrumentBreakdownCard({ trades }) {
  const rows = useMemo(() => {
    if (trades.length < 2) return null;
    const map = {};
    trades.forEach(t => {
      const key=t.instrument||"Other";
      if (!map[key]) map[key]={pnl:0,wins:0,total:0,totalCts:0};
      map[key].pnl+=t.pnl; map[key].total++; map[key].totalCts+=(t.contracts||1);
      if(t.pnl>0) map[key].wins++;
    });
    return Object.entries(map).map(([k,v])=>({ name:k,...v, wr:Math.round((v.wins/v.total)*100), avgCts:(v.totalCts/v.total).toFixed(1), pnlPerCt:v.pnl/v.totalCts })).sort((a,b)=>b.pnl-a.pnl);
  }, [trades]);
  if (!rows || rows.length < 1) return null;
  const maxAbs = Math.max(...rows.map(r=>Math.abs(r.pnl)),1);
  return (
    <div style={{ background:"var(--white)", borderRadius:20, padding:"16px", boxShadow:"var(--shadow)", marginBottom:14 }}>
      <div style={{ fontSize:13, color:"var(--text-secondary)", fontWeight:700, textTransform:"uppercase", letterSpacing:0.3, marginBottom:14 }}>Instrument Breakdown</div>
      {rows.map((r,i)=>{
        const col=INSTRUMENT_COLORS[r.name]||"var(--text-secondary)";
        return (
          <div key={i} style={{ marginBottom:12 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:5 }}>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <span style={{ fontSize:12, fontWeight:800, color:col, background:col+"18", borderRadius:6, padding:"2px 9px" }}>{r.name}</span>
                <span style={{ fontSize:11, color:"var(--text-muted)", fontWeight:600 }}>{r.wr}% WR · {r.total}T · avg {r.avgCts}ct</span>
              </div>
              <div style={{ textAlign:"right" }}>
                <div style={{ fontSize:12, fontWeight:800, color:clr(r.pnl) }}>{fmt(r.pnl)}</div>
                <div style={{ fontSize:10, color:"var(--text-muted)", fontWeight:600 }}>{fmt(r.pnlPerCt)}/ct</div>
              </div>
            </div>
            <div style={{ height:5, background:"var(--bg)", borderRadius:3, overflow:"hidden" }}>
              <div style={{ height:"100%", width:`${Math.round((Math.abs(r.pnl)/maxAbs)*100)}%`, background:r.pnl>=0?col:"var(--red)", borderRadius:3, opacity:0.75 }}/>
            </div>
          </div>
        );
      })}
    </div>
  );
});

      loadData("nq-journal-balance", null),
      loadData("nq-journal-drawdown", null),
      loadData("nq-journal-consistency-limit", null),
    ]).then(async ([savedAccounts, savedActiveId, savedNotes, legacyTrades, legacyBalance, legacyDD, legacyCL]) => {
      let finalAccounts = savedAccounts;
      let finalActiveId = savedActiveId;
      if (!finalAccounts) {
        const migratedAccount = { ...DEFAULT_ACCOUNT, balance:typeof legacyBalance==="number"?legacyBalance:DEFAULT_BALANCE, drawdownLimit:legacyDD||0, consistencyLimit:legacyCL||0 };
        finalAccounts = [migratedAccount];
        finalActiveId = migratedAccount.id;
      }
      // ── Parallel load trades for all accounts ──
      const tradeResults = await Promise.all(
        finalAccounts.map(acc => loadData(TRADES_KEY_PFX + acc.id, null))
      );
      const tradesObj = {};
      finalAccounts.forEach((acc, idx) => {
        let accTrades = tradeResults[idx];
        if (accTrades === null && acc.id === "acc_default" && legacyTrades) accTrades = legacyTrades;
        tradesObj[acc.id] = accTrades || [];
      });
      setAccounts(finalAccounts);
      setActiveId(finalActiveId || finalAccounts[0].id);
      setAllTrades(tradesObj);
      setNotes(savedNotes || []);
      setLoading(false);
    });
  }, []);

  // ── Save helpers ─────────────────────────────────────────────────────────
  const saveAccounts = useCallback((accs, aid) => {
    saveData(ACCOUNTS_KEY, accs);
    if (aid !== undefined) saveData(ACTIVE_ACC_KEY, aid);
  }, []);
  const saveTradesForAccount = useCallback((accId, trades) => {
    saveData(TRADES_KEY_PFX + accId, trades);
  }, []);

  // ── Account handlers ──────────────────────────────────────────────────────
  const handleAddAccount = useCallback((newAcc) => {
    const acc = { ...newAcc, id:newAccountId(), drawdownLimit:0, consistencyLimit:0 };
    setAccounts(prev => { const next=[...prev,acc]; saveAccounts(next,undefined); return next; });
    setAllTrades(prev => ({ ...prev, [acc.id]:[] }));
    saveTradesForAccount(acc.id, []);
  }, [saveAccounts, saveTradesForAccount]);

  const handleEditAccount = useCallback((updatedAcc) => {
    setAccounts(prev => { const next=prev.map(a=>a.id===updatedAcc.id?updatedAcc:a); saveAccounts(next,undefined); return next; });
  }, [saveAccounts]);

  const handleDeleteAccount = useCallback((accId) => {
    setAccounts(prev => {
      const next=prev.filter(a=>a.id!==accId);
      const newActiveId=activeId===accId?next[0]?.id:activeId;
      saveAccounts(next,newActiveId);
      if(activeId===accId) setActiveId(newActiveId);
      return next;
    });
    setAllTrades(prev => { const next={...prev}; delete next[accId]; return next; });
  }, [activeId, saveAccounts]);

  const handleSwitchAccount = useCallback((accId) => {
    setActiveId(accId);
    saveData(ACTIVE_ACC_KEY, accId);
  }, []);

  const handleSaveBalance = useCallback((val) => {
    setAccounts(prev => { const next=prev.map(a=>a.id===activeId?{...a,balance:val}:a); saveAccounts(next,undefined); return next; });
    setBalanceModal(false);
  }, [activeId, saveAccounts]);

  const handleSaveTrade = useCallback((trade) => {
    setAllTrades(prev => {
      const current=prev[activeId]||[];
      const idx=current.findIndex(t=>t.id===trade.id);
      const next=idx>=0?current.map(t=>t.id===trade.id?trade:t):[trade,...current];
      saveTradesForAccount(activeId, next);
      return { ...prev, [activeId]:next };
    });
    setTradeModal(null);
  }, [activeId, saveTradesForAccount]);

  const handleDeleteTrade = useCallback((id) => {
    setAllTrades(prev => {
      const next=(prev[activeId]||[]).filter(t=>t.id!==id);
      saveTradesForAccount(activeId, next);
      return { ...prev, [activeId]:next };
    });
    setTradeModal(null);
  }, [activeId, saveTradesForAccount]);

  const handleSaveNote = useCallback((note, doBack) => {
    setNotes(prev => { const idx=prev.findIndex(n=>n.id===note.id); const next=idx>=0?prev.map(n=>n.id===note.id?note:n):[note,...prev]; saveData(NOTES_KEY,next); return next; });
    if (doBack) setOpenNote(null);
    else setOpenNote(prev=>(prev&&prev.id===note.id)?note:{...note});
  }, []);

  const handleDeleteNote = useCallback((id) => {
    setNotes(prev=>{ const next=prev.filter(n=>n.id!==id); saveData(NOTES_KEY,next); return next; });
    setOpenNote(null);
  }, []);

  const handleImport = useCallback(({ trades:t, notes:n, balance:b }) => {
    if (t!=null) { setAllTrades(prev=>{ const next={...prev,[activeId]:t}; saveTradesForAccount(activeId,t); return next; }); }
    if (n!=null) { setNotes(n); saveData(NOTES_KEY,n); }
    if (b!=null) { setAccounts(prev=>{ const next=prev.map(a=>a.id===activeId?{...a,balance:b}:a); saveAccounts(next,undefined); return next; }); }
  }, [activeId, saveAccounts, saveTradesForAccount]);

  const handleClearAll = useCallback(() => {
    setAllTrades(prev => { const next={...prev,[activeId]:[]}; saveTradesForAccount(activeId,[]); return next; });
  }, [activeId, saveTradesForAccount]);

  const handleSaveDrawdown = useCallback((dd, cl) => {
    setAccounts(prev => { const next=prev.map(a=>a.id===activeId?{...a,drawdownLimit:dd,consistencyLimit:cl}:a); saveAccounts(next,undefined); return next; });
    setDdModal(false);
  }, [activeId, saveAccounts]);

  const toggleDark = useCallback(() => setDarkMode(d=>!d), []);

  // ── Derived stats (memoized) ──────────────────────────────────────────────
  const { wins, losses, totalPnl, winRate, avgRR, gainsPct, avgWin, avgLoss, sorted, currentBal } = useMemo(() => {
    const wins   = trades.filter(t=>t.pnl>0);
    const losses = trades.filter(t=>t.pnl<0);
    const totalPnl = trades.reduce((a,t)=>a+t.pnl,0);
    const winRate  = trades.length?Math.round((wins.length/trades.length)*100):0;
    const avgRR    = trades.length?(trades.reduce((a,t)=>a+t.rr,0)/trades.length).toFixed(1):"—";
    const gainsPct = accountBalance>0?((totalPnl/accountBalance)*100).toFixed(1):"0.0";
    const avgWin   = wins.length?wins.reduce((a,t)=>a+t.pnl,0)/wins.length:0;
    const avgLoss  = losses.length?losses.reduce((a,t)=>a+t.pnl,0)/losses.length:0;
    const sorted   = [...trades].sort((a,b)=>b.date.localeCompare(a.date));
    const currentBal = accountBalance + totalPnl;
    return { wins, losses, totalPnl, winRate, avgRR, gainsPct, avgWin, avgLoss, sorted, currentBal };
  }, [trades, accountBalance]);

  const plusAction = tab==="notes" ? ()=>setOpenNote({title:"",body:"",updatedAt:new Date().toISOString()})
    : tab==="risk" ? null : ()=>setTradeModal({});

  // ── Tab change — scroll to top ────────────────────────────────────────────
  const handleSetTab = useCallback((t) => {
    setTab(t);
    window.scrollTo({ top:0, behavior:"smooth" });
  }, []);

  if (loading) return (
    <BreakpointCtx.Provider value={{ isDesktop, isTablet }}>
      <div style={{ background:"var(--bg)", minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:12 }}>
        <AppIcon size={48}/>
        <div style={{ color:"var(--text-muted)", fontSize:14, fontWeight:600 }}>Loading journal...</div>
        <div style={{ color:"var(--green)", fontSize:12, fontWeight:600 }}>☁ Syncing with cloud...</div>
      </div>
    </BreakpointCtx.Provider>
  );

  return (
    <BreakpointCtx.Provider value={{ isDesktop, isTablet }}>
    <ToastProvider>
    <div style={{ minHeight:"100vh" }}>
      <DesktopSidebar tab={tab} setTab={handleSetTab} onBackup={()=>setDataModal(true)} syncStatus={syncStatus} plusAction={plusAction} accounts={accounts} activeId={activeId} onSwitchAccount={handleSwitchAccount} onManageAccounts={()=>setAccModal(true)}/>

      <div className="mobile-app-shell" style={{ background:"var(--bg)", minHeight:"100vh", maxWidth:isTablet?680:480, margin:"0 auto", fontFamily:"'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif", color:"var(--text-primary)", paddingBottom:isDesktop?40:100 }}>

        {openNote!==null&&<NoteEditor note={openNote} onBack={()=>setOpenNote(null)} onSave={handleSaveNote} onDelete={handleDeleteNote}/>}

        <AppHeader tab={tab} onBackup={()=>setDataModal(true)} syncStatus={syncStatus} account={activeAccount} onSwitchAccount={()=>setAccModal(true)} darkMode={darkMode} onToggleDark={toggleDark}/>

        {/* FAB */}
        {plusAction&&(
          <div className="fab-btn" style={{ position:"fixed", bottom:86, right:"max(16px, calc(50% - 224px))", zIndex:100 }}>
            <button onClick={plusAction} className="ripple" style={{ width:56, height:56, borderRadius:16, background:activeAccount?.color||"var(--green)", border:"none", color:"#fff", fontSize:26, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:700, animation:"fabPulse 2.5s ease-in-out infinite", "--fab-shadow":(activeAccount?.color||"#00AA13")+"66", "--fab-ring":(activeAccount?.color||"#00AA13")+"1A" }}>+</button>
          </div>
        )}

        <div style={{ padding:isDesktop?"20px 36px 0":"16px 16px 0" }}>
        <div className="desktop-content-inner">

          {/* ── Dashboard ── */}
          {tab==="dashboard"&&(
            <div className="tab-content">
              {/* PnL Hero Card */}
              <div style={{ background:"var(--white)", borderRadius:20, padding:"20px", marginBottom:14, boxShadow:"var(--shadow)" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:16 }}>
                  <div>
                    <div style={{ fontSize:12, color:"var(--text-muted)", fontWeight:600, letterSpacing:0.5, textTransform:"uppercase", marginBottom:6 }}>Account Balance</div>
                    <div style={{ fontSize:36, fontWeight:900, color:clr(totalPnl), letterSpacing:-1.5 }}>{fmtBal(currentBal)}</div>
                    <div style={{ display:"flex", gap:10, marginTop:6, alignItems:"center" }}>
                      <span style={{ fontSize:12, color:"var(--text-muted)", fontWeight:600 }}>P&L <span style={{ color:clr(totalPnl), fontWeight:700 }}>{fmtPct(parseFloat(gainsPct))}</span></span>
                      <span style={{ fontSize:12, color:clr(totalPnl), fontWeight:700 }}>{fmt(totalPnl)}</span>
                      <span style={{ fontSize:11, color:"var(--text-muted)" }}>·</span>
                      <span style={{ fontSize:12, color:"var(--text-muted)", fontWeight:600 }}>Trades <span style={{ color:"var(--text-secondary)", fontWeight:700 }}>{trades.length}</span></span>
                    </div>
                  </div>
                  <div style={{ width:46, height:46, background:clrBg(totalPnl), borderRadius:13, display:"flex", alignItems:"center", justifyContent:"center" }}>
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={totalPnl>=0?"var(--green)":"var(--red)"} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                      {totalPnl>=0?<><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></>:<><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></>}
                    </svg>
                  </div>
                </div>
                {accounts.length>1&&(
                  <div style={{ display:"flex", gap:6, marginBottom:14, overflowX:"auto", paddingBottom:2 }}>
                    {accounts.map(acc=>{
                      const accTrades=allTrades[acc.id]||[];
                      const accPnl=accTrades.reduce((a,t)=>a+t.pnl,0);
                      const isActive=acc.id===activeId;
                      return (
                        <button key={acc.id} onClick={()=>handleSwitchAccount(acc.id)} style={{ display:"flex", alignItems:"center", gap:6, padding:"6px 10px 6px 6px", borderRadius:20, border:isActive?`2px solid ${acc.color}`:`1px solid var(--border)`, background:isActive?acc.color+"15":"transparent", cursor:"pointer", flexShrink:0, whiteSpace:"nowrap" }}>
                          <div style={{ width:16, height:16, borderRadius:"50%", background:acc.color, flexShrink:0 }}/>
                          <span style={{ fontSize:11, fontWeight:700, color:isActive?acc.color:"var(--text-muted)" }}>{acc.name}</span>
                          <span style={{ fontSize:11, fontWeight:800, color:clr(accPnl) }}>{fmt(accPnl)}</span>
                        </button>
                      );
                    })}
                  </div>
                )}
                <div style={{ display:"flex", gap:8 }}>
                  <button onClick={()=>setBalanceModal(true)} style={{ flex:1, padding:"11px 8px", background:"var(--green-light)", border:"none", borderRadius:12, cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--green)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                    <span style={{ fontSize:11, color:"var(--green)", fontWeight:700 }}>Balance</span>
                  </button>
                  {isDesktop&&(
                    <button onClick={()=>setTradeModal({})} style={{ flex:1, padding:"11px 8px", background:"var(--green-light)", border:"none", borderRadius:12, cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--green)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                      <span style={{ fontSize:11, color:"var(--green)", fontWeight:700 }}>Log Trade</span>
                    </button>
                  )}
                  <button onClick={()=>setDdModal(true)} style={{ flex:1, padding:"11px 8px", background:"var(--red-light)", border:"none", borderRadius:12, cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--red)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                    <span style={{ fontSize:11, color:"var(--red)", fontWeight:700 }}>Drawdown</span>
                  </button>
                  {isDesktop&&(
                    <button onClick={()=>handleSetTab("risk")} style={{ flex:1, padding:"11px 8px", background:"var(--yellow-light)", border:"none", borderRadius:12, cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--yellow)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                      <span style={{ fontSize:11, color:"var(--yellow)", fontWeight:700 }}>Risk</span>
                    </button>
                  )}
                </div>
              </div>

              {/* Stats */}
              <div style={{ display:"flex", gap:10, marginBottom:10 }}>
                <StatCard label="Win Rate" value={`${winRate}%`} sub={`${wins.length}W / ${losses.length}L`} valueColor={winRate>=50?"var(--green)":"var(--red)"}/>
                <StatCard label="Avg RR" value={`${avgRR}R`} sub={`${trades.length} trades`}/>
              </div>
              <div style={{ display:"flex", gap:10, marginBottom:16 }}>
                <StatCard label="Avg Win" value={avgWin?`+$${Math.round(avgWin)}`:"—"} valueColor="var(--green)"/>
                <StatCard label="Avg Loss" value={avgLoss?`−$${Math.abs(Math.round(avgLoss))}`:"—"} valueColor="var(--red)"/>
              </div>

              <ConsecutiveLossAlert sorted={sorted}/>
              <StreakBanner sorted={sorted}/>
              <DrawdownChart trades={trades} accountBalance={accountBalance} drawdownLimit={drawdownLimit} totalPnl={totalPnl} consistencyLimit={consistencyLimit}/>
              <StrategyBreakdownCard trades={trades}/>
              <InstrumentBreakdownCard trades={trades}/>

              <div style={{ fontSize:13, color:"var(--text-secondary)", fontWeight:700, letterSpacing:0.3, textTransform:"uppercase", marginBottom:12 }}>Recent Trades</div>
              {sorted.slice(0,5).map(t=><TradeRow key={t.id} trade={t} onPress={()=>setTradeModal(t)}/>)}
              {sorted.length>5&&<div onClick={()=>handleSetTab("log")} style={{ textAlign:"center", color:"var(--green)", fontSize:13, fontWeight:800, padding:"14px", cursor:"pointer", background:"var(--white)", borderRadius:14, boxShadow:"var(--shadow)", marginTop:4 }}>View all {sorted.length} trades →</div>}
              {trades.length===0&&(
                <div style={{ textAlign:"center", padding:"40px 20px", background:"var(--white)", borderRadius:20, boxShadow:"var(--shadow)" }}>
                  <div style={{ marginBottom:12, display:"flex", justifyContent:"center" }}>
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
                  </div>
                  <div style={{ fontSize:16, fontWeight:800, color:"var(--text-secondary)", marginBottom:6 }}>No trades yet</div>
                  <div style={{ fontSize:13, color:"var(--text-muted)", marginBottom:16 }}>Tap Log Trade to get started</div>
                  <button onClick={()=>setTradeModal({})} style={{ padding:"12px 24px", background:"var(--green)", border:"none", borderRadius:12, color:"#fff", fontSize:14, fontWeight:800, cursor:"pointer" }}>+ Log First Trade</button>
                </div>
              )}
            </div>
          )}

          {tab==="log"&&<div className="tab-content"><TradeLogView trades={sorted} onPress={t=>setTradeModal(t)} accountName={activeAccount?.name}/></div>}
          {tab==="calendar"&&<div className="tab-content"><CalendarView trades={trades}/></div>}

          {tab==="notes"&&(
            <div className="tab-content">
              <div style={{ display:"flex", gap:6, marginBottom:16, background:"var(--white)", borderRadius:16, padding:"6px", boxShadow:"var(--shadow)" }}>
                {[{id:"personal",label:"My Notes"},{id:"tradelog",label:"From Trade Log"}].map(s=>(
                  <button key={s.id} onClick={()=>setNoteSubTab(s.id)} style={{ flex:1, padding:"9px 6px", borderRadius:10, border:"none", background:noteSubTab===s.id?"var(--green)":"transparent", color:noteSubTab===s.id?"#fff":"var(--text-muted)", fontSize:12, fontWeight:700, cursor:"pointer", transition:"background 0.1s" }}>{s.label}</button>
                ))}
              </div>
              {noteSubTab==="personal"&&<><div style={{ fontSize:13, color:"var(--text-muted)", fontWeight:700, marginBottom:14 }}>{notes.length} notes · shared across all accounts</div><NotesList notes={notes} onOpen={n=>setOpenNote(n)}/></>}
              {noteSubTab==="tradelog"&&<><div style={{ fontSize:13, color:"var(--text-muted)", fontWeight:700, marginBottom:14 }}>Notes from {trades.filter(t=>t.notes&&t.notes.trim()).length} trade logs · {activeAccount?.name}</div><TradeNotesList trades={trades}/></>}
            </div>
          )}

          {tab==="risk"&&<div className="tab-content"><RiskManagement accountBalance={accountBalance} totalPnl={totalPnl}/></div>}

        </div>
        </div>

        {/* ── Bottom Nav ── */}
        <div className="bottom-nav-bar" style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:480, background:"var(--white)", borderTop:"1px solid var(--border)", display:"flex", padding:"10px 0 24px", boxShadow:"0 -4px 20px rgba(0,0,0,0.08)" }}>
          {[
            { id:"dashboard", label:"Home", icon:(a)=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={a?"var(--text-primary)":"var(--text-muted)"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> },
            { id:"log",       label:"Log",      icon:(a)=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={a?"var(--text-primary)":"var(--text-muted)"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg> },
            { id:"calendar",  label:"Calendar", icon:(a)=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={a?"var(--text-primary)":"var(--text-muted)"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> },
            { id:"risk",      label:"Risk",     icon:(a)=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={a?"var(--text-primary)":"var(--text-muted)"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> },
            { id:"notes",     label:"Notes",    icon:(a)=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={a?"var(--text-primary)":"var(--text-muted)"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> },
          ].map(({ id, label, icon }) => {
            const active = tab === id;
            return (
              <button key={id} onClick={()=>handleSetTab(id)} className="ripple" style={{ flex:1, background:"none", border:"none", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:3, padding:"4px 0" }}>
                <div style={{ width:36, height:36, borderRadius:10, background:active?"var(--bg)":"transparent", display:"flex", alignItems:"center", justifyContent:"center", transition:"background 0.1s" }}>
                  {icon(active)}
                </div>
                <span style={{ fontSize:10, fontWeight:700, color:active?"var(--text-primary)":"var(--text-muted)", transition:"color 0.1s" }}>{label}</span>
              </button>
            );
          })}
        </div>

        {/* ── Modals ── */}
        {tradeModal!==null&&<TradeModal trade={tradeModal} onSave={handleSaveTrade} onDelete={handleDeleteTrade} onClose={()=>setTradeModal(null)}/>}
        {balanceModal&&<BalanceModal currentBalance={accountBalance} onSave={handleSaveBalance} onClose={()=>setBalanceModal(false)}/>}
        {dataModal&&<DataModal trades={trades} notes={notes} account={activeAccount} onImport={handleImport} onClearAll={handleClearAll} onClose={()=>setDataModal(false)}/>}
        {ddModal&&<DrawdownModal drawdownLimit={drawdownLimit} consistencyLimit={consistencyLimit} totalPnl={totalPnl} onSave={handleSaveDrawdown} onClose={()=>setDdModal(false)}/>}
        {accModal&&<AccountManagerModal accounts={accounts} activeId={activeId} onSwitch={handleSwitchAccount} onAdd={handleAddAccount} onEdit={handleEditAccount} onDelete={handleDeleteAccount} onClose={()=>setAccModal(false)}/>}
      </div>
    </div>
    </ToastProvider>
    </BreakpointCtx.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<TradingJournal />);
</script>
</body>
</html>
